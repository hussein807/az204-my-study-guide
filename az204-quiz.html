me. Declaratively connect to an Azure Blog Storage account: Policy.","Enable developers to write the functions by using the Rust language: Custom handler. Declaratively connect to an Azure Blog Storage account: Trigger.","Enable developers to write the functions by using the Rust language: Custom handler. Declaratively connect to an Azure Blog Storage account: Extension bundle."],"answer":"Enable developers to write the functions by using the Rust language: Custom handler. Declaratively connect to an Azure Blog Storage account: Extension bundle.","explanation":"Azure Functions Custom Handlers allow functions written in any language (including Rust) by implementing an HTTP server. Extension bundles provide a pre-compiled set of Functions binding extensions (e.g., Blob Storage) used declaratively in function.json without manual installation, which custom handlers rely on.","images":["images/question40.png"],"source":"README","boxMode":true,"boxes":[{"label":"Enable developers to write the functions by using the Rust language","choices":["Hosting plan","Runtime","Custom handler","Policy","Trigger","Extension bundle"],"correct":"Custom handler"},{"label":"Declaratively connect to an Azure Blog Storage account","choices":["Hosting plan","Runtime","Custom handler","Policy","Trigger","Extension bundle"],"correct":"Extension bundle"}]},{"id":41,"question":"You are developing an ASP.NET Core web application. You plan to deploy the application to Azure Web App for Containers. The application needs to store runtime diagnostic data that must be persisted across application restarts. You have the following code. You need to configure the application settings so that diagnostic data is stored as required. How should you configure the web app's settings?","options":["App setting: `WEBSITES_ENABLE_APP_SERVICE_STORAGE`. Value: `/home`.","App setting: `WEBSITES_ENABLE_APP_SERVICE_STORAGE`. Value: `/local`.","App setting: `LOCALAPPDATA`. Value: `D:\\home`.","App setting: `DOTNET_HOSTING_OPTIMIZATION_CACHE`. Value: `D:\\home`."],"answer":"App setting: `WEBSITES_ENABLE_APP_SERVICE_STORAGE`. Value: `/home`.","explanation":"For Linux/Container Web Apps, WEBSITES_ENABLE_APP_SERVICE_STORAGE=true mounts the persistent /home directory. Files written under /home persist across restarts and are shared across instances, whereas other paths are ephemeral container storage. The /home path is the persistent location for diagnostic data in Web App for Containers.","images":["images/question41_1.jpeg","images/question41_2.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"App setting","choices":["`WEBSITES_ENABLE_APP_SERVICE_STORAGE`","`LOCALAPPDATA`","`DOTNET_HOSTING_OPTIMIZATION_CACHE`","`/home`","`/local`","`D:\\home`"],"correct":"`WEBSITES_ENABLE_APP_SERVICE_STORAGE`"},{"label":"Value","choices":["`WEBSITES_ENABLE_APP_SERVICE_STORAGE`","`LOCALAPPDATA`","`DOTNET_HOSTING_OPTIMIZATION_CACHE`","`/home`","`/local`","`D:\\home`"],"correct":"`/home`"}]},{"id":42,"question":"You are developing a web app that is protected by Azure Web Application Firewall (WAF). All traffic to the web app is routed through an Azure Application Gateway instance that is used by multiple web apps. The web app address is `contoso.azurewebsites.net`. All traffic must be secured with SSL. The Azure Application Gateway instance is used by multiple web apps. You need to configure the Azure Application Gateway for the web app. Which two actions should you perform?","options":["In the Azure Application Gateway's HTTP setting, enable the Use for App service setting.","Convert the web app to run in an Azure App service environment (ASE).","Add an authentication certificate for `contoso.azurewebsites.net` to the Azure Application Gateway.","In the Azure Application Gateway's HTTP setting, set the value of the `Override` backend path option to `contoso22.azurewebsites.net`."],"answer":"In the Azure Application Gateway's HTTP setting, enable the Use for App service setting.|In the Azure Application Gateway's HTTP setting, set the value of the `Override` backend path option to `contoso22.azurewebsites.net`.","explanation":"When an Application Gateway fronts multiple App Services, enable 'Pick host name from backend address' (Use for App Service) so the Host header matches the backend FQDN, and override the backend hostname to the specific contoso azurewebsites.net address so App Service routes correctly. No auth cert is needed for public Azure-issued certs.","images":[],"source":"README"},{"id":43,"question":"You develop a software as a service (SaaS) offering to manage photographs. Users upload photos to a web service which then stores the photos in Azure Storage Blob storage. The storage account type is General-purpose V2. When photos are uploaded, they must be processed to produce and save a mobile-friendly version of the image. The process to produce a mobile-friendly version of the image must start in less than one minute. You need to design the process that starts the photo processing. Solution: Use the Azure Blob Storage change feed to trigger photo processing. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Blob change feed is not suitable for near-real-time triggering. Change feed records are written out periodically and can have latency on the order of minutes (not guaranteed under one minute). Use Event Grid BlobCreated events for sub-minute triggering of processing workflows.","images":[],"source":"README"},{"id":44,"question":"A company develops a series of mobile games. All games use a single leaderboard service. You have the following requirements: Code must be scalable and allow for growth. Each record must consist of a playerId, gameId, score, and time played. When users reach a new high score, the system will save the new score using the SaveScore function below. Each game is assigned an Id based on the series title. You plan to store customer information in Azure Cosmos DB. The following data already exists in the database: You develop the following code to save scores in the data store. (Line numbers are included for reference only.) You develop the following code to query the database. (Line numbers are included for reference only.). Question 1: SaveScore will work with Cosmos DB.","options":["Yes.","No."],"answer":"Yes.","explanation":"The SaveScore method uses the Cosmos DB SDK (CreateDocumentAsync/CreateItemAsync) correctly to insert a leaderboard document. The code pattern is compatible with Cosmos DB SQL API, so saving scores will work.","images":["images/question44_45_46_47_1.png","images/question44_45_46_47_2.png","images/question44_45_46_47_3.jpeg"],"source":"README"},{"id":45,"question":"A company develops a series of mobile games. All games use a single leaderboard service. You have the following requirements: Code must be scalable and allow for growth. Each record must consist of a playerId, gameId, score, and time played. When users reach a new high score, the system will save the new score using the SaveScore function below. Each game is assigned an Id based on the series title. You plan to store customer information in Azure Cosmos DB. The following data already exists in the database: You develop the following code to save scores in the data store. (Line numbers are included for reference only.) You develop the following code to query the database. (Line numbers are included for reference only.). Question 2: SaveScore will update and replace a record if one already exists with the same playerId and gameId.","options":["Yes.","No."],"answer":"No.","explanation":"CreateDocumentAsync/CreateItemAsync inserts a new document; it does not update or replace an existing record. To replace you would need UpsertDocumentAsync/UpsertItemAsync or ReplaceDocumentAsync. Hence duplicates with the same playerId+gameId would be created, not updated.","images":["images/question44_45_46_47_1.png","images/question44_45_46_47_2.png","images/question44_45_46_47_3.jpeg"],"source":"README"},{"id":46,"question":"A company develops a series of mobile games. All games use a single leaderboard service. You have the following requirements: Code must be scalable and allow for growth. Each record must consist of a playerId, gameId, score, and time played. When users reach a new high score, the system will save the new score using the SaveScore function below. Each game is assigned an Id based on the series title. You plan to store customer information in Azure Cosmos DB. The following data already exists in the database: You develop the following code to save scores in the data store. (Line numbers are included for reference only.) You develop the following code to query the database. (Line numbers are included for reference only.). Question 3: Leader board data for the game will be automatically partitioned using gameId.","options":["Yes.","No."],"answer":"No.","explanation":"Cosmos DB partitioning is not automatic on gameId unless gameId is explicitly defined as the partition key on the container. Partitioning must be configured at container creation with the chosen partition key path; it is never inferred automatically.","images":["images/question44_45_46_47_1.png","images/question44_45_46_47_2.png","images/question44_45_46_47_3.jpeg"],"source":"README"},{"id":47,"question":"A company develops a series of mobile games. All games use a single leaderboard service. You have the following requirements: Code must be scalable and allow for growth. Each record must consist of a playerId, gameId, score, and time played. When users reach a new high score, the system will save the new score using the SaveScore function below. Each game is assigned an Id based on the series title. You plan to store customer information in Azure Cosmos DB. The following data already exists in the database: You develop the following code to save scores in the data store. (Line numbers are included for reference only.) You develop the following code to query the database. (Line numbers are included for reference only.). Question 4: SaveScore will store the values for the gameId and playerId parameters in the database.","options":["Yes.","No."],"answer":"Yes.","explanation":"The SaveScore function passes a document object containing playerId and gameId properties (among others) to CreateDocumentAsync, so those field values are persisted in the Cosmos DB container.","images":["images/question44_45_46_47_1.png","images/question44_45_46_47_2.png","images/question44_45_46_47_3.jpeg"],"source":"README"},{"id":48,"question":"You are developing a solution that uses the Azure Storage Client library for .NET. You have the following code: (Line numbers are included for reference only.). Question 1: The code creates an infinite lease.","options":["Yes.","No."],"answer":"Yes.","explanation":"Passing null (or TimeSpan equivalent) as the lease duration to AcquireLease/AcquireLeaseAsync creates an infinite lease. Finite leases must be between 15 and 60 seconds; null requests an indefinite (infinite) lease on the blob.","images":["images/question48_49_50.jpeg"],"source":"README"},{"id":49,"question":"You are developing a solution that uses the Azure Storage Client library for .NET. You have the following code: (Line numbers are included for reference only.). Question 2: The code at line 06 always creates a new blob.","options":["Yes.","No."],"answer":"No.","explanation":"[Medium confidence] UploadFromFileAsync (or similar upload) overwrites any existing blob with the same name by default, but does not 'always create a new blob'—if the blob exists, it's replaced, not newly created. Additionally, with a lease-based flow the code would fail on an existing leased blob unless conditions are met.","images":["images/question48_49_50.jpeg"],"source":"README"},{"id":50,"question":"You are developing a solution that uses the Azure Storage Client library for .NET. You have the following code: (Line numbers are included for reference only.). Question 3: The finally block releases the lease.","options":["Yes.","No."],"answer":"Yes.","explanation":"The finally block calls ReleaseLeaseAsync (with the AccessCondition of the acquired lease ID), which releases the lease so subsequent operations can acquire it. This is the standard cleanup pattern.","images":["images/question48_49_50.jpeg"],"source":"README"},{"id":51,"question":"You are building a website that uses Azure Blob storage for data storage. You configure Azure Blob storage lifecycle to move all blobs to the archive tier after 30 days. Customers have requested a service-level agreement (SLA) for viewing data older than 30 days. You need to document the minimum SLA for data recovery. Which SLA should you use?","options":["At least two days.","Between one and 15 hours.","At least one day.","Between zero and 60 minutes."],"answer":"Between one and 15 hours.","explanation":"Rehydration from the Archive tier to an online tier (Hot/Cool) can take up to 15 hours for standard priority. Microsoft documents rehydration latency as 'up to 15 hours'. Data in Archive is offline and cannot be read until rehydrated.","images":[],"source":"README"},{"id":52,"question":"You are developing a ticket reservation system for an airline. The storage solution for the application must meet the following requirements: Ensure at least 99.99% availability and provide low latency. Accept reservations even when localized network outages or other unforeseen failures occur. Process reservations in the exact sequence as reservations are submitted to minimize overbooking or selling the same seat to multiple travelers. Allow simultaneous and out-of-order reservations with a maximum five-second tolerance window. You provision a resource group named `airlineResourceGroup` in the Azure South-Central US region. You need to provision a SQL API Cosmos DB account to support the app. How should you complete the Azure CLI commands?","options":["Box 1: `BoundedStaleness`. Box 2: `--enable-automatic-failover true \\`. Box 3: `--locations 'southcentralplus=0 eastus=1 westus=2'`.","Box 1: `Strong`. Box 2: `--enable-automatic-failover true \\`. Box 3: `--locations 'southcentralplus=0 eastus=1 westus=2'`.","Box 1: `BoundedStaleness`. Box 2: `--enable-automatic-failover true \\`. Box 3: `--locations 'southcentralus'`.","Box 1: `Strong`. Box 2: `--kind 'MongoDB' \\`. Box 3: `--locations 'southcentralus'`."],"answer":"Box 1: `BoundedStaleness`. Box 2: `--enable-automatic-failover true \\`. Box 3: `--locations 'southcentralplus=0 eastus=1 westus=2'`.","explanation":"Bounded Staleness provides strong consistency within a region while allowing multi-region replication with a lag window (the 5-second tolerance). Multiple --locations entries enable geo-replication so reservations are accepted during outages, and --enable-automatic-failover supports high availability.","images":["images/question52.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`--enable-automatic-failover true \\`","`--kind 'MongoDB' \\`","`--locations 'southcentralplus=0 eastus=1 westus=2'`","`--locations 'southcentralus'`","`BoundedStaleness`","`Strong`"],"correct":"`BoundedStaleness`"},{"label":"Box 2","choices":["`--enable-automatic-failover true \\`","`--kind 'MongoDB' \\`","`--locations 'southcentralplus=0 eastus=1 westus=2'`","`--locations 'southcentralus'`","`BoundedStaleness`","`Strong`"],"correct":"`--enable-automatic-failover true \\`"},{"label":"Box 3","choices":["`--enable-automatic-failover true \\`","`--kind 'MongoDB' \\`","`--locations 'southcentralplus=0 eastus=1 westus=2'`","`--locations 'southcentralus'`","`BoundedStaleness`","`Strong`"],"correct":"`--locations 'southcentralplus=0 eastus=1 westus=2'`"}],"orderMode":true},{"id":53,"question":"You are preparing to deploy a Python website to an Azure Web App using a container. The solution will use multiple containers in the same container group. The Dockerfile that builds the container is as follows. You build a container by using the following command. The Azure Container Registry instance named `images` is a private registry. The user name and password for the registry is `admin`. The Web App must always run the same version of the website regardless of future builds. You need to create an Azure Web App to run the website. How should you complete the commands?","options":["Box 1: `--sku B1 --hyper-v`. Box 2: `--deployment-source-url images.azurecr.io/website:1.0.0`. Box 3: `container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`.","Box 1: `--sku B1 --is-linux`. Box 2: `--deployment-container-image-name images.azurecr.io/website:v1.0.0`. Box 3: `container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`.","Box 1: `--tags container`. Box 2: `--deployment-source-url images.azurecr.io/website:latest`. Box 3: `set --python-version 2.7 --generic-configurations user=admin password=admin`.","Box 1: `--sku SHARED`. Box 2: `--deployment-container-image-name images.azurecr.io/website:latest`. Box 3: `set --python-version 3.6 --generic-configurations user=admin password=admin`."],"answer":"Box 1: `--sku B1 --is-linux`. Box 2: `--deployment-container-image-name images.azurecr.io/website:v1.0.0`. Box 3: `container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`.","explanation":"App Service for Linux Containers requires --is-linux on the App Service plan (B1 is a valid SKU). Pinning to a specific image tag (v1.0.0) ensures the same version runs regardless of future builds (not :latest). `az webapp config container set` configures the private ACR registry URL and credentials.","images":["images/question53_1.png","images/question53_2.png","images/question53_3.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`--sku B1 --hyper-v`","`--sku B1 --is-linux`","`--sku SHARED`","`--tags container`","`--deployment-container-image-name images.azurecr.io/website:latest`","`--deployment-container-image-name images.azurecr.io/website:v1.0.0`","`--deployment-source-url images.azurecr.io/website:1.0.0`","`--deployment-source-url images.azurecr.io/website:latest`","`container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`","`set --python-version 2.7 --generic-configurations user=admin password=admin`","`set --python-version 3.6 --generic-configurations user=admin password=admin`"],"correct":"`--sku B1 --is-linux`"},{"label":"Box 2","choices":["`--sku B1 --hyper-v`","`--sku B1 --is-linux`","`--sku SHARED`","`--tags container`","`--deployment-container-image-name images.azurecr.io/website:latest`","`--deployment-container-image-name images.azurecr.io/website:v1.0.0`","`--deployment-source-url images.azurecr.io/website:1.0.0`","`--deployment-source-url images.azurecr.io/website:latest`","`container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`","`set --python-version 2.7 --generic-configurations user=admin password=admin`","`set --python-version 3.6 --generic-configurations user=admin password=admin`"],"correct":"`--deployment-container-image-name images.azurecr.io/website:v1.0.0`"},{"label":"Box 3","choices":["`--sku B1 --hyper-v`","`--sku B1 --is-linux`","`--sku SHARED`","`--tags container`","`--deployment-container-image-name images.azurecr.io/website:latest`","`--deployment-container-image-name images.azurecr.io/website:v1.0.0`","`--deployment-source-url images.azurecr.io/website:1.0.0`","`--deployment-source-url images.azurecr.io/website:latest`","`container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`","`set --python-version 2.7 --generic-configurations user=admin password=admin`","`set --python-version 3.6 --generic-configurations user=admin password=admin`"],"correct":"`container set --docker-registry-server-url https://images.azurecr.io -u admin -p admin`"}]},{"id":54,"question":"You are developing a back-end Azure App Service that scales based on the number of messages contained in a Service Bus queue. A rule already exists to scale up the App Service when the average queue length of unprocessed and valid queue messages is greater than 1000. You need to add a new rule that will continuously scale down the App Service as long as the scale up condition is not met. How should you configure the Scale rule?","options":["Metric source: Service Bus queue. Metric name: Active Message Count. Time train statistic: Average. Operator: Less than or equal to. Operation: Decrease count by.","Metric source: Service Bus queue. Metric name: Active Message Count. Time train statistic: Count. Operator: Less than or equal to. Operation: Decrease count by.","Metric source: Storage queue. Metric name: Active Message Count. Time train statistic: Count. Operator: Less than. Operation: Decrease count to.","Metric source: Service Bus queue. Metric name: Message Count. Time train statistic: Average. Operator: Greater than. Operation: Decrease count to."],"answer":"Metric source: Service Bus queue. Metric name: Active Message Count. Time train statistic: Average. Operator: Less than or equal to. Operation: Decrease count by.","explanation":"Since the queue is Service Bus (not Storage), use ActiveMessageCount (unprocessed+valid messages). Use Average aggregation to pair with the scale-up rule, operator 'Less than or equal to' so it scales down while the scale-up condition is unmet, and 'Decrease count by' enables continuous scale-down as long as the condition holds.","images":["images/question54.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"Metric source","choices":["Service Bus queue","Storage queue","Active Message Count","Message Count","Average","Count","Less than or equal to","Less than","Greater than","Decrease count by","Decrease count to"],"correct":"Service Bus queue"},{"label":"Metric name","choices":["Service Bus queue","Storage queue","Active Message Count","Message Count","Average","Count","Less than or equal to","Less than","Greater than","Decrease count by","Decrease count to"],"correct":"Active Message Count"},{"label":"Time train statistic","choices":["Service Bus queue","Storage queue","Active Message Count","Message Count","Average","Count","Less than or equal to","Less than","Greater than","Decrease count by","Decrease count to"],"correct":"Average"},{"label":"Operator","choices":["Service Bus queue","Storage queue","Active Message Count","Message Count","Average","Count","Less than or equal to","Less than","Greater than","Decrease count by","Decrease count to"],"correct":"Less than or equal to"},{"label":"Operation","choices":["Service Bus queue","Storage queue","Active Message Count","Message Count","Average","Count","Less than or equal to","Less than","Greater than","Decrease count by","Decrease count to"],"correct":"Decrease count by"}]},{"id":55,"question":"You have an application that uses Azure Blob storage. You need to update the metadata of the blobs. Which three methods should you use to develop the solution?","options":["Box 1: `Metadata.Add`. Box 2: `SetMetadataAsync`. Box 3: `SetPropertiesAsync`.","Box 1: `Metadata.Add`. Box 2: `SetMetadataAsync`. Box 3: `UploadFileStream`.","Box 1: `Metadata.Add`. Box 2: `FetchAttributesAsync`. Box 3: `SetPropertiesAsync`.","Box 1: `FetchAttributesAsync`. Box 2: `Metadata.Add`. Box 3: `SetMetadataAsync`."],"answer":"Box 1: `FetchAttributesAsync`. Box 2: `Metadata.Add`. Box 3: `SetMetadataAsync`.","explanation":"To update blob metadata: 1) FetchAttributesAsync retrieves existing properties/metadata so you don't overwrite them; 2) Metadata.Add adds or modifies entries in the metadata dictionary; 3) SetMetadataAsync persists the updated metadata back to the blob service.","images":["images/question55.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`FetchAttributesAsync`","`Metadata.Add`","`SetMetadataAsync`","`SetPropertiesAsync`","`UploadFileStream`"],"correct":"`FetchAttributesAsync`"},{"label":"Box 2","choices":["`FetchAttributesAsync`","`Metadata.Add`","`SetMetadataAsync`","`SetPropertiesAsync`","`UploadFileStream`"],"correct":"`Metadata.Add`"},{"label":"Box 3","choices":["`FetchAttributesAsync`","`Metadata.Add`","`SetMetadataAsync`","`SetPropertiesAsync`","`UploadFileStream`"],"correct":"`SetMetadataAsync`"}]},{"id":56,"question":"You are developing an Azure solution to collect point-of-sale (POS) device data from 2,000 stores located throughout the world. A single device can produce 2 megabytes (MB) of data every 24 hours. Each store location has one to five devices that send data. You must store the device data in Azure Blob storage. Device data must be correlated based on a device identifier. Additional stores are expected to open in the future. You need to implement a solution to receive the device data. Solution: Provision an Azure Event Grid. Configure the machine identifier as the partition key and enable capture. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Event Grid is a push-based event routing service; it does not use partition keys and does not support a 'capture' feature to store messages to Blob. The described capability (partition key + capture to Blob) corresponds to Azure Event Hubs, not Event Grid.","images":[],"source":"README"},{"id":57,"question":"You develop Azure solutions. A .NET application needs to receive a message each time an Azure virtual machine finishes processing data. The messages must NOT persist after being processed by the receiving application. You need to implement the .NET object that will receive the messages. Which object should you use?","options":["`QueueClient`.","`SubscriptionClient`.","`TopicClient`.","`CloudQueueClient`."],"answer":"`QueueClient`.","explanation":"Service Bus QueueClient (Microsoft.Azure.ServiceBus) receives messages from a Service Bus queue; messages are removed after successful processing (PeekLock/complete or ReceiveAndDelete), so they do not persist. SubscriptionClient/TopicClient are for pub/sub topics; CloudQueueClient is for Azure Storage queues.","images":[],"source":"README"},{"id":58,"question":"You are maintaining an existing application that uses an Azure Blob GPv1 Premium storage account. Data older than three months is rarely used. Data newer than three months must be available immediately. Data older than a year must be saved but does not need to be available immediately. You need to configure the account to support a lifecycle management rule that moves blob data to archive storage for data not modified in the last year. Which three actions should you perform in sequence?","options":["Box 1: Upgrade the storage account to GPv2. Box 2: Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account. Box 3: Change the storage account access tier from hot to cool.","Box 1: Upgrade the storage account to GPv2. Box 2: Create a new GPv2 Standard account and set its default access tier level to cool. Box 3: Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account.","Box 1: Upgrade the storage account to GPv2. Box 2: Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account. Box 3: Create a new GPv2 Standard account and set its default access tier level to cool.","Box 1: Create a new GPv2 Standard account and set its default access tier level to cool. Box 2: Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account. Box 3: Upgrade the storage account to GPv2."],"answer":"Box 1: Upgrade the storage account to GPv2. Box 2: Create a new GPv2 Standard account and set its default access tier level to cool. Box 3: Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account.","explanation":"[Medium confidence] Lifecycle management and access tiers are only supported on GPv2 Standard (not GPv1 Premium). Premium cannot be upgraded directly to Standard tiers, so you: 1) upgrade GPv1 to GPv2 (Premium account remains Premium—typically exam accepts this step); 2) create a Standard GPv2 with cool default; 3) copy data to the new account and delete from origin, enabling lifecycle rules that move cold data to archive.","images":["images/question58.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Change the storage account access tier from hot to cool","Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account","Create a new GPv2 Standard account and set its default access tier level to cool","Upgrade the storage account to GPv2"],"correct":"Upgrade the storage account to GPv2"},{"label":"Box 2","choices":["Change the storage account access tier from hot to cool","Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account","Create a new GPv2 Standard account and set its default access tier level to cool","Upgrade the storage account to GPv2"],"correct":"Create a new GPv2 Standard account and set its default access tier level to cool"},{"label":"Box 3","choices":["Change the storage account access tier from hot to cool","Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account","Create a new GPv2 Standard account and set its default access tier level to cool","Upgrade the storage account to GPv2"],"correct":"Copy the data to be archived to a Standard GPv2 storage account and then delete the data from the original storage account"}],"orderMode":true},{"id":59,"question":"You develop Azure solutions. You must connect to a No-SQL globally-distributed database by using the .NET API. You need to create an object to configure and execute requests in the database. Which code segment should you use?","options":["`new Container(EndpointUri, PrimaryKey);`.","`new Database(EndpointUri, PrimaryKey);`.","`new CosmosClient(EndpointUri, PrimaryKey);`."],"answer":"`new CosmosClient(EndpointUri, PrimaryKey);`.","explanation":"Azure Cosmos DB is the NoSQL globally-distributed database. In the .NET v3 SDK (Microsoft.Azure.Cosmos), CosmosClient is the entry point used to configure and execute requests. Container and Database are obtained from the CosmosClient, not constructed directly.","images":[],"source":"README"},{"id":60,"question":"You have an existing Azure storage account that stores large volumes of data across multiple containers. You need to copy all data from the existing storage account to a new storage account. The copy process must meet the following requirements: Automate data movement. Minimize user input required to perform the operation. Ensure that the data movement process is recoverable. What should you use?","options":["`AzCopy`.","Azure Storage Explorer.","Azure portal.",".NET Storage Client Library."],"answer":"`AzCopy`.","explanation":"AzCopy is the command-line tool for bulk, scriptable data movement between Azure Storage accounts. It supports resumable transfers via a journal file (recoverable), can be automated via scripts (minimal user input), and efficiently handles large volumes across containers. Storage Explorer and the portal are interactive; .NET SDK requires custom code.","images":[],"source":"README"},{"id":61,"question":"You are developing a web service that will run on Azure virtual machines that use Azure Storage. You configure all virtual machines to use managed identities. You have the following requirements: Secret-based authentication mechanisms are not permitted for accessing an Azure Storage account. Must use only Azure Instance Metadata Service endpoints. You need to write code to retrieve an access token to access Azure Storage.","options":["Code segment 1: `http://localhost::50342/oauth2/token`. Code segment 2: `new MultipartContent(payload);`.","Code segment 1: `http://localhost/metadata/identity/oauth2/token`. Code segment 2: `JsonConvert.DeserializeObject<Dictionary<string, string>>(payload);`.","Code segment 1: `http://169.254.169.254:50432/metadata/identity/oauth2/token`. Code segment 2: `new NetworkCredential('Azure', payload);`.","Code segment 1: `http://169.254.169.254:50432/metadata/identity/oauth2/token`. Code segment 2: `JsonConvert.DeserializeObject<Dictionary<string, string>>(payload);`."],"answer":"Code segment 1: `http://169.254.169.254:50432/metadata/identity/oauth2/token`. Code segment 2: `JsonConvert.DeserializeObject<Dictionary<string, string>>(payload);`.","explanation":"The Azure Instance Metadata Service (IMDS) is available only via the well-known non-routable IP 169.254.169.254. The token endpoint returns a JSON payload containing access_token, expires_in, etc., which is parsed with JsonConvert.DeserializeObject<Dictionary<string,string>>. localhost is not a valid IMDS endpoint.","images":["images/question61.jpg"],"source":"README"},{"id":62,"question":"You are developing a new page for a website that uses Azure Cosmos DB for data storage. The feature uses documents that have the following format. You must display data for the new page in a specific order. You create the following query for the page. You need to configure a Cosmos DB policy to support the query. How should you configure the policy?","options":["Box 1: `orderBy`. Box 2: `compositeIndexes`.","Box 1: `compositeIndexes`. Box 2: `descending`.","Box 1: `compositeIndexes`. Box 2: `ascending`.","Box 1: `ascending`. Box 2: `descending`."],"answer":"Box 1: `compositeIndexes`. Box 2: `descending`.","explanation":"Cosmos DB requires a composite index to support ORDER BY queries across multiple properties or when sorting in a non-default direction. The indexing policy uses the compositeIndexes section, and since the query orders by a descending field, the composite index path must be defined as descending to match.","images":["images/question62_1.png","images/question62_2.png","images/question62_3.png"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`ascending`","`compositeIndexes`","`orderBy`","`descending`"],"correct":"`compositeIndexes`"},{"label":"Box 2","choices":["`ascending`","`compositeIndexes`","`orderBy`","`descending`"],"correct":"`descending`"}]},{"id":63,"question":"You are building a traffic monitoring system that monitors traffic along six highways. The system produces time series analysis-based reports for each highway. Data from traffic sensors are stored in Azure Event Hub. Traffic data is consumed by four departments. Each department has an Azure Web App that displays the time series-based reports and contains a WebJob that processes the incoming data from Event Hub. All Web Apps run on App Service Plans with three instances. Data throughput must be maximized. Latency must be minimized. You need to implement the Azure Event Hub. Which settings should you use?","options":["Number of partitions: 6. Partition Key: Highway.","Number of partitions: 12. Partition Key: VM name.","Number of partitions: 12. Partition Key: Highway.","Number of partitions: 6 Partition Key: Department."],"answer":"Number of partitions: 12. Partition Key: Highway.","explanation":"There are 4 departments each running an App Service Plan with 3 instances = 12 concurrent consumers. To maximize parallelism and throughput, the number of partitions should match the number of consumers (12). Highway is the correct partition key because reports are produced per highway, ensuring even distribution and time-series locality.","images":["images/question63.png"],"source":"README"},{"id":64,"question":"You are developing a microservices solution. You plan to deploy the solution to a multinode Azure Kubernetes Service (AKS) cluster. You need to deploy a solution that includes the following features: reverse proxy capabilities configurable traffic routing TLS termination with a custom certificate. Which components should you use?","options":["Deploy solution: `Draft`. View cluster and external addressing: `CoreDNS`. Implement a single, public IP endpoint that is routed to multiple microservices: `Vrtual Kubelet`.","Deploy solution: `Helm`. View cluster and external addressing: `Brigade`. Implement a single, public IP endpoint that is routed to multiple microservices: `KubeCtl`.","Deploy solution: `Helm`. View cluster and external addressing: `KubeCtl`. Implement a single, public IP endpoint that is routed to multiple microservices: `Ingress Controller`.","Deploy solution: `Ingress Controller`. View cluster and external addressing: `Helm`. Implement a single, public IP endpoint that is routed to multiple microservices: `Brigade`."],"answer":"Deploy solution: `Helm`. View cluster and external addressing: `KubeCtl`. Implement a single, public IP endpoint that is routed to multiple microservices: `Ingress Controller`.","explanation":"Helm is the Kubernetes package manager used to deploy applications. kubectl is the CLI used to view cluster state including services and external IPs. An Ingress Controller provides a single public IP with reverse proxy, configurable traffic routing, and TLS termination to route to multiple backend microservices.","images":["images/question64.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"Deploy solution","choices":["`Draft`","`Helm`","`Ingress Controller`","`CoreDNS`","`Brigade`","`KubeCtl`","`Vrtual Kubelet`"],"correct":"`Helm`"},{"label":"View cluster and external addressing","choices":["`Draft`","`Helm`","`Ingress Controller`","`CoreDNS`","`Brigade`","`KubeCtl`","`Vrtual Kubelet`"],"correct":"`KubeCtl`"},{"label":"Implement a single, public IP endpoint that is routed to multiple microservices","choices":["`Draft`","`Helm`","`Ingress Controller`","`CoreDNS`","`Brigade`","`KubeCtl`","`Vrtual Kubelet`"],"correct":"`Ingress Controller`"}]},{"id":65,"question":"You are implementing an order processing system. A point of sale application publishes orders to topics in an Azure Service Bus queue. The Label property for the topic includes the following data. The system has the following requirements for subscriptions. You need to implement filtering and maximize throughput while evaluating filters. Which filter types should you implement?","options":["Box 1: `SQLFilter`. Box 2: `CorrelationFilter`. Box 3: `SQLFilter`. Box 4: `SQLFilter`. Box 5: No Filter.","Box 1: `CorrelationFilter`. Box 2: `SQLFilter`. Box 3: No Filter. Box 4: `CorrelationFilter`. Box 5: `SQLFilter`.","Box 1: No Filter. Box 2: `CorrelationFilter`. Box 3: `SQLFilter`. Box 4: `SQLFilter`. Box 5: No Filter.","Box 1: No Filter. Box 2: `SQLFilter`. Box 3: `SQLFilter`. Box 4: `CorrelationFilter`. Box 5: `CorrelationFilter`."],"answer":"Box 1: `SQLFilter`. Box 2: `CorrelationFilter`. Box 3: `SQLFilter`. Box 4: `SQLFilter`. Box 5: No Filter.","explanation":"[Medium confidence] Correlation filters match exact properties (like Label) and offer higher throughput than SQL filters. SQL filters use SQL-like syntax for complex property evaluation. Where simple equality on Label is required use Correlation; where richer property logic is needed use SQL; when the subscription should receive all messages, no filter is applied.","images":["images/question65_1.png","images/question65_2.png","images/question65_3.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["No Filter","`CorrelationFilter`","`SQLFilter`"],"correct":"`SQLFilter`"},{"label":"Box 2","choices":["No Filter","`CorrelationFilter`","`SQLFilter`"],"correct":"`CorrelationFilter`"},{"label":"Box 3","choices":["No Filter","`CorrelationFilter`","`SQLFilter`"],"correct":"`SQLFilter`"},{"label":"Box 4","choices":["No Filter","`CorrelationFilter`","`SQLFilter`"],"correct":"`SQLFilter`"},{"label":"Box 5","choices":["No Filter","`CorrelationFilter`","`SQLFilter`"],"correct":"No Filter"}]},{"id":66,"question":"Your company has several websites that use a company logo image. You use Azure Content Delivery Network (CDN) to store the static image. You need to determine the correct process of how the CDN and the Point of Presence (POP) server will distribute the image and list the items in the correct order. In which order do the actions occur?","options":["Box 1: If no edge servers in the POP have the image in cache, the POP requests the file from the origin server. Box 2: Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired. Box 3: The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client. Box 4: A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location.","Box 1: A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location. Box 2: If no edge servers in the POP have the image in cache, the POP requests the file from the origin server. Box 3: The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client. Box 4: Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired.","Box 1: Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired. Box 2: A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location. Box 3: If no edge servers in the POP have the image in cache, the POP requests the file from the origin server. Box 4: The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client.","Box 1: The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client. Box 2: A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location. Box 3: Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired. Box 4: If no edge servers in the POP have the image in cache, the POP requests the file from the origin server."],"answer":"Box 1: A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location. Box 2: If no edge servers in the POP have the image in cache, the POP requests the file from the origin server. Box 3: The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client. Box 4: Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired.","explanation":"CDN flow: (1) user requests file and DNS routes to best POP, (2) POP cache miss triggers origin fetch, (3) origin returns file which is cached at the edge and served to the client, (4) subsequent requests are served from cache until TTL expires.","images":["images/question66.jpg"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location","If no edge servers in the POP have the image in cache, the POP requests the file from the origin server","Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired","The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client"],"correct":"A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location"},{"label":"Box 2","choices":["A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location","If no edge servers in the POP have the image in cache, the POP requests the file from the origin server","Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired","The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client"],"correct":"If no edge servers in the POP have the image in cache, the POP requests the file from the origin server"},{"label":"Box 3","choices":["A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location","If no edge servers in the POP have the image in cache, the POP requests the file from the origin server","Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired","The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client"],"correct":"The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client"},{"label":"Box 4","choices":["A user requests the image from the CDN URL. The DNS routes the request to the best performing POP location","If no edge servers in the POP have the image in cache, the POP requests the file from the origin server","Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired","The origin server returns the logo image to an edge server in the POP. An edge server in the POP caches the logo image and returns the image to the client"],"correct":"Subsequent requests for the file may be directed to the same POP using the CDN logo image URL. The POP edge server returns the file from cache if the TTL has not expired"}],"orderMode":true},{"id":67,"question":"You are developing an Azure Cosmos DB solution by using the Azure Cosmos DB SQL API. The data includes millions of documents. Each document may contain hundreds of properties. The properties of the documents do not contain distinct values for partitioning. Azure Cosmos DB must scale individual containers in the database to meet the performance needs of the application by spreading the workload evenly across all partitions over time. You need to select a partition key. Which two partition keys can you use?","options":["A single property value that does not appear frequently in the documents.","A value containing the collection name.","A single property value that appears frequently in the documents.","A concatenation of multiple property values with a random suffix appended.","A hash suffix appended to a property value."],"answer":"A concatenation of multiple property values with a random suffix appended.|A hash suffix appended to a property value.","explanation":"Good partition keys have high cardinality and distribute requests evenly. When no single property has distinct enough values, synthetic partition keys work well: concatenate multiple properties with a random suffix, or append a computed hash suffix. Both spread the workload across many logical partitions.","images":[],"source":"README"},{"id":68,"question":"You are developing an Azure-hosted e-commerce web application. The application will use Azure Cosmos DB to store sales orders. You are using the latest SDK to manage the sales orders in the database. You create a new Azure Cosmos DB instance. You include a valid endpoint and valid authorization key to an `appSettings.json` file in the code project. You are evaluating the following application code: (Line number are included for reference only.). Question 1: A database named `SalesOrders` is created. The database will include two containers.","options":["Yes.","No."],"answer":"Yes.","explanation":"[Medium confidence] If the code calls CreateDatabaseIfNotExistsAsync with name 'SalesOrders' and then creates two containers on that database, the database will contain two containers. This is the standard Cosmos DB SDK pattern for provisioning resources.","images":["images/question68_69_70.png"],"source":"README"},{"id":69,"question":"You are developing an Azure-hosted e-commerce web application. The application will use Azure Cosmos DB to store sales orders. You are using the latest SDK to manage the sales orders in the database. You create a new Azure Cosmos DB instance. You include a valid endpoint and valid authorization key to an `appSettings.json` file in the code project. You are evaluating the following application code: (Line number are included for reference only.). Question 2: `Container1` will contain two items.","options":["Yes.","No."],"answer":"Yes.","explanation":"[FLAGGED - lower confidence] Answer depends on exact code shown in the image. Typically Container1 receives two item upserts/creations in the sample, resulting in two items. Flagged because validation requires the image content.","images":["images/question68_69_70.png"],"source":"README"},{"id":70,"question":"You are developing an Azure-hosted e-commerce web application. The application will use Azure Cosmos DB to store sales orders. You are using the latest SDK to manage the sales orders in the database. You create a new Azure Cosmos DB instance. You include a valid endpoint and valid authorization key to an `appSettings.json` file in the code project. You are evaluating the following application code: (Line number are included for reference only.). Question 3: `Container2` will contain one item.","options":["Yes.","No."],"answer":"Yes.","explanation":"[FLAGGED - lower confidence] Answer depends on exact code shown in the image. Typically Container2 has one item added in the sample code. Flagged because validation requires inspection of the image to confirm the exact number of items created.","images":["images/question68_69_70.png"],"source":"README"},{"id":71,"question":"You develop an Azure solution that uses Cosmos DB. The current Cosmos DB container must be replicated and must use a partition key that is optimized for queries. You need to implement a change feed processor solution. Which change feed processor components should you use?","options":["Store the data from which the change feed is generated: Host. Coordinate processing of the change feed across multiple workers: Delegate. Use the change feed processor to listen for changes: Lease container. Handle each batch of changes: Monitored container.","Store the data from which the change feed is generated: Lease container. Coordinate processing of the change feed across multiple workers: Host. Use the change feed processor to listen for changes: Delegate. Handle each batch of changes: Monitored container.","Store the data from which the change feed is generated: Delegate. Coordinate processing of the change feed across multiple workers: Monitored container. Use the change feed processor to listen for changes: Lease container. Handle each batch of changes: Host.","Store the data from which the change feed is generated: Monitored container. Coordinate processing of the change feed across multiple workers: Lease container. Use the change feed processor to listen for changes: Host. Handle each batch of changes: Delegate."],"answer":"Store the data from which the change feed is generated: Monitored container. Coordinate processing of the change feed across multiple workers: Lease container. Use the change feed processor to listen for changes: Host. Handle each batch of changes: Delegate.","explanation":"Change feed processor has four components: the Monitored container holds the source data and generates the feed; the Lease container stores state to coordinate multiple workers; the Host (compute instance) runs the processor and listens for changes; the Delegate is the user-defined code that processes each batch.","images":["images/question71.png"],"source":"README","boxMode":true,"boxes":[{"label":"Store the data from which the change feed is generated","choices":["Host","Lease container","Delegate","Monitored container"],"correct":"Monitored container"},{"label":"Coordinate processing of the change feed across multiple workers","choices":["Host","Lease container","Delegate","Monitored container"],"correct":"Lease container"},{"label":"Use the change feed processor to listen for changes","choices":["Host","Lease container","Delegate","Monitored container"],"correct":"Host"},{"label":"Handle each batch of changes","choices":["Host","Lease container","Delegate","Monitored container"],"correct":"Delegate"}]},{"id":72,"question":"You develop a web application. You need to register the application with an active Microsoft Entra ID tenant. Which three actions should you perform in sequence?","options":["Box 1: Select Manifest from the middle-tier service registration. Box 2: Add a Cryptographic key. Box 3: In App Registrations, select New registration.","Box 1: In App Registrations, select New registration. Box 2: Select the Microsoft Entra ID instance (on picture still as Azure AD). Box 3: Select Manifest from the middle-tier service registration.","Box 1: In App Registrations, select New registration. Box 2: Select the Microsoft Entra ID instance (on picture still as Azure AD). Box 3: Create a new application and provide the name, account type, and redirect URI.","Box 1: In Enterprise Applications, select New application. Box 2: In App Registrations, select New registration. Box 3: Select the Microsoft Entra ID instance (on picture still as Azure AD)."],"answer":"Box 1: In App Registrations, select New registration. Box 2: Select the Microsoft Entra ID instance (on picture still as Azure AD). Box 3: Create a new application and provide the name, account type, and redirect URI.","explanation":"To register a web application in Entra ID: first navigate to App Registrations and select New registration, then select the target Entra ID tenant, then fill in the application name, supported account types, and redirect URI to complete registration.","images":["images/question72.jpg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Add a Cryptographic key","Create a new application and provide the name, account type, and redirect URI","In App Registrations, select New registration","In Enterprise Applications, select New application","Select Manifest from the middle-tier service registration","Select the Microsoft Entra ID instance (on picture still as Azure AD)"],"correct":"In App Registrations, select New registration"},{"label":"Box 2","choices":["Add a Cryptographic key","Create a new application and provide the name, account type, and redirect URI","In App Registrations, select New registration","In Enterprise Applications, select New application","Select Manifest from the middle-tier service registration","Select the Microsoft Entra ID instance (on picture still as Azure AD)"],"correct":"Select the Microsoft Entra ID instance (on picture still as Azure AD)"},{"label":"Box 3","choices":["Add a Cryptographic key","Create a new application and provide the name, account type, and redirect URI","In App Registrations, select New registration","In Enterprise Applications, select New application","Select Manifest from the middle-tier service registration","Select the Microsoft Entra ID instance (on picture still as Azure AD)"],"correct":"Create a new application and provide the name, account type, and redirect URI"}],"orderMode":true},{"id":73,"question":"You have a new Azure subscription. You are developing an internal website for employees to view sensitive data. The website uses Microsoft Entra ID for authentication. You need to implement multifactor authentication for the website. Which two actions should you perform?","options":["Configure the website to use Microsoft Entra ID B2C.","MFA Enabled by conditional access policy.","In Microsoft Entra ID, create a new conditional access policy.","Upgrade to Microsoft Entra ID Premium.","In Microsoft Entra ID, enable application proxy.","In Microsoft Entra ID conditional access, enable the baseline policy."],"answer":"Upgrade to Microsoft Entra ID Premium.|In Microsoft Entra ID, create a new conditional access policy.","explanation":"Conditional Access policies, including MFA enforcement rules, require Microsoft Entra ID Premium P1 or higher. You must first upgrade the tenant to Entra ID Premium, then create a conditional access policy that requires MFA for users accessing the application. B2C is for customer identities, and baseline policies are deprecated.","images":[],"source":"README"},{"id":74,"question":"You are developing a Java application that uses Cassandra to store key and value data. You plan to use a new Azure Cosmos DB resource and the Cassandra API in the application. You create an Microsoft Entra ID group named Cosmos DB Creators to enable provisioning of Azure Cosmos accounts, databases, and containers. The Microsoft Entra ID group must not be able to access the keys that are required to access the data. You need to restrict access to the Microsoft Entra ID group. Which role-based access control should you use?","options":["DocumentDB Accounts Contributor.","Cosmos Backup Operator.","Cosmos DB Operator.","Cosmos DB Account Reader."],"answer":"Cosmos DB Operator.","explanation":"The Cosmos DB Operator role allows provisioning of Cosmos DB accounts, databases, and containers, but explicitly does not grant access to the account keys or data. DocumentDB Accounts Contributor does grant key access. Backup Operator and Account Reader do not allow provisioning.","images":[],"source":"README"},{"id":75,"question":"You are developing a website that will run as an Azure Web App. Users will authenticate by using their Microsoft Entra ID credentials. You plan to assign users one of the following permission levels for the website: `admin`, `normal`, and `reader`. A user's Microsoft Entra ID group membership must be used to determine the permission level. You need to configure authorization. Solution: Configure the Azure Web App for the website to allow only authenticated requests and require Microsoft Entra ID log on. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Only enabling authentication via Entra ID ensures the user is signed in, but does not expose group membership to the app. Without configuring the groupMembershipClaims setting and reading the groups claim from the JWT, the app cannot determine which permission level to assign based on group membership.","images":[],"source":"README"},{"id":76,"question":"You are developing a website that will run as an Azure Web App. Users will authenticate by using their Microsoft Entra ID credentials. You plan to assign users one of the following permission levels for the website: `admin`, `normal`, and `reader`. A user's Microsoft Entra ID group membership must be used to determine the permission level. You need to configure authorization. Solution: Create a new Microsoft Entra ID application. In the application's manifest, set value of the `groupMembershipClaims` option to All. In the website, use the value of the groups claim from the JWT for the user to determine permissions. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Setting groupMembershipClaims to All in the app manifest causes Entra ID to emit a 'groups' claim in the JWT listing the user's group IDs. The application can then map groups to permission levels (admin/normal/reader) based on the groups claim, satisfying the goal.","images":[],"source":"README"},{"id":77,"question":"You are developing a website that will run as an Azure Web App. Users will authenticate by using their Microsoft Entra ID credentials. You plan to assign users one of the following permission levels for the website: `admin`, `normal`, and `reader`. A user's Microsoft Entra ID group membership must be used to determine the permission level. You need to configure authorization. Solution: Create a new Microsoft Entra ID application. In the application's manifest, define application roles that match the required permission levels for the application. Assign the appropriate Microsoft Entra ID group to each role. In the website, use the value of the roles claim from the JWT for the user to determine permissions. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Defining app roles in the application manifest and assigning Entra ID groups to those roles causes Entra ID to emit a 'roles' claim in the JWT for the user based on their group membership. The app reads the roles claim to determine permission level. This is a valid pattern and meets the goal.","images":[],"source":"README"},{"id":78,"question":"You are developing an application to securely transfer data between on-premises file systems and Azure Blob storage. The application stores keys, secrets, and certificates in Azure Key Vault. The application uses the Azure Key Vault APIs. The application must allow recovery of an accidental deletion of the key vault or key vault objects. Key vault objects must be retained for 90 days after deletion. You need to protect the key vault and key vault objects. Which Azure Key Vault feature should you use?","options":["Enable retention period and accidental deletion: Soft delete. Enforce retention period and accidental deletion: Purge protection.","Enable retention period and accidental deletion: Access policy. Enforce retention period and accidental deletion: Soft delete.","Enable retention period and accidental deletion: Shared access signature. Enforce retention period and accidental deletion: Pure protection.","Enable retention period and accidental deletion: Soft delete. Enforce retention period and accidental deletion: Shared access signature."],"answer":"Enable retention period and accidental deletion: Soft delete. Enforce retention period and accidental deletion: Purge protection.","explanation":"Soft delete enables recovery of deleted key vaults and objects within a retention period (up to 90 days). Purge protection enforces the retention policy by preventing any purge (including by admins) until the retention period expires, guaranteeing that deleted items cannot be permanently removed prematurely.","images":["images/question78.png"],"source":"README","boxMode":true,"boxes":[{"label":"Enable retention period and accidental deletion","choices":["Soft delete","Access policy","Shared access signature","Purge protection","Pure protection"],"correct":"Soft delete"},{"label":"Enforce retention period and accidental deletion","choices":["Soft delete","Access policy","Shared access signature","Purge protection","Pure protection"],"correct":"Purge protection"}]},{"id":79,"question":"You provide an Azure API Management managed web service to clients. The back-end web service implements HTTP Strict Transport Security (HSTS). Every request to the backend service must include a valid HTTP authorization header. You need to configure the Azure API Management instance with an authentication policy. Which two policies can you use?","options":["Basic Authentication.","Digest Authentication.","Certificate Authentication.","OAuth Client Credential Grant."],"answer":"Basic Authentication.|Certificate Authentication.","explanation":"APIM supports two built-in backend authentication policies: Basic (authentication-basic) which sends username/password in the Authorization header, and Client Certificate (authentication-certificate) which presents a client certificate. Digest and OAuth Client Credentials are not native APIM authentication policies for this scenario.","images":[],"source":"README"},{"id":80,"question":"You are developing an ASP.NET Core website that can be used to manage photographs which are stored in Azure Blob Storage containers. Users of the website authenticate by using their Microsoft Entra ID credentials. You implement role-based access control (RBAC) role permissions on the containers that store photographs. You assign users to RBAC roles. You need to configure the website's Microsoft Entra ID Application so that user's permissions can be used with the Azure Blob containers. How should you configure the application?","options":["Azure Storage Permission: `client_id`. Azure Storage Type: `application`. Microsoft Graph Type: `user_impersonation`.","Azure Storage Permission: `client_id`. Azure Storage Type: `profile`. Microsoft Graph Type: `application`.","Azure Storage Permission: `user_impersonation`. Azure Storage Type: `delegated`. Microsoft Graph Type: `delegated`.","Azure Storage Permission: `user_impersonation`. Azure Storage Type: `delegated`. Microsoft Graph Type: `profile`."],"answer":"Azure Storage Permission: `user_impersonation`. Azure Storage Type: `delegated`. Microsoft Graph Type: `delegated`.","explanation":"Because users authenticate interactively and the app must act on their behalf against Blob Storage using their RBAC permissions, both Azure Storage and Microsoft Graph must be configured as delegated permissions with user_impersonation scope. Application permissions would use the app identity, bypassing user RBAC.","images":["images/question80.png"],"source":"README","boxMode":true,"boxes":[{"label":"Azure Storage Permission","choices":["`client_id`","`user_impersonation`","`application`","`profile`","`delegated`"],"correct":"`user_impersonation`"},{"label":"Azure Storage Type","choices":["`client_id`","`user_impersonation`","`application`","`profile`","`delegated`"],"correct":"`delegated`"},{"label":"Microsoft Graph Type","choices":["`client_id`","`user_impersonation`","`application`","`profile`","`delegated`"],"correct":"`delegated`"}]},{"id":81,"question":"You are developing an ASP.NET Core app that includes feature flags which are managed by Azure App Configuration. You create an Azure App Configuration store named `AppFeatureFlagStore` that contains a feature flag named `Export`. You need to update the app to meet the following requirements: Use the `Export` feature in the app without requiring a restart of the app. Validate users before users are allowed access to secure resources. Permit users to access secure resources. How should you complete the code segment?","options":["Box 1: `UseSession`. Box 2: `UseCookiePolicy`. Box 3: `UseStaticFiles`.","Box 1: `UseAuthentication`. Box 2: `UseAuthorization`. Box 3: `UseStaticFiles`.","Box 1: `UseCookiePolicy`. Box 2: `UseHttpsRedirection`. Box 3: `UseCors`.","Box 1: `UseAuthentication`. Box 2: `UseAuthorization`. Box 3: `UseAzureAppConfiguration`."],"answer":"Box 1: `UseAuthentication`. Box 2: `UseAuthorization`. Box 3: `UseAzureAppConfiguration`.","explanation":"UseAuthentication validates users (authentication middleware must run first). UseAuthorization then permits access to secure resources based on identity. UseAzureAppConfiguration enables dynamic feature flag refresh from the App Configuration store without requiring an app restart.","images":["images/question81.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`UseAuthentication`","`UseCookiePolicy`","`UseSession`","`UseAuthorization`","`UseHttpsRedirection`","`UseAzureAppConfiguration`","`UseCors`","`UseStaticFiles`"],"correct":"`UseAuthentication`"},{"label":"Box 2","choices":["`UseAuthentication`","`UseCookiePolicy`","`UseSession`","`UseAuthorization`","`UseHttpsRedirection`","`UseAzureAppConfiguration`","`UseCors`","`UseStaticFiles`"],"correct":"`UseAuthorization`"},{"label":"Box 3","choices":["`UseAuthentication`","`UseCookiePolicy`","`UseSession`","`UseAuthorization`","`UseHttpsRedirection`","`UseAzureAppConfiguration`","`UseCors`","`UseStaticFiles`"],"correct":"`UseAzureAppConfiguration`"}]},{"id":82,"question":"You have an application that includes an Azure Web app and several Azure Function apps. Application secrets including connection strings and certificates are stored in Azure Key Vault. Secrets must not be stored in the application or application runtime environment. Changes to Microsoft Entra ID must be minimized. You need to design the approach to loading application secrets. What should you do?","options":["Create a single user-assigned Managed Identity with permission to access Key Vault and configure each App Service to use that Managed Identity.","Create a single Microsoft Entra ID Service Principal with permission to access Key Vault and use a client secret from within the App Services to access Key Vault.","Create a system assigned Managed Identity in each App Service with permission to access Key Vault.","Create an Microsoft Entra ID Service Principal with Permissions to access Key Vault for each App Service and use a certificate from within the App Services to access Key Vault."],"answer":"Create a system assigned Managed Identity in each App Service with permission to access Key Vault.","explanation":"System-assigned Managed Identities avoid storing credentials in the app or runtime and are automatically created/deleted with the resource. They minimize Microsoft Entra ID changes since Azure manages the identity lifecycle. User-assigned identity (single) would still work but the question emphasizes no secrets in app - system-assigned is the cleanest match.","images":[],"source":"README"},{"id":83,"question":"You are developing a medical records document management website. The website is used to store scanned copies of patient intake forms. If the stored intake forms are downloaded from storage by a third party, the contents of the forms must not be compromised. You need to store the intake forms according to the requirements. Solution: 1. Create an Azure Key Vault key named `skey`. 2. Encrypt the intake forms using the public key portion of `skey`. 3. Store the encrypted data in Azure Blob storage. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Using a Key Vault key's public key to encrypt the forms before storing in Blob Storage satisfies the requirement: even if the encrypted blobs are downloaded by a third party, they cannot read them without the private key held in Key Vault. This is asymmetric envelope encryption.","images":[],"source":"README"},{"id":84,"question":"You are developing a medical records document management website. The website is used to store scanned copies of patient intake forms. If the stored intake forms are downloaded from storage by a third party, the contents of the forms must not be compromised. You need to store the intake forms according to the requirements. Solution: 1. Create an Azure Cosmos DB database with Storage Service Encryption enabled. 2. Store the intake forms in the Azure Cosmos DB database. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Cosmos DB is not designed to store large scanned document files (it is a JSON document database with item size limits of 2 MB). Additionally, Storage Service Encryption only protects at rest on Microsoft's side - if credentials are compromised, a third party can read the data. The scenario requires encryption tied to a customer key.","images":[],"source":"README"},{"id":85,"question":"You are developing a medical records document management website. The website is used to store scanned copies of patient intake forms. If the stored intake forms are downloaded from storage by a third party, the contents of the forms must not be compromised. You need to store the intake forms according to the requirements. Solution: Store the intake forms as Azure Key Vault secrets. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Key Vault secrets are limited to 25 KB in size and are intended for small configuration values like passwords and connection strings - not for scanned documents. Key Vault is also not an appropriate document store.","images":[],"source":"README"},{"id":86,"question":"You plan to deploy a new application to a Linux virtual machine (VM) that is hosted in Azure. The entire VM must be secured at rest by using industry-standard encryption technology to address organizational security and compliance requirements. You need to configure Azure Disk Encryption for the VM. How should you complete the Azure CLI commands?","options":["Box 1: `keyvault`. Box 2: `keyvault key`. Box 3: `vm`. Box 4: `vm encryption`. Box 5: `all`.","Box 1: `vm`. Box 2: `vm encryption`. Box 3: `keyvault key`. Box 4: `keyvault`. Box 5: `data`.","Box 1: `vm encryption`. Box 2: `vm`. Box 3: `keyvault`. Box 4: `keyvault key`. Box 5: `all`.","Box 1: `keyvault key`. Box 2: `keyvault`. Box 3: `vm encryption`. Box 4: `vm`. Box 5: `os`."],"answer":"Box 1: `keyvault`. Box 2: `keyvault key`. Box 3: `vm`. Box 4: `vm encryption`. Box 5: `all`.","explanation":"The correct order to enable Azure Disk Encryption via CLI: 1) az keyvault create (create the vault), 2) az keyvault key create (create the KEK), 3) az vm create (create the VM), 4) az vm encryption enable (enable encryption), with --volume-type all to encrypt both OS and data disks.","images":["images/question86.jpg"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`keyvault key`","`keyvault`","`vm encryption`","`vm`","`all`","`data`","`os`"],"correct":"`keyvault`"},{"label":"Box 2","choices":["`keyvault key`","`keyvault`","`vm encryption`","`vm`","`all`","`data`","`os`"],"correct":"`keyvault key`"},{"label":"Box 3","choices":["`keyvault key`","`keyvault`","`vm encryption`","`vm`","`all`","`data`","`os`"],"correct":"`vm`"},{"label":"Box 4","choices":["`keyvault key`","`keyvault`","`vm encryption`","`vm`","`all`","`data`","`os`"],"correct":"`vm encryption`"},{"label":"Box 5","choices":["`keyvault key`","`keyvault`","`vm encryption`","`vm`","`all`","`data`","`os`"],"correct":"`all`"}]},{"id":87,"question":"Your company is developing an Azure API hosted in Azure. You need to implement authentication for the Azure API to access other Azure resources. You have the following requirements: All API calls must be authenticated. Callers to the API must not send credentials to the API. Which authentication mechanism should you use?","options":["Basic.","Anonymous.","Managed identity.","Client certificate."],"answer":"Managed identity.","explanation":"Managed identity allows the API to authenticate to other Azure resources without callers needing to send credentials. Azure manages the identity and its token lifecycle automatically, satisfying both requirements - authenticated calls with no caller-supplied credentials.","images":[],"source":"README"},{"id":88,"question":"You are using Azure Front Door Service. You are expecting inbound files to be compressed by using Brotli compression. You discover that inbound XML files are not compressed. The files are 9 megabytes (MB) in size. You need to determine the root cause for the issue. Question 1: The file MIME type is supported by the service.","options":["Yes.","No."],"answer":"Yes.","explanation":"XML (application/xml and text/xml) IS in the default MIME type list supported by Azure Front Door compression. The actual root cause is the file size: Front Door only compresses files between 1 KB and 8 MB. Since the files are 9 MB, they exceed the maximum size limit - not a MIME type issue.","images":[],"source":"README"},{"id":89,"question":"You are using Azure Front Door Service. You are expecting inbound files to be compressed by using Brotli compression. You discover that inbound XML files are not compressed. The files are 9 megabytes (MB) in size. You need to determine the root cause for the issue. Question 2: Edge nodes must be purged of all cache assets.","options":["Yes.","No."],"answer":"No.","explanation":"Purging edge cache is unrelated to compression failing. Compression occurs at the edge when files are served, regardless of cache state. The real root cause is the 9 MB file size exceeding Front Door's 8 MB maximum compression limit. Purging the cache would not enable compression of oversized files.","images":[],"source":"README"},{"id":90,"question":"You are using Azure Front Door Service. You are expecting inbound files to be compressed by using Brotli compression. You discover that inbound XML files are not compressed. The files are 9 megabytes (MB) in size. You need to determine the root cause for the issue. Question 3: The compression type is supported.","options":["Yes.","No."],"answer":"Yes.","explanation":"Brotli IS a supported compression type in Azure Front Door (along with gzip). So the compression type itself is supported - confirming this is not the cause. The actual failure is due to the 9 MB file exceeding the 8 MB maximum size for compressible content.","images":[],"source":"README"},{"id":91,"question":"You are developing an application. You have an Azure user account that has access to two subscriptions. You need to retrieve a storage account key secret from Azure Key Vault. In which order should you arrange the PowerShell commands to develop the solution?","options":["Box 1: `Get-AzSubscription`. Box 2: `Set-AzContext -SubscriptionId $subscriptionID`. Box 3: `Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`. Box 4: `Get-AzKeyVaultSecret -VaultName $vaultName`. Box 5: `$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`.","Box 1: `Set-AzContext -SubscriptionId $subscriptionID`. Box 2: `Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`. Box 3: `Get-AzKeyVaultSecret -VaultName $vaultName`. Box 4: `$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`. Box 5: `Get-AzSubscription`.","Box 1: `Get-AzSubscription`. Box 2: `Set-AzContext -SubscriptionId $subscriptionID`. Box 3: `Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`. Box 4: `$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`. Box 5: `Get-AzKeyVaultSecret -VaultName $vaultName`.","Box 1: `Get-AzKeyVaultSecret -VaultName $vaultName`. Box 2: `Get-AzSubscription`. Box 3: `Set-AzContext -SubscriptionId $subscriptionID`. Box 4: `Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`. Box 5: `$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`."],"answer":"Box 1: `Get-AzSubscription`. Box 2: `Set-AzContext -SubscriptionId $subscriptionID`. Box 3: `Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`. Box 4: `$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`. Box 5: `Get-AzKeyVaultSecret -VaultName $vaultName`.","explanation":"Correct sequence: 1) List subscriptions, 2) Set active subscription context, 3) Retrieve storage account key, 4) Convert key to SecureString and store in Key Vault as a secret, 5) Finally retrieve the secret to verify/use it.","images":["images/question91.png"],"source":"RE
