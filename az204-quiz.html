 Service Bus queue","Add an action that sends an email to","Add an action that sends an email to specified personnel if the temperature is outside of those thresholds","Create a blank Logic app","Outbound"],"correct":"Add an action that sends an email to"}],"orderMode":true},{"id":140,"question":"You are creating a hazard notification system that has a single signaling server which triggers audio and visual alarms to start and stop. You implement Azure Service Bus to publish alarms. Each alarm controller uses Azure Service Bus to receive alarm signals as part of a transaction. Alarm events must be recorded for audit purposes. Each transaction record must include information about the alarm type that was activated. You need to implement a reply trail auditing solution. Which two actions should you perform?","options":["Assign the value of the hazard message `SessionID` property to the `ReplyToSessionId` property.","Assign the value of the hazard message `MessageId` property to the `DevileryCount` property.","Assign the value of the hazard message `SessionID` property to the `SequenceNumber` property.","Assign the value of the hazard message `MessageId` property to the `CorrelationId` property.","Assign the value of the hazard message `SequenceNumber` property to the `DeliveryCount` property.","Assign the value of the hazard message `MessageId` property to the `SequenceNumber` property."],"answer":"Assign the value of the hazard message `SessionID` property to the `ReplyToSessionId` property.|Assign the value of the hazard message `MessageId` property to the `CorrelationId` property.","explanation":"For reply-trail auditing in Service Bus, set CorrelationId on the reply equal to the original MessageId so responses can be traced to their request, and set ReplyToSessionId equal to the original SessionId so session-aware receivers can route replies back to the correct session.","images":[],"source":"README"},{"id":141,"question":"You are developing applications for a company. You plan to host the applications on Azure App Services. The company has the following requirements: Every five minutes verify that the websites are responsive. Verify that the websites respond within a specified time threshold. Dependent requests such as images and JavaScript files must load properly. Generate alerts if a website is experiencing issues. If a website fails to load, the system must attempt to reload the site three more times. You need to implement this process with the least amount of effort. What should you do?","options":["Create a Selenium web test and configure it to run from your workstation as a scheduled task.","Set up a URL ping test to query the home page.","Create an Azure function to query the home page.","Create a multi-step web test to query the home page.","Create a Custom Track Availability Test to query the home page."],"answer":"Create a multi-step web test to query the home page.","explanation":"A URL ping test only checks a single URL and cannot validate dependent requests (images, JS) or chain multiple steps. A multi-step web test records a sequence of HTTP requests and can verify dependent resources load, response-time thresholds, and retries. Application Insights automatically retries failed availability tests from multiple locations. Note: multi-step web tests are deprecated in 2024, but remain the historically correct AZ-204 answer for this scenario.","images":[],"source":"README"},{"id":142,"question":"You develop and add several functions to an Azure Function app that uses the latest runtime host. The functions contain several REST API endpoints secured by using SSL. The Azure Function app runs in a Consumption plan. You must send an alert when any of the function endpoints are unavailable or responding too slowly. You need to monitor the availability and responsiveness of the functions. What should you do?","options":["Create a URL ping test.","Create a timer triggered function that calls `TrackAvailability()` and send the results to Application Insights.","Create a timer triggered function that calls `GetMetric('Request Size')` and send the results to Application Insights.","Add a new diagnostic setting to the Azure Function app. Enable the `FunctionAppLogs` and Send to Log Analytics options."],"answer":"Create a timer triggered function that calls `TrackAvailability()` and send the results to Application Insights.","explanation":"Standard URL ping tests cannot authenticate against SSL-protected endpoints or handle custom logic. Application Insights TrackAvailability() API lets you submit custom availability results from a timer-triggered function, allowing you to test secured endpoints, validate response content, and trigger alerts. GetMetric tracks custom metrics, not availability. Diagnostic logs record events but do not proactively test availability.","images":[],"source":"README"},{"id":143,"question":"You are developing an e-commerce solution that uses a microservice architecture. You need to design a communication backplane for communicating transactional messages between various parts of the solution. Messages must be communicated in first-in-first-out (FIFO) order. What should you use?","options":["Azure Storage Queue.","Azure Event Hub.","Azure Service Bus.","Azure Event Grid."],"answer":"Azure Service Bus.","explanation":"Azure Service Bus supports FIFO ordering through sessions and is designed for transactional enterprise messaging with features like duplicate detection, dead-lettering, and transactions. Storage Queues do not guarantee FIFO. Event Hub is for high-throughput event streaming (not transactional messaging). Event Grid is for reactive event routing, not ordered message delivery.","images":[],"source":"README"},{"id":144,"question":"You are developing an Azure Service application that processes queue data when it receives a message from a mobile application. Messages may not be sent to the service consistently. You have the following requirements: Queue size must not grow larger than 80 gigabytes (GB). Use first-in-first-out (FIFO) ordering of messages. Minimize Azure costs. You need to implement the messaging solution. Solution: Use the .Net API to add a message to an Azure Service Bus Queue from the mobile application. Create an Azure Function App that uses an Azure Service Bus Queue trigger. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"[Medium confidence] Azure Service Bus queues support FIFO ordering (via sessions) and can scale to 80 GB with the Premium tier or partitioned Standard queues. A Service Bus-triggered Azure Function on Consumption plan minimizes cost by executing only when messages arrive. This meets all three requirements: 80 GB size, FIFO, and minimal cost.","images":[],"source":"README"},{"id":145,"question":"You are developing an Azure solution to collect point-of-sale (POS) device data from 2,000 stores located throughout the world. A single device can produce 2 megabytes (MB) of data every 24 hours. Each store location has one to five devices that send data. You must store the device data in Azure Blob storage. Device data must be correlated based on a device identifier. Additional stores are expected to open in the future. You need to implement a solution to receive the device data. Solution: Provision an Azure Notification Hub. Register all devices with the hub. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Notification Hubs is an outbound push-notification service used to send messages TO devices (iOS/Android/Windows), not to ingest telemetry FROM devices. It cannot correlate device data by identifier or store data to Blob storage. IoT Hub or Event Hub would be appropriate choices.","images":[],"source":"README"},{"id":146,"question":"You are developing an Azure solution to collect point-of-sale (POS) device data from 2,000 stores located throughout the world. A single device can produce 2 megabytes (MB) of data every 24 hours. Each store location has one to five devices that send data. You must store the device data in Azure Blob storage. Device data must be correlated based on a device identifier. Additional stores are expected to open in the future. You need to implement a solution to receive the device data. Solution: Provision an Azure Service Bus. Configure a topic to receive the device data by using a correlation filter. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"[FLAGGED - lower confidence] While Service Bus topics with correlation filters can route messages by device identifier, Service Bus is not designed for high-volume telemetry ingestion at this scale and lacks built-in capture to Blob storage. The canonical AZ-204 answer is Event Hubs with Capture (using device ID as partition key), which provides automatic blob persistence and correlation. Note: some exam sources mark this as Yes, but Event Hubs + Capture is the better-fit solution.","images":[],"source":"README"},{"id":147,"question":"You are developing an Azure solution to collect point-of-sale (POS) device data from 2,000 stores located throughout the world. A single device can produce 2 megabytes (MB) of data every 24 hours. Each store location has one to five devices that send data. You must store the device data in Azure Blob storage. Device data must be correlated based on a device identifier. Additional stores are expected to open in the future. You need to implement a solution to receive the device data. Solution: Provision an Azure Event Grid. Configure event filtering to evaluate the device identifier. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Event Grid is a reactive event-routing service for discrete events (e.g., blob created, resource changed), not for ingesting high-volume continuous device telemetry. It also does not natively persist payloads to Blob storage. Event Hubs with Capture is the correct service for this scenario.","images":[],"source":"README"},{"id":148,"question":"You are developing an Azure Service application that processes queue data when it receives a message from a mobile application. Messages may not be sent to the service consistently. You have the following requirements: Queue size must not grow larger than 80 gigabytes (GB). Use first-in-first-out (FIFO) ordering of messages. Minimize Azure costs. You need to implement the messaging solution. Solution: Use the .Net API to add a message to an Azure Storage Queue from the mobile application. Create an Azure Function App that uses an Azure Storage Queue trigger. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Storage Queues do NOT guarantee FIFO ordering; only Service Bus queues (with sessions) provide FIFO. Although Storage Queues can exceed 80 GB and are low cost, failing the FIFO requirement makes this solution invalid.","images":[],"source":"README"},{"id":149,"question":"You are developing an Azure Service application that processes queue data when it receives a message from a mobile application. Messages may not be sent to the service consistently. You have the following requirements: Queue size must not grow larger than 80 gigabytes (GB). Use first-in-first-out (FIFO) ordering of messages. Minimize Azure costs. You need to implement the messaging solution. Solution: Use the .Net API to add a message to an Azure Storage Queue from the mobile application. Create an Azure VM that is triggered from Azure Storage Queue events. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"This fails two requirements: Storage Queues do not guarantee FIFO ordering, and running a dedicated VM is far more expensive than a serverless Function and does not minimize Azure costs. Additionally, VMs cannot be directly 'triggered' by Storage Queue events without a polling service.","images":[],"source":"README"},{"id":150,"question":"You are developing a solution that will use Azure messaging services. You need to ensure that the solution uses a publish-subscribe model and eliminates the need for constant polling. What are two possible ways to achieve the goal?","options":["Service Bus.","Event Hub.","Event Grid.","Queue."],"answer":"Service Bus.|Event Grid.","explanation":"Both Service Bus (topics/subscriptions) and Event Grid implement a publish-subscribe model with push delivery, eliminating the need for consumer polling. Event Hub is a streaming service requiring consumers to pull data. Azure Queues use a polling/pull pattern and do not support pub/sub natively.","images":[],"source":"README"},{"id":151,"question":"A company is implementing a publish-subscribe (Pub/Sub) messaging component by using Azure Service Bus. You are developing the first subscription application. In the Azure portal you see that messages are being sent to the subscription for each topic. You create and initialize a subscription client object by supplying the correct details, but the subscription application is still not consuming the messages. You need to ensure that the subscription client processes all messages. Which code segment should you use?","options":["`await subscriptionClient.AddRuleAsync(new RuleDescription(RuleDescription.DefaultRuleName, new TrueFilter()));`.","`subscriptionClient = new SubscriptionClient(ServiceBusConnectionString, TopicName, SubscriptionName);`.","`await subscriptionClient.CloseAsync();`.","`subscriptionClient.RegisterMessageHandler(ProcessMessagesAsync, messageHandlerOptions);`."],"answer":"`subscriptionClient.RegisterMessageHandler(ProcessMessagesAsync, messageHandlerOptions);`.","explanation":"To process messages from a Service Bus subscription, you must register a message handler callback via RegisterMessageHandler, which invokes ProcessMessagesAsync for each received message. Simply creating a SubscriptionClient is not enough. AddRuleAsync adds filtering rules, and CloseAsync terminates the client.","images":[],"source":"README"},{"id":152,"question":"You are developing an Azure solution to collect point-of-sale (POS) device data from 2,000 stores located throughout the world. A single device can produce 2 megabytes (MB) of data every 24 hours. Each store location has one to five devices that send data. You must store the device data in Azure Blob storage. Device data must be correlated based on a device identifier. Additional stores are expected to open in the future. You need to implement a solution to receive the device data. Solution: Provision an Azure Event Hub. Configure the machine identifier as the partition key and enable capture. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Azure Event Hubs is designed for high-scale telemetry ingestion. Using the device identifier as the partition key ensures all data from the same device is correlated and ordered within a single partition. Enabling Event Hubs Capture automatically persists events to Azure Blob Storage without additional code. This satisfies all the requirements.","images":[],"source":"README"},{"id":153,"question":"A company is developing a solution that allows smart refrigerators to send temperature information to a central location. The solution must receive and store messages until they can be processed. You create an Azure Service Bus instance by providing a name, pricing tier, subscription, resource group, and location. You need to complete the configuration. Which Azure CLI or PowerShell command should you run?","options":["`az group create --name fridge-rg --location fridge-loc`.","`New-AzureRmServiceBusNamespace -ResourceGroupName fridge-rg -NamespaceName fridge-ns -Location fridge-loc`.","`New-AzureRmServiceBusQueue -ResourceGroupName fridge-rg -NamespaceName fridge-ns -Name fridge-q -EnablePartitioning $False`.","`az servicebus namespace create --resource-group fridge-rg --name fridge-rg --location fridge-loc`."],"answer":"`New-AzureRmServiceBusQueue -ResourceGroupName fridge-rg -NamespaceName fridge-ns -Name fridge-q -EnablePartitioning $False`.","explanation":"The question states the namespace has already been created (name, pricing tier, subscription, RG, location supplied). To complete the configuration and actually receive/store messages, a queue (or topic) must be created within the namespace. New-AzureRmServiceBusQueue creates this queue. The other commands create resource groups or namespaces, which already exist.","images":[],"source":"README"},{"id":154,"question":"Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share. A fellow administrator named `Jon Ross` used an Azure Resource Manager template to deploy a virtual machine and an Azure Storage account. You need to identify the Azure Resource Manager template the Jon Ross used. Solution: You access the `Container` blade. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"The Container blade shows blob container contents, not deployment history or ARM templates. To review the template used to deploy resources, you must use the Resource Group's Deployments blade.","images":[],"source":"README"},{"id":155,"question":"Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share. A fellow administrator named `Jon Ross` used an Azure Resource Manager template to deploy a virtual machine and an Azure Storage account. You need to identify the Azure Resource Manager template the Jon Ross used. Solution: You access the `Virtual Machine` blade. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"The Virtual Machine blade displays VM properties and settings but not the original ARM deployment template. Deployment history (including the template) is stored at the resource group level, not the individual resource level.","images":[],"source":"README"},{"id":156,"question":"Your company has an azure subscription that includes a storage account, a resource group, a blob container and a file share. A fellow administrator named `Jon Ross` used an Azure Resource Manager template to deploy a virtual machine and an Azure Storage account. You need to identify the Azure Resource Manager template the Jon Ross used. Solution: You access the `Resource Group` blade. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"ARM deployment history is stored at the resource group level. From the Resource Group blade you can open the Deployments pane, select the deployment, and view or download the exact ARM template that was used. This is the correct location to retrieve the template.","images":[],"source":"README"},{"id":157,"question":"You are developing a web app named `mywebapp1`. `Mywebapp1` uses the address `myapp1.azurewebsites.net`. You protect `mywebapp1` by implementing an Azure Web Application Firewall (WAF). The traffic to `mywebapp1` is routed through an Azure Application Gateway instance that is also used by other web apps. You want to secure all traffic to `mywebapp1` by using SSL. Solution: You open the Azure Application Gateway's HTTP setting and set the `Override` backend path option to `mywebapp1.azurewebsites.net`. You then enable the Use for App service option. Does this meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Because App Service uses shared infrastructure where the hostname identifies the backend app, the Application Gateway's HTTP settings must override the hostname with mywebapp1.azurewebsites.net and enable 'Pick host name from backend address' (Use for App Service). This ensures the gateway forwards traffic to the correct App Service and SSL works end-to-end.","images":[],"source":"README"},{"id":158,"question":"You are developing a web app named `mywebapp1`. `Mywebapp1` uses the address `myapp1.azurewebsites.net`. You protect `mywebapp1` by implementing an Azure Web Application Firewall (WAF). The traffic to `mywebapp1` is routed through an Azure Application Gateway instance that is also used by other web apps. You want to secure all traffic to `mywebapp1` by using SSL. Solution: You configure `mywebapp1` to run in an Azure App service environment (ASE). Does this meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Moving the app to an App Service Environment (ASE) changes the hosting model to an isolated environment but does NOT configure the Application Gateway to forward requests with the correct hostname for SSL termination. The correct solution requires configuring the HTTP settings override and Use for App Service option on the gateway.","images":[],"source":"README"},{"id":159,"question":"You are developing a web app named `mywebapp1`. `Mywebapp1` uses the address `myapp1.azurewebsites.net`. You protect `mywebapp1` by implementing an Azure Web Application Firewall (WAF). The traffic to `mywebapp1` is routed through an Azure Application Gateway instance that is also used by other web apps. You want to secure all traffic to `mywebapp1` by using SSL. Solution: You open the Azure Application Gateway's HTTP setting and set the `Override` backend path option to `mywebapp1.azurewebsites.net`. You then add an authentication certificate for `mywebapp1.azurewebsites.net`. Does this meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"[Medium confidence] Adding an authentication certificate is required for v1 SKU end-to-end SSL with self-signed backend certs, but this alone does not solve the host-header problem for a multi-tenant App Service. The correct approach is to override the backend path/host and enable 'Use for App Service' so Application Gateway sends the right Host header. Authentication certificate without the Use for App Service toggle is insufficient.","images":[],"source":"README"},{"id":160,"question":"Your company has a web app named `WebApp1`. You use the WebJobs SDK to design a triggered App Service background task that automatically invokes a function in the code every time new data is received in a queue. You are preparing to configure the service processes a queue data item. Which of the following is the service you should use?","options":["Logic Apps.","WebJobs.","Flow.","Functions."],"answer":"WebJobs.","explanation":"The question explicitly states you are using the WebJobs SDK to build a triggered App Service background task. WebJobs run in the context of an App Service and can be triggered by queue messages via the QueueTrigger attribute. Azure Functions is a separate service (built on WebJobs SDK) but is not what the scenario describes. Logic Apps and Flow (Power Automate) are workflow services.","images":[],"source":"README"},{"id":161,"question":"Your company has an Azure subscription. You need to deploy a number of Azure virtual machines to the subscription by using Azure Resource Manager (ARM) templates. The virtual machines will be included in a single availability set. You need to ensure that the ARM template allows for as many virtual machines as possible to remain accessible in the event of fabric failure or maintenance. Which of the following is the value that you should configure for the `platformFaultDomainCount` property?","options":["10.","30.","Min Value.","Max Value."],"answer":"Max Value.","explanation":"The platformFaultDomainCount property specifies the number of fault domains (groups of VMs sharing a common power source and network switch). Setting it to the Max Value distributes VMs across as many fault domains as possible, maximizing availability during fabric failures or maintenance events. Max value varies by Azure region (typically 2 or 3).","images":[],"source":"README"},{"id":162,"question":"You have two Hyper-V hosts named `Host1` and `Host2`. Host1 has an Azure virtual machine named `VM1` that was deployed by using a custom Azure Resource Manager template. You need to move `VM1` to `Host2`. What should you do?","options":["From the `Update management` blade, click `Enable`.","From the `Overview` blade, move `VM1` to a different subscription.","From the `Redeploy` blade, click `Redeploy`.","From the `Profile` blade, modify the usage location."],"answer":"From the `Redeploy` blade, click `Redeploy`.","explanation":"The Redeploy feature shuts down the VM, moves it to a new node within the Azure infrastructure (different host), and powers it back on. This is useful when you have difficulties troubleshooting an Azure VM or need to move it to a different Hyper-V host. Moving to a different subscription does not change the host.","images":[],"source":"README"},{"id":163,"question":"Your company has an Azure Kubernetes Service (AKS) cluster that you manage from an Microsoft Entra ID-joined device. The cluster is located in a resource group. Developers have created an application named `MyApp`. `MyApp` was packaged into a container image. You need to deploy the YAML manifest file for the application. Solution: You install the Azure CLI on the device and run the `kubectl apply -f myapp.yaml` command. Does this meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure CLI alone is not sufficient to deploy a Kubernetes YAML manifest. The kubectl apply command requires kubectl to be installed. You must first install kubectl (via az aks install-cli) and connect to the cluster with az aks get-credentials before running kubectl apply. The Azure CLI by itself does not include kubectl.","images":[],"source":"README"},{"id":164,"question":"Your company has an Azure Kubernetes Service (AKS) cluster that you manage from an Microsoft Entra ID-joined device. The cluster is located in a resource group. Developers have created an application named `MyApp`. `MyApp` was packaged into a container image. You need to deploy the YAML manifest file for the application. Solution: You install the docker client on the device and run the `docker run -it microsoft/azure-cli:0.10.17` command. Does this meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Running the docker client with the azure-cli container image does not deploy a Kubernetes YAML manifest. You need kubectl configured against the AKS cluster (via az aks get-credentials) and then run kubectl apply -f myapp.yaml. Docker CLI manages containers locally, not Kubernetes resources.","images":[],"source":"README"},{"id":165,"question":"Your company has an Azure subscription. You need to deploy a number of Azure virtual machines to the subscription by using Azure Resource Manager (ARM) templates. The virtual machines will be included in a single availability set. You need to ensure that the ARM template allows for as many virtual machines as possible to remain accessible in the event of fabric failure or maintenance. Which of the following is the value that you should configure for the `platformUpdateDomainCount` property?","options":["10.","20.","30.","40."],"answer":"20.","explanation":"The platformUpdateDomainCount property supports a maximum of 20 update domains in an availability set. Setting this to the maximum (20) ensures that during planned maintenance, only a small subset of VMs (1/20) is affected at a time, maximizing availability. The default is 5; the maximum is 20.","images":[],"source":"README"},{"id":166,"question":"You are designing an Azure WebJob that will run on the same instances as a web app. You want to make use of a suitable WebJob type. The webjob type should also allow for the option to restrict the WebJob to a single instance. Solution: You configure the use of the Triggered WebJob type. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"[FLAGGED - lower confidence] Triggered WebJobs can also be restricted to a single instance. Both Continuous and Triggered WebJobs support single-instance execution: Continuous uses is_singleton in settings.job, while Triggered by default runs on a single instance unless configured otherwise. Therefore a Triggered WebJob meets the goal. Note: Microsoft documentation confirms singleton is supported for both types.","images":[],"source":"README"},{"id":167,"question":"You are designing an Azure WebJob that will run on the same instances as a web app. You want to make use of a suitable WebJob type. The webjob type should also allow for the option to restrict the WebJob to a single instance. Solution: You configure the use of the Continuous WebJob type. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Continuous WebJobs run on all instances of the web app by default, but can be restricted to a single instance by setting the is_singleton property to true in settings.job. This satisfies both requirements: running on the same instances as the web app and supporting single-instance restriction.","images":[],"source":"README"},{"id":168,"question":"You company has an on-premises deployment of MongoDB, and an Azure Cosmos DB account that makes use of the MongoDB API. You need to devise a strategy to migrate MongoDB to the Azure Cosmos DB account. You include the [Data Management Gateway] tool in your migration strategy.","options":["No change required.","`mongorestore`.","Azure Storage Explorer.","`AzCopy`."],"answer":"`mongorestore`.","explanation":"To migrate from on-premises MongoDB to Azure Cosmos DB with the MongoDB API, use mongodump to export data to BSON, then mongorestore to import into Cosmos DB. Data Management Gateway is for on-premises SQL data sources to Azure Data Factory and is not suitable. AzCopy and Storage Explorer handle Azure Storage, not Cosmos DB MongoDB data.","images":[],"source":"README"},{"id":169,"question":"You are developing an application that processes Azure Blob storage events. Your application has the following requirements: Process transaction logs asynchronously for changes that occur to the blobs and the blob metadata. Process changes in the order in which they occurred. Retain changes for compliance reasons. Solution: You use Azure Event Grid with a subscriber Azure Function app. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Event Grid does not guarantee event ordering; events may be delivered out of order. The requirement to process changes in the order they occurred cannot be met with Event Grid. The correct approach is to use the Azure Blob storage change feed, which preserves ordering and retains changes for compliance purposes.","images":[],"source":"README"},{"id":170,"question":"You are developing an application that processes Azure Blob storage events. Your application has the following requirements: Process transaction logs asynchronously for changes that occur to the blobs and the blob metadata. Process changes in the order in which they occurred. Retain changes for compliance reasons. Solution: You use Azure Monitor HTTP Data Collector API. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"The Azure Monitor HTTP Data Collector API is for sending custom log data to a Log Analytics workspace. It does not process blob storage events, does not preserve change ordering for blobs, and is not designed for compliance retention of blob changes. The correct solution is the Azure Blob storage change feed.","images":[],"source":"README"},{"id":171,"question":"You are developing a mobile app that uses an Azure SQL Database named `Weyland`. The database contains a table named `Customers` that has a field named `email_address`. You want to implement dynamic data masking to hide the data in the `email_address` field. Solution: You run the follows transact-SQL statement: `ALTER TABLE [dbo].[Weyland].[Customers] ALTER COLUMN [email_address] ADD MASKED WITH (FUNCTION = 'email()')`. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"The ALTER TABLE ... ALTER COLUMN ... ADD MASKED WITH (FUNCTION = 'email()') Transact-SQL statement correctly applies dynamic data masking using the built-in email masking function. This exposes the first letter and constant suffix '.com' while masking the rest, meeting the goal.","images":[],"source":"README"},{"id":172,"question":"You are developing a mobile app that uses an Azure SQL Database named `Weyland`. The database contains a table named `Customers` that has a field named `email_address`. You want to implement dynamic data masking to hide the data in the `email_address` field. Solution: You run the `Set-AzSqlDatabaseDataMaskingPolicy -DatabaseName 'Weyland'` Powershell cmdlet Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Set-AzSqlDatabaseDataMaskingPolicy only configures the overall data masking policy (such as privileged users exempt from masking). It does not create a specific masking rule for a column. To mask the email_address column, Set-AzSqlDatabaseDataMaskingRule is required.","images":[],"source":"README"},{"id":173,"question":"You are developing a mobile app that uses an Azure SQL Database named `Weyland`. The database contains a table named `Customers` that has a field named `email_address`. You want to implement dynamic data masking to hide the data in the `email_address` field. Solution: You run the `Set-AzSqlDatabaseDataMaskingRule -DatabaseName 'Weyland' -SchemaName 'dbo' -TableName 'Customers' -ColumnName 'email_address' -MaskingFunction 'email'` Powershell cmdlet Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Set-AzSqlDatabaseDataMaskingRule with -MaskingFunction 'email' correctly creates a dynamic data masking rule on the email_address column of the Customers table using the built-in email masking function. This satisfies the requirement to mask the email_address field.","images":[],"source":"README"},{"id":174,"question":"You are developing an e-Commerce Web App. You want to use Azure Key Vault to ensure that sign-ins to the e-Commerce Web App are secured by using Azure App Service authentication and Microsoft Entra ID. What should you do on the e-Commerce Web App?","options":["Run the `az keyvault secret` command.","Enable Microsoft Entra ID Connect.","Enable Managed Service Identity (MSI).","Create an Microsoft Entra ID service principal."],"answer":"Enable Managed Service Identity (MSI).","explanation":"Managed Service Identity (now called Managed Identity) lets the App Service authenticate to Azure Key Vault without storing credentials. Combined with App Service authentication and Microsoft Entra ID, MSI provides a secure way for the web app to retrieve secrets from Key Vault.","images":[],"source":"README"},{"id":175,"question":"You are developing a web app that uses Microsoft Entra ID for authentication. You want to configure the web app to use multifactor authentication. What should you do?","options":["Enable mobile app authentication.","In Microsoft Entra ID conditional access, enable the baseline policy.","In Microsoft Entra ID, create a conditional access policy.","Install the Azure Multi-Factor Authentication Server."],"answer":"In Microsoft Entra ID, create a conditional access policy.","explanation":"Conditional access policies in Microsoft Entra ID are the recommended way to require multifactor authentication for a web app. You can target specific apps, users, locations, or risk conditions and require MFA as the grant control. Baseline policies are deprecated in favor of security defaults and custom conditional access policies.","images":[],"source":"README"},{"id":176,"question":"You are creating an Azure key vault using PowerShell. Objects deleted from the key vault must be kept for a set period of 90 days. Which two of the following parameters must be used in conjunction to meet the requirement? (Choose two.)","options":["`EnabledForDeployment`.","`EnablePurgeProtection`.","`EnabledForTemplateDeployment`.","`EnableSoftDelete`."],"answer":"`EnablePurgeProtection`.|`EnableSoftDelete`.","explanation":"EnableSoftDelete retains deleted objects for a configurable retention period (7-90 days). EnablePurgeProtection prevents permanent deletion of soft-deleted items during the retention period, ensuring the 90-day retention cannot be bypassed. Both parameters together enforce the required retention.","images":[],"source":"README"},{"id":177,"question":"Your company has an Microsoft Entra ID environment. Users occasionally connect to Microsoft Entra ID via the Internet. You need to ensure that users who connect to Microsoft Entra ID via the internet using an unidentified IP address, are automatically instructed to change their passwords. Solution: You configure the use of Azure Key Vault. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Key Vault is a service for storing secrets, keys, and certificates. It has no capability to detect sign-ins from unidentified IP addresses or enforce password changes. The correct solution is Microsoft Entra ID Identity Protection, which detects risky sign-ins and can require password reset.","images":[],"source":"README"},{"id":178,"question":"Your company has an Microsoft Entra ID environment. Users occasionally connect to Microsoft Entra ID via the Internet. You need to ensure that users who connect to Microsoft Entra ID via the internet using an unidentified IP address, are automatically instructed to change their passwords. Solution: You configure the use of Microsoft Entra ID Identity Protection. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Microsoft Entra ID Identity Protection detects sign-in risks including sign-ins from anonymous/unfamiliar IP addresses. A user risk policy can be configured to require password change when risk is detected, satisfying the requirement.","images":[],"source":"README"},{"id":179,"question":"Your company has an Microsoft Entra ID environment. Users occasionally connect to Microsoft Entra ID via the Internet. You need to ensure that users who connect to Microsoft Entra ID via the internet using an unidentified IP address, are automatically instructed to change their passwords. Solution: You configure the use of Microsoft Entra ID Privileged Identity Management. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Microsoft Entra ID Privileged Identity Management (PIM) provides just-in-time privileged access and approval workflows for administrative roles. It does not monitor sign-in IP addresses or automatically require password changes for risky sign-ins. Identity Protection is the correct service.","images":[],"source":"README"},{"id":180,"question":"You manage an Azure SQL database that allows for Microsoft Entra ID authentication. You need to make sure that database developers can connect to the SQL database via Microsoft SQL Server Management Studio (SSMS). You also need to make sure the developers use their on-premises Microsoft Entra ID account for authentication. Your strategy should allow for authentication prompts to be kept to a minimum. Which of the following should you implement?","options":["Microsoft Entra ID token.","Azure Multi-Factor authentication.","Microsoft Entra ID integrated authentication.","OATH software tokens."],"answer":"Microsoft Entra ID integrated authentication.","explanation":"Microsoft Entra ID integrated authentication uses the Windows credentials of the user currently signed in to the domain-joined device to authenticate to Azure SQL Database without additional prompts. This minimizes authentication prompts while using on-premises Microsoft Entra ID accounts via SSMS.","images":[],"source":"README"},{"id":181,"question":"You are developing an application to transfer data between on-premises file servers and Azure Blob storage. The application stores keys, secrets, and certificates in Azure Key Vault and makes use of the Azure Key Vault APIs. You want to configure the application to allow recovery of an accidental deletion of the key vault or key vault objects for 90 days after deletion. What should you do?","options":["Run the `Add-AzKeyVaultKey` cmdlet.","Run the `az keyvault update --enable-soft-delete true --enable-purge-protection true` CLI.","Implement virtual network service endpoints for Azure Key Vault.","Run the `az keyvault update --enable-soft-delete false` CLI."],"answer":"Run the `az keyvault update --enable-soft-delete true --enable-purge-protection true` CLI.","explanation":"Soft-delete enables recovery of deleted vaults/objects, while purge-protection prevents permanent deletion during the retention period (default 90 days). Both together guarantee recoverability for 90 days after accidental deletion. Add-AzKeyVaultKey only adds a key, VNet endpoints deal with network security, and disabling soft-delete would prevent recovery.","images":[],"source":"README"},{"id":182,"question":"You are configuring a web app that delivers streaming video to users. The application makes use of continuous integration and deployment. You need to ensure that the application is highly available and that the users' streaming experience is constant. You also want to configure the application to store data in a geographic location that is nearest to the user. Solution: You include the use of Azure Redis Cache in your design. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Redis Cache is an in-memory data store for caching small data; it does not deliver streaming video, nor does it replicate content to geographic locations closest to users. A CDN is the proper solution for geo-distributed video delivery and high availability.","images":[],"source":"README"},{"id":183,"question":"You are configuring a web app that delivers streaming video to users. The application makes use of continuous integration and deployment. You need to ensure that the application is highly available and that the users' streaming experience is constant. You also want to configure the application to store data in a geographic location that is nearest to the user. Solution: You include the use of an Azure Content Delivery Network (CDN) in your design. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Azure CDN caches content at points of presence (POPs) worldwide, serving streaming video from the node closest to each user. This ensures low latency, high availability, and a consistent streaming experience, which meets all stated goals.","images":[],"source":"README"},{"id":184,"question":"You are configuring a web app that delivers streaming video to users. The application makes use of continuous integration and deployment. You need to ensure that the application is highly available and that the users' streaming experience is constant. You also want to configure the application to store data in a geographic location that is nearest to the user. Solution: You include the use of a Storage Area Network (SAN) in your design. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"A Storage Area Network (SAN) is an on-premises block-storage network; it does not provide geo-distribution, high availability across regions, or edge delivery for streaming video. A CDN is the correct choice.","images":[],"source":"README"},{"id":185,"question":"You develop a Web App on a tier D1 app service plan. You notice that page load times increase during periods of peak traffic. You want to implement automatic scaling when CPU load is above 80 percent. Your solution must minimize costs. What should you do first?","options":["Enable autoscaling on the Web App.","Switch to the Premium App Service tier plan.","Switch to the Standard App Service tier plan.","Switch to the Azure App Services consumption plan."],"answer":"Switch to the Standard App Service tier plan.","explanation":"Autoscale is not available on Free, Shared, or Basic (D1) tiers. The Standard tier is the lowest-cost plan that supports autoscale rules based on CPU. Premium also supports it but costs more, and the consumption plan is for Azure Functions, not Web Apps.","images":[],"source":"README"},{"id":186,"question":"You are developing a solution for a public facing API. The API back end is hosted in an Azure App Service instance. You have implemented a RESTful service for the API back end. You must configure back-end authentication for the API Management service instance. Solution: You configure Basic gateway credentials for the Azure resource. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Basic credentials use username/password, which is less secure than certificate-based authentication. For API Management backend authentication to an Azure App Service hosting a RESTful API, Client certificate authentication against the Azure resource is the recommended approach.","images":[],"source":"README"},{"id":187,"question":"You are developing a solution for a public facing API. The API back end is hosted in an Azure App Service instance. You have implemented a RESTful service for the API back end. You must configure back-end authentication for the API Management service instance. Solution: You configure Client cert gateway credentials for the HTTP(s) endpoint. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"While Client cert is the right credential type, the backend must be configured as an Azure resource (not a generic HTTP(s) endpoint) because the API is hosted in Azure App Service. Selecting HTTP(s) endpoint does not leverage the Azure resource integration.","images":[],"source":"README"},{"id":188,"question":"You are developing a solution for a public facing API. The API back end is hosted in an Azure App Service instance. You have implemented a RESTful service for the API back end. You must configure back-end authentication for the API Management service instance. Solution: You configure Basic gateway credentials for the HTTP(s) endpoint. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Basic gateway credentials rely on username/password and the HTTP(s) endpoint option bypasses Azure resource integration. Neither aspect satisfies secure backend authentication for an Azure App Service-hosted API; client certificates against the Azure resource are required.","images":[],"source":"README"},{"id":189,"question":"You are developing a solution for a public facing API. The API back end is hosted in an Azure App Service instance. You have implemented a RESTful service for the API back end. You must configure back-end authentication for the API Management service instance. Solution: You configure Client cert gateway credentials for the Azure resource. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Configuring Client cert gateway credentials against the Azure resource is the correct approach. Client certificates provide strong mutual authentication, and targeting the Azure resource correctly integrates APIM with the App Service backend.","images":[],"source":"README"},{"id":190,"question":"You are developing a .NET Core MVC application that allows customers to research independent holiday accommodation providers. You want to implement Azure Search to allow the application to search the index by using various criteria to locate documents related to accommodation venues. You want the application to list holiday accommodation venues that fall within a specific price range and are within a specified distance to an airport. What should you do?","options":["Configure the `SearchMode` property of the `SearchParameters` class.","Configure the `QueryType` property of the `SearchParameters` class.","Configure the `Facets` property of the `SearchParameters` class.","Configure the `Filter` property of the `SearchParameters` class."],"answer":"Configure the `Filter` property of the `SearchParameters` class.","explanation":"The Filter property accepts OData expressions that can restrict results by price range (e.g., price ge 100 and price le 500) and by geographic proximity using geo.distance(). SearchMode controls AND/OR behavior, QueryType selects simple vs full Lucene syntax, and Facets are for aggregated navigation, none of which restrict results by range and location.","images":[],"source":"README"},{"id":191,"question":"You are a developer at your company. You need to edit the workflows for an existing Logic App. What should you use?","options":["The Enterprise Integration Pack (EIP).","The Logic App Code View.","The API Connections.","The Logic Apps Designer."],"answer":"The Logic Apps Designer.","explanation":"The Logic Apps Designer is the visual, drag-and-drop tool in the Azure portal and Visual Studio used to create and edit Logic App workflows. Code View is for raw JSON editing, API Connections manage connectors, and the Enterprise Integration Pack is for B2B/EDI scenarios.","images":[],"source":"README"},{"id":192,"question":"You are developing an application that applies a set of governance policies for internal and external services, as well as for applications. You develop a stateful ASP.NET Core 2.1 web application named `PolicyApp` and deploy it to an Azure App Service Web App. The `PolicyApp` reacts to events from Azure Event Grid and performs policy actions based on those events. You have the following requirements: Authentication events must be used to monitor users when they sign in and sign out. All authentication events must be processed by `PolicyApp`. Sign outs must be processed as fast as possible. What should you do?","options":["Create a new Azure Event Grid subscription for all authentication events. Use the subscription to process sign-out events.","Create a separate Azure Event Grid handler for sign-in and sign-out events.","Create separate Azure Event Grid topics and subscriptions for sign-in and sign-out events.","Add a subject prefix to sign-out events. Create an Azure Event Grid subscription. Configure the subscription to use the subjectBeginsWith filter."],"answer":"Add a subject prefix to sign-out events. Create an Azure Event Grid subscription. Configure the subscription to use the subjectBeginsWith filter.","explanation":"Event Grid supports filtering by subject prefix using subjectBeginsWith. Tagging sign-out events with a distinct prefix and filtering on it allows a dedicated, fast processing path for sign-outs while still routing all authentication events through PolicyApp. Separate topics or handlers are unnecessary overhead.","images":[],"source":"README"},{"id":193,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to add code at line AM09 to ensure that users can review content using `ContentAnalysisService`. How should you complete the code?","options":["Box 1: `\"oauth2Permissions\": [\"login\"]`. Box 2: `\"oauth2AllowImplicitFlow\": true`.","Box 1: `\"oauth2AllowIdTokenImplicitFlow\": true`. Box 2: `\"oauth2AllowImplicitFlow\": true`.","Box 1: `\"allowPublicClient\": true`. Box 2: `\"knownClientApplications\": [\"ContentAnalysisService\"]`.","Box 1: `\"oauth2Permissions\": [\"login\"]`. Box 2: `\"preAuthorizedApplications\": [\"SPA\"]`."],"answer":"Box 1: `\"oauth2AllowIdTokenImplicitFlow\": true`. Box 2: `\"oauth2AllowImplicitFlow\": true`.","explanation":"Because the review site is a Single Page Application using React, it relies on the OAuth 2.0 implicit grant flow to obtain tokens in the browser. Setting oauth2AllowIdTokenImplicitFlow enables ID tokens and oauth2AllowImplicitFlow enables access tokens to be returned via the implicit flow, both required for SPA authentication.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg","images/question193.jpeg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`\"allowPublicClient\": true`","`\"knownClientApplications\": [\"ContentAnalysisService\"]`","`\"oauth2AllowIdTokenImplicitFlow\": true`","`\"oauth2AllowImplicitFlow\": true`","`\"oauth2Permissions\": [\"login\"]`","`\"preAuthorizedApplications\": [\"SPA\"]`"],"correct":"`\"oauth2AllowIdTokenImplicitFlow\": true`"},{"label":"Box 2","choices":["`\"allowPublicClient\": true`","`\"knownClientApplications\": [\"ContentAnalysisService\"]`","`\"oauth2AllowIdTokenImplicitFlow\": true`","`\"oauth2AllowImplicitFlow\": true`","`\"oauth2Permissions\": [\"login\"]`","`\"preAuthorizedApplications\": [\"SPA\"]`"],"correct":"`\"oauth2AllowImplicitFlow\": true`"}],"orderMode":true},{"id":194,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to add code at line AM10 of the application manifest to ensure that the requirement for manually reviewing content can be met. How should you complete the code?","options":["Box 1: `sid`. Box 2: `email`.","Box 1: `platf`. Box 2: `sid`.","Box 1: `tenant_ctry`. Box 2: `upn`.","Box 1: `sid`. Box 2: `enfpolids`."],"answer":"Box 1: `sid`. Box 2: `email`.","explanation":"The sid (session ID) optional claim enables per-session tracking required for secure SPA sign-in behavior, and the email optional claim supplies the reviewer's email address needed for auditing completed reviews. Together they satisfy the manual-review auditing requirement stated in the scenario.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg","images/question194.jpeg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`email`","`enfpolids`","`platf`","`sid`","`tenant_ctry`","`upn`"],"correct":"`sid`"},{"label":"Box 2","choices":["`email`","`enfpolids`","`platf`","`sid`","`tenant_ctry`","`upn`"],"correct":"`email`"}],"orderMode":true},{"id":195,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to ensure that network security policies are met. How should you configure network security?","options":["SSL certificate: Self-signed certificate. Proxy type: nginx.","SSL certificate: Self-signed certificate. Proxy type: Azure Application Gateway.","SSL certificate: Valid root certificate. Proxy type: nginx.","SSL certificate: Valid root certificate. Proxy type: Azure Application Gateway."],"answer":"SSL certificate: Valid root certificate. Proxy type: Azure Application Gateway.","explanation":"The security requirements state that all sites must use SSL from a valid root certificate authority (ruling out self-signed) and must be protected against cross-site scripting. Azure Application Gateway with WAF provides XSS protection and SSL termination, which nginx does not offer natively in Azure.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg","images/question195.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"SSL certificate","choices":["Self-signed certificate","Valid root certificate","nginx","Azure Application Gateway"],"correct":"Valid root certificate"},{"label":"Proxy type","choices":["Self-signed certificate","Valid root certificate","nginx","Azure Application Gateway"],"correct":"Azure Application Gateway"}]},{"id":196,"question":"You are building a website to access project data related to teams within your organization. The website does not allow anonymous access. Authentication is performed using an Microsoft Entra ID app named internal. The website has the following authentication requirements: Microsoft Entra ID users must be able to login to the website. Personalization of the website must be based on membership in Microsoft Entra ID groups. You need to configure the application's manifest to meet the authentication requirements. How should you configure the manifest?","options":["Box 1: `\"optionalClaims\"`. Box 2: `\"allowPublicClient\"`.","Box 1: `\"optionalClaims\"`. Box 2: `\"requiredResourceAccess\"`.","Box 1: `\"groupMembershipClaims\"`. Box 2: `\"oauth2Permissions\"`.","Box 1: `\"groupMembershipClaims\"`. Box 2: `\"oauth2AllowimplicitFlow\"`."],"answer":"Box 1: `\"groupMembershipClaims\"`. Box 2: `\"oauth2AllowimplicitFlow\"`.","explanation":"groupMembershipClaims adds Microsoft Entra group membership information to the issued token, enabling personalization based on group membership. oauth2AllowImplicitFlow allows the browser-based web app to acquire tokens via the implicit grant so users can sign in.","images":["images/question196.png"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`\"groupMembershipClaims\"`","`\"optionalClaims\"`","`\"allowPublicClient\"`","`\"oauth2AllowimplicitFlow\"`","`\"oauth2Permissions\"`","`\"requiredResourceAccess\"`"],"correct":"`\"groupMembershipClaims\"`"},{"label":"Box 2","choices":["`\"groupMembershipClaims\"`","`\"optionalClaims\"`","`\"allowPublicClient\"`","`\"oauth2AllowimplicitFlow\"`","`\"oauth2Permissions\"`","`\"requiredResourceAccess\"`"],"correct":"`\"oauth2AllowimplicitFlow\"`"}]},{"id":197,"question":"You are developing an Azure solution. You need to develop code to access a secret stored in Azure Key Vault. How should you complete the code segment?","options":["Box 1: `DefaultAzureCredential`. Box 2: `ClientSecretCredential`.","Box 1: `CloudClients`. Box 2: `ClientSecretCredential`.","Box 1: `ClientSecretCredential`. Box 2: `SecretClient`.","Box 1: `SecretClient`. Box 2: `DefaultAzureCredential`."],"answer":"Box 1: `SecretClient`. Box 2: `DefaultAzureCredential`.","explanation":"SecretClient is the Azure.Security.KeyVault.Secrets class used to read and manage secrets from Key Vault. DefaultAzureCredential is the recommended credential chain that automatically picks the appropriate authentication (managed identity, environment, VS login, etc.), making the code portable across environments.","images":["images/question197.png"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`ClientSecretCredential`","`CloudClients`","`DefaultAzureCredential`","`SecretClient`"],"correct":"`SecretClient`"},{"label":"Box 2","choices":["`ClientSecretCredential`","`CloudClients`","`DefaultAzureCredential`","`SecretClient`"],"correct":"`DefaultAzureCredential`"}]},{"id":198,"question":"You are developing a web application that makes calls to the Microsoft Graph API. You register the application in the Azure portal and upload a valid `X509` certificate. You create an appsettings.json file containing the certificate name, client identifier for the application, and the tenant identifier of the Microsoft Entra ID. You create a method named `ReadCertificate` to return the `X509` certificate by name. You need to implement code that acquires a token by using the certificate. How should you complete the code segment?","options":["Box 1: `ConfidentialClientApplicationBuilder`. Box 2: `app`.","Box 1: `ConfidentialClientApplicationBuilder`. Box 2: `scopes`.","Box 1: `GetAccountAsync()`. Box 2: `scopes`.","Box 1: `ConfidentialClientApplication`. Box 2: `config`."],"answer":"Box 1: `ConfidentialClientApplicationBuilder`. Box 2: `scopes`.","explanation":"ConfidentialClientApplicationBuilder is the MSAL.NET fluent builder used to construct a confidential client that authenticates with a certificate. AcquireTokenForClient takes the scopes parameter (e.g., https://graph.microsoft.com/.default) to request tokens from Microsoft Graph using the client-credentials flow.","images":["images/question198.jpg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`ConfidentialClientApplicationBuilder`","`ConfidentialClientApplication`","`GetAccountAsync()`","`app`","`config`","`scopes`"],"correct":"`ConfidentialClientApplicationBuilder`"},{"label":"Box 2","choices":["`ConfidentialClientApplicationBuilder`","`ConfidentialClientApplication`","`GetAccountAsync()`","`app`","`config`","`scopes`"],"correct":"`scopes`"}]},{"id":199,"question":"You are developing an ASP.NET Core Web API web service. The web service uses Azure Application Insights for all telemetry and dependency tracking. The web service reads and writes data to a database other than Microsoft SQL Server. You need to ensure that dependency tracking works for calls to the third-party database. Which two dependency telemetry properties should you use?","options":["`Telemetry.Context.Cloud.RoleInstance`.","`Telemetry.Id`.","`Telemetry.Name`.","`Telemetry.Context.Operation.Id`.","`Telemetry.Context.Session.Id`."],"answer":"`Telemetry.Id`.|`Telemetry.Context.Operation.Id`.","explanation":"For custom dependency tracking in Application Insights, Telemetry.Id uniquely identifies the dependency call, and Telemetry.Context.Operation.Id correlates that call with the parent request/operation. Together they enable end-to-end distributed trace correlation for non-SQL third-party database calls.","images":[],"source":"README"},{"id":200,"question":"You are developing an Azure App Service hosted ASP.NET Core web app to deliver video-on-demand streaming media. You enable an Azure Content Delivery Network (CDN) Standard for the web endpoint. Customer videos are downloaded from the web app by using the following example URL: `http://www.contoso.com/content.mp4?quality=1`. All media content must expire from the cache after one hour. Customer videos with varying quality must be delivered to the closest regional point of presence (POP) node. You need to configure Azure CDN caching rules. Which options should you use?","options":["Caching behavior: Override. Cache expiration duration: 1 hour. Query string caching behavior: Cache every unique URL.","Caching behavior: Bypass cache. Cache expiration duration: 1 day. Query string caching behavior: Bypass caching for query strings.","Caching behavior: Set if missing. Cache expiration duration: 1 second. Query string caching behavior: Ignore query strings.","Caching behavior: Override. Cache expiration duration: 1 hour. Query string caching behavior: Ignore query strings."],"answer":"Caching behavior: Override. Cache expiration duration: 1 hour. Query string caching behavior: Cache every unique URL.","explanation":"Override ignores any cache headers from the origin and enforces the specified expiration (1 hour) to meet the expiration requirement. Cache every unique URL treats each query string variant (e.g., quality=1, quality=2) as a distinct cached object so different video qualities are served correctly from the POP nearest the user.","images":["images/question200.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"Caching behavior","choices":["Override","Bypass cache","Set if missing","1 hour","1 day","1 second","Cache every unique URL","Bypass caching for query strings","Ignore query strings"],"correct":"Override"},{"label":"Cache expiration duration","choices":["Override","Bypass cache","Set if missing","1 hour","1 day","1 second","Cache every unique URL","Bypass caching for query strings","Ignore query strings"],"correct":"1 hour"},{"label":"Query string caching behavior","choices":["Override","Bypass cache","Set if missing","1 hour","1 day","1 second","Cache every unique URL","Bypass caching for query strings","Ignore query strings"],"correct":"Cache every unique URL"}]},{"id":201,"question":"You develop a web app that uses tier D1 app service plan by using the Web Apps feature of Microsoft Azure App Service. Spikes in traffic have caused increases in page load times. You need to ensure that the web app automatically scales when CPU load is about 85 percent and minimize costs. Which four actions should you perform in sequence?","options":["Box 1: Configure the web app to the Standard App Service tier. Box 2: Enable autoscaling on the web app. Box 3: Add a Scale rule. Box 4: Configure a Scale condition.","Box 1: Enable autoscaling on the web app. Box 2: Add a Scale rule. Box 3:Configure a Scale condition. Box 4:Switch to an Azure App Services consumption plan.","Box 1: Configure the web app to the Standard App Service tier. Box 2: Enable autoscaling on the web app. Box 3: Configure a Scale condition. Box 4: SecretClient.","Box 1: Switch to an Azure App Services consumption plan. Box 2: Configure the web app to the Premium App Service tier. Box 3: Enable autoscaling on the web app. Box 4: Configure a Scale condition."],"answer":"Box 1: Configure the web app to the Standard App Service tier. Box 2: Enable autoscaling on the web app. Box 3: Add a Scale rule. Box 4: Configure a Scale condition.","explanation":"D1 is a Shared tier plan that does not support autoscaling. First upgrade to Standard (or higher) App Service tier (minimum supporting autoscale and minimizes cost). Then enable autoscaling, add a scale rule (CPU > 85%), and finally configure a scale condition that applies the rule.","images":["images/question201.jpg"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["Add a Scale rule","Configure a Scale condition","Configure the web app to the Premium App Service tier","Configure the web app to the Standard App Service tier","Enable autoscaling on the web app","SecretClient","Switch to an Azure App Services consumption plan"],"correct":"Configure the web app to the Standard App Service tier"},{"label":"Box 2","choices":["Add a Scale rule","Configure a Scale condition","Configure the web app to the Premium App Service tier","Configure the web app to the Standard App Service tier","Enable autoscaling on the web app","SecretClient","Switch to an Azure App Services consumption plan"],"correct":"Enable autoscaling on the web app"},{"label":"Box 3","choices":["Add a Scale rule","Configure a Scale condition","Configure the web app to the Premium App Service tier","Configure the web app to the Standard App Service tier","Enable autoscaling on the web app","SecretClient","Switch to an Azure App Services consumption plan"],"correct":"Add a Scale rule"},{"label":"Box 4","choices":["Add a Scale rule","Configure a Scale condition","Configure the web app to the Premium App Service tier","Configure the web app to the Standard App Service tier","Enable autoscaling on the web app","SecretClient","Switch to an Azure App Services consumption plan"],"correct":"Configure a Scale condition"}],"orderMode":true},{"id":202,"question":"A company backs up all manufacturing data to Azure Blob Storage. Admins move blobs from hot storage to archive tier storage every month. You must automatically move blobs to Archive tier after they have not been modified within 180 days. The path for any item that is not archived must be placed in an existing queue. This operation must be performed automatically once a month. You set the value of TierAgeInDays to -180. How should you configure the Logic App?","options":["Box 1: Put a message on a queue. Box 2: Recurrence. Box 3: Condition. Box 4: When there are messages in a queue. Box 5: List blobs 2.","Box 1: Recurrence. Box 2: Condition. Box 3: When there are messages in a queue. Box 4: Tier blob. Box 5: List blobs 2.","Box 1: Recurrence. Box 2: Condition. Box 3: Put a message on a queue. Box 4: When there are messages in a queue. Box 5: Tier blob.","Box 1: Recurrence. Box 2: Condition. Box 3: Put a message on a queue. Box 4: Tier blob. Box 5: List blobs 2."],"answer":"Box 1: Recurrence. Box 2: Condition. Box 3: Put a message on a queue. Box 4: Tier blob. Box 5: List blobs 2.","explanation":"Logic App starts with a Recurrence trigger (once a month). A Condition evaluates the last-modified age. If not archivable, Put a message on a queue with the blob path; otherwise Tier blob to archive. List blobs 2 iterates remaining blobs for processing.","images":["images/question202.jpeg"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["Put a message on a queue","Recurrence","Condition","When there are messages in a queue","Tier blob","List blobs 2"],"correct":"Recurrence"},{"label":"Box 2","choices":["Put a message on a queue","Recurrence","Condition","When there are messages in a queue","Tier blob","List blobs 2"],"correct":"Condition"},{"label":"Box 3","choices":["Put a message on a queue","Recurrence","Condition","When there are messages in a queue","Tier blob","List blobs 2"],"correct":"Put a message on a queue"},{"label":"Box 4","choices":["Put a message on a queue","Recurrence","Condition","When there are messages in a queue","Tier blob","List blobs 2"],"correct":"Tier blob"},{"label":"Box 5","choices":["Put a message on a queue","Recurrence","Condition","When there are messages in a queue","Tier blob","List blobs 2"],"correct":"List blobs 2"}]},{"id":203,"question":"You have an Azure Web app that uses Cosmos DB as a data store. You create a CosmosDB container by running the following PowerShell script: `$resourceGroupName = 'testResourceGroup' $accountName = 'testCosmosAccount' $databaseName = 'testDatabase' $containerName = 'testContainer' $partitionKeyPath = '/EmployeeId' $autoscaleMaxThroughput = 5000 New-AzCosmosDBSqlContainer - -ResourceGroupName $resourceGroupName -AccountName $accountName -DatabaseName $databaseName -Name $containerName -PartitionKeyKind Hash -PartitionKeyPath $partitionKeyPath -AutoscaleMaxThroughput $autoscaleMaxThroughput`. You create the following queries that target the container: `SELECT * FROM c WHERE c.EmployeeId > '12345' SELECT * FROM c WHERE c.UserID = '12345'`. Is the minimum throughput for the container 400 R/Us?","options":["Yes.","No."],"answer":"No.","explanation":"With autoscale throughput, the minimum RU/s is 10% of the max auto
