<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-204 Quiz Study Tool</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --border: #475569;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* Header */
.header { text-align: center; padding: 30px 0 20px; }
.header h1 { font-size: 1.8rem; margin-bottom: 8px; }
.header p { color: var(--text-dim); }

/* Stats bar */
.stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.stat-card { background: var(--surface); border-radius: 12px; padding: 14px 20px; text-align: center; min-width: 120px; }
.stat-card .num { font-size: 1.6rem; font-weight: 700; }
.stat-card .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.stat-card.green .num { color: var(--green); }
.stat-card.red .num { color: var(--red); }
.stat-card.blue .num { color: var(--accent); }
.stat-card.yellow .num { color: var(--yellow); }

/* Mode selector */
.mode-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.mode-btn { background: var(--surface); border: 2px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
.mode-btn:hover { border-color: var(--accent); }
.mode-btn.active { background: var(--accent); border-color: var(--accent); }
.mode-btn .badge { background: var(--surface2); padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; margin-left: 6px; }
.mode-btn.active .badge { background: rgba(255,255,255,0.2); }

/* Progress bar */
.progress-container { background: var(--surface); border-radius: 20px; height: 8px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 20px; transition: width 0.4s ease; }

/* Question card */
.question-card { background: var(--surface); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.q-number { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
.q-source { font-size: 0.7rem; color: var(--text-dim); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }
.q-case-study-title { display: inline-flex; align-items: center; gap: 6px; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.4); color: #c084fc; font-size: 0.78rem; font-weight: 600; padding: 5px 14px; border-radius: 20px; margin-bottom: 14px; letter-spacing: 0.3px; }
.q-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; }

/* Options */
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn { background: var(--surface2); border: 2px solid transparent; color: var(--text); padding: 14px 18px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 0.95rem; line-height: 1.5; transition: all 0.2s; word-break: break-word; }
.option-btn:hover:not(.disabled) { border-color: var(--accent); background: rgba(59,130,246,0.1); }
.option-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.15); }
.option-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.15); }
.option-btn.incorrect { border-color: var(--red); background: rgba(239,68,68,0.15); }
.option-btn.show-correct { border-color: var(--green); background: rgba(34,197,94,0.1); }
.option-btn.disabled { cursor: default; opacity: 0.85; }

/* Multi-select note */
.multi-note { color: var(--yellow); font-size: 0.8rem; margin-bottom: 10px; font-style: italic; }

/* Explanation */
.explanation { background: rgba(59,130,246,0.1); border-left: 4px solid var(--accent); padding: 16px; border-radius: 0 10px 10px 0; margin-top: 16px; font-size: 0.9rem; line-height: 1.6; color: var(--text-dim); }
/* Background/context section */
.q-background { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; font-size: 0.88rem; line-height: 1.7; color: var(--text-dim); white-space: pre-wrap; }
.q-background-toggle { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px; }
.q-background-toggle:hover { border-color: var(--accent); color: var(--text); }

/* Navigation */
.nav-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.nav-btn { padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
.nav-btn.primary { background: var(--accent); color: white; }
.nav-btn.primary:hover { background: var(--accent-hover); }
.nav-btn.secondary { background: var(--surface2); color: var(--text); }
.nav-btn.secondary:hover { background: var(--border); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Results screen */
.results { background: var(--surface); border-radius: 16px; padding: 40px; text-align: center; }
.results h2 { font-size: 1.6rem; margin-bottom: 20px; }
.results .score { font-size: 3rem; font-weight: 800; margin: 20px 0; }
.results .score.good { color: var(--green); }
.results .score.ok { color: var(--yellow); }
.results .score.bad { color: var(--red); }

/* Filter/search */
.search-box { width: 100%; background: var(--surface); border: 2px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 16px; }
.search-box:focus { outline: none; border-color: var(--accent); }

/* Wrong questions list */
.wrong-list { text-align: left; }
.wrong-item { background: var(--surface2); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
.wrong-item:hover { background: var(--border); }
.wrong-item .wrong-q { font-size: 0.9rem; line-height: 1.4; }
.wrong-item .wrong-meta { font-size: 0.75rem; color: var(--text-dim); margin-top: 6px; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .question-card { padding: 18px; }
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 80px; padding: 10px 14px; }
  .stat-card .num { font-size: 1.2rem; }
}

/* Shuffle toggle */
.controls-row { display: flex; gap: 12px; align-items: center; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.toggle-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); }
.toggle-label input { width: 18px; height: 18px; accent-color: var(--accent); }

/* Reset button */
.reset-btn { background: var(--red); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
.reset-btn:hover { opacity: 0.8; }

/* Bookmark */
.bookmark-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; padding: 4px; }

/* Box question styles */
.box-question-note { color: var(--yellow); font-size: 0.85rem; margin-bottom: 14px; font-style: italic; }
.box-section { margin-bottom: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.box-label { font-weight: 700; font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.box-choices { display: flex; flex-direction: column; gap: 8px; }
.box-choice-btn { background: var(--surface2); border: 2px solid transparent; color: var(--text); padding: 10px 14px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 0.9rem; line-height: 1.4; transition: all 0.2s; word-break: break-word; }
.box-choice-btn:hover:not(.disabled) { border-color: var(--accent); background: rgba(59,130,246,0.1); }
.box-choice-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.15); }
.box-choice-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.15); }
.box-choice-btn.incorrect { border-color: var(--red); background: rgba(239,68,68,0.15); }
.box-choice-btn.show-correct { border-color: var(--green); background: rgba(34,197,94,0.1); }
.box-choice-btn.disabled { cursor: default; opacity: 0.85; }
.box-choice-btn.used-elsewhere { opacity: 0.35; }
/* Question images */
.q-images { margin: 12px 0; display: flex; flex-direction: column; gap: 10px; }
.q-img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
.q-img:hover { border-color: var(--accent); }
.q-img.expanded { max-width: 100%; width: 100%; }

/* === Added: study tools === */
.mode-group { margin-bottom: 14px; }
.mode-group-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
.notes-area { margin-top: 14px; background: rgba(234,179,8,0.07); border: 1px solid rgba(234,179,8,0.3); border-radius: 10px; padding: 12px; }
.notes-area label { display:block; font-size: 0.75rem; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.notes-area textarea { width: 100%; min-height: 70px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; font-size: 0.88rem; resize: vertical; }
.notes-area textarea:focus { outline: none; border-color: var(--accent); }
.confidence-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.conf-btn { background: var(--surface2); border: 2px solid transparent; color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
.conf-btn:hover { border-color: var(--accent); }
.conf-btn.active.easy { background: rgba(34,197,94,0.2); border-color: var(--green); }
.conf-btn.active.medium { background: rgba(234,179,8,0.2); border-color: var(--yellow); }
.conf-btn.active.hard { background: rgba(239,68,68,0.2); border-color: var(--red); }
.exam-banner { position: sticky; top: 0; z-index: 20; background: linear-gradient(90deg, rgba(239,68,68,0.95), rgba(234,179,8,0.95)); color: white; padding: 10px 16px; border-radius: 10px; margin-bottom: 14px; text-align: center; font-weight: 600; font-size: 0.95rem; display: flex; gap: 16px; justify-content: center; align-items: center; flex-wrap: wrap; }
.exam-banner .timer { font-size: 1.4rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 2px; }
.exam-banner.warning { animation: pulse-warn 1s infinite; }
@keyframes pulse-warn { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.streak-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--text-dim); }
.streak-bar .streak-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; }
.streak-bar .streak-chip.hot { border-color: var(--yellow); color: var(--yellow); }
.search-results { max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
.search-results .wrong-item { padding: 10px 12px; }
.flashcard-reveal { background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px; padding: 24px; text-align: center; margin: 16px 0; cursor: pointer; transition: all 0.2s; }
.flashcard-reveal:hover { border-color: var(--accent); }
.flashcard-reveal .hint { color: var(--text-dim); font-size: 0.85rem; }
.flashcard-answer { background: rgba(34,197,94,0.08); border-left: 4px solid var(--green); border-radius: 0 10px 10px 0; padding: 14px 16px; margin: 12px 0; font-size: 0.95rem; line-height: 1.6; }
.flashcard-self-grade { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
.toolbar-btn { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; }
.toolbar-btn:hover { border-color: var(--accent); }
.toolbar-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
.small-note { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }
.smart-mix-cfg { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; margin-top: 8px; font-size: 0.8rem; color: var(--text-dim); }
.smart-mix-cfg input { width: 54px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 6px; font-size: 0.85rem; text-align: center; }
.hidden-file { display: none; }

/* ===== TOPIC CHIPS ===== */
.topic-filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; justify-content: center; }
.topic-chip { background: var(--surface2); border: 2px solid transparent; color: var(--text-dim); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.18s; }
.topic-chip:hover { border-color: var(--accent); color: var(--text); }
.topic-chip.active { background: rgba(59,130,246,0.18); border-color: var(--accent); color: var(--text); font-weight: 600; }
.topic-chip .tc-count { font-size: 0.7rem; opacity: 0.7; margin-left: 4px; }

/* ===== MEMORIZE MODE ===== */
.memorize-reveal-box { border: 2px dashed var(--border); border-radius: 14px; padding: 32px 24px; text-align: center; margin: 20px 0; cursor: pointer; transition: all 0.2s; background: var(--surface2); }
.memorize-reveal-box:hover { border-color: var(--accent); background: rgba(59,130,246,0.07); }
.memorize-reveal-box .mr-icon { font-size: 2rem; margin-bottom: 8px; }
.memorize-reveal-box .mr-hint { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; }
.memorize-answer { background: rgba(34,197,94,0.08); border-left: 4px solid var(--green); border-radius: 0 12px 12px 0; padding: 16px 18px; margin: 14px 0; }
.memorize-answer .ma-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--green); margin-bottom: 6px; }
.memorize-answer .ma-text { font-size: 1rem; font-weight: 600; line-height: 1.5; }
.memorize-explanation { background: rgba(59,130,246,0.08); border-left: 4px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; margin-top: 10px; font-size: 0.88rem; line-height: 1.6; color: var(--text-dim); }
.memorize-grade-btns { display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
.memorize-grade-btns button { padding: 14px 32px; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.15s; }
.memorize-grade-btns .mg-miss { background: rgba(239,68,68,0.18); color: #f87171; border: 2px solid rgba(239,68,68,0.35); }
.memorize-grade-btns .mg-miss:hover { background: rgba(239,68,68,0.3); }
.memorize-grade-btns .mg-got { background: rgba(34,197,94,0.18); color: #4ade80; border: 2px solid rgba(34,197,94,0.35); }
.memorize-grade-btns .mg-got:hover { background: rgba(34,197,94,0.3); }
.memorize-sr-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.78rem; color: var(--text-dim); }
.memorize-sr-bar span { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px 12px; }
.memorize-sr-bar span.sr-hot { border-color: var(--green); color: var(--green); }
</style>
</head>

<script>
// =========== QUESTIONS DATA ===========
const ALL_QUESTIONS = [{"id":1,"question":"You are implementing a software as a service (SaaS) ASP.NET Core web service that will run as an Azure Web App. The web service will use an on-premises SQL Server database for storage. The web service also includes a WebJob that processes data updates. Four customers will use the web service. Each instance of the WebJob processes data for a single customer and must run as a singleton instance. Each deployment must be tested by using deployment slots prior to serving production data. Azure costs must be minimized. Azure resources must be located in an isolated network. You need to configure the App Service plan for the Web App. How should you configure the App Service plan?","options":["Number of VM instances: 2. Pricing tier: Isolated.","Number of VM instances: 8. Pricing tier: Standard.","Number of VM instances: 16. Pricing tier: Premium.","Number of VM instances: 4. Pricing tier: Isolated.","Number of VM instances: 4. Pricing tier: Consumption."],"answer":"Number of VM instances: 4. Pricing tier: Isolated.","explanation":"Isolated tier runs in an App Service Environment (ASE), providing network isolation as required. 4 instances are needed because each WebJob runs as a singleton for one of the four customers; each instance hosts one customer's singleton WebJob. Standard/Premium don't provide network isolation; Consumption isn't an App Service plan tier.","images":["images/question1.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"Number of VM instances","choices":["2","8","16","4","Isolated","Standard","Premium","Consumption"],"correct":"4"},{"label":"Pricing tier","choices":["2","8","16","4","Isolated","Standard","Premium","Consumption"],"correct":"Isolated"}]},{"id":2,"question":"You are a developer for a software as a service (SaaS) company that uses an Azure Function to process orders. The Azure Function currently runs on an Azure Function app that is triggered by an Azure Storage queue. You are preparing to migrate the Azure Function to Kubernetes using Kubernetes-based Event Driven Autoscaling (KEDA). You need to configure Kubernetes Custom Resource Definitions (CRD) for the Azure Function. Which CRDs should you configure?","options":["Box 1, CRD type: Deployment. Box 2, CRD type: ScaledObject. Box 3, CRD type: Secret.","Box 1, CRD type: Secret. Box 2, CRD type: ScaledObject. Box 3, CRD type: Secret.","Box 1, CRD type: TriggerAuthentication. Box 2, CRD type: Deployment. Box 3, CRD type: Secret.","Box 1, CRD type: Deployment. Box 2, CRD type: ScaledObject. Box 3, CRD type: TriggerAuthentication."],"answer":"Box 1, CRD type: Deployment. Box 2, CRD type: ScaledObject. Box 3, CRD type: Secret.","explanation":"KEDA uses three CRDs for Azure Functions on Kubernetes: Deployment defines the function app container, ScaledObject defines the event source/trigger and scaling rules (replicas based on queue length), and Secret stores connection strings (e.g. AzureWebJobsStorage). TriggerAuthentication is optional and used only for advanced auth scenarios.","images":["images/question2.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["CRD type: Deployment","CRD type: Secret","CRD type: TriggerAuthentication","CRD type: ScaledObject"],"correct":"CRD type: Deployment"},{"label":"Box 2","choices":["CRD type: Deployment","CRD type: Secret","CRD type: TriggerAuthentication","CRD type: ScaledObject"],"correct":"CRD type: ScaledObject"},{"label":"Box 3","choices":["CRD type: Deployment","CRD type: Secret","CRD type: TriggerAuthentication","CRD type: ScaledObject"],"correct":"CRD type: Secret"}]},{"id":3,"question":"You are creating a CLI script that creates an Azure web app and related services in Azure App Service. The web app uses the following variables. You need to automatically deploy code from GitHub to the newly created web app. How should you complete the script?","options":["Box 1: `az webapp`. Box 2: `az webapp create`. Box 3: `git clone $gitrepo`. Box 4: `az webapp`. Box 5: `--plan $webappname`.","Box 1: `az appservice plan create`. Box 2: `az webapp create`. Box 3: `--plan $webappname`. Box 4: `az webapp deployment`. Box 5: `--repo-url $gitrepo --branch master --manual-integration`.","Box 1: `az appservice plan create`. Box 2: `az webapp deployment`. Box 3: `--plan $webappname`. Box 4: `az webapp deployment`. Box 5: `--repo-url $gitrepo --branch master --manual-integration`.","Box 1: `az group delete`. Box 2: `az webapp create`. Box 3: `git clone $gitrepo`. Box 4: `az appservice plan create`. Box 5: `git clone $gitrepo`."],"answer":"Box 1: `az appservice plan create`. Box 2: `az webapp create`. Box 3: `--plan $webappname`. Box 4: `az webapp deployment`. Box 5: `--repo-url $gitrepo --branch master --manual-integration`.","explanation":"The workflow: create App Service plan, create web app referencing the plan, then configure deployment source. `az webapp deployment source config` with `--repo-url`, `--branch`, and `--manual-integration` links GitHub to the web app for code deployment.","images":["images/question3_1.png","images/question3_2.jpeg"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`az appservice plan create`","`az group delete`","`az webapp`","`az webapp create`","`az webapp deployment`","`--plan $webappname`","`git clone $gitrepo`","`--repo-url $gitrepo --branch master --manual-integration`"],"correct":"`az appservice plan create`"},{"label":"Box 2","choices":["`az appservice plan create`","`az group delete`","`az webapp`","`az webapp create`","`az webapp deployment`","`--plan $webappname`","`git clone $gitrepo`","`--repo-url $gitrepo --branch master --manual-integration`"],"correct":"`az webapp create`"},{"label":"Box 3","choices":["`az appservice plan create`","`az group delete`","`az webapp`","`az webapp create`","`az webapp deployment`","`--plan $webappname`","`git clone $gitrepo`","`--repo-url $gitrepo --branch master --manual-integration`"],"correct":"`--plan $webappname`"},{"label":"Box 4","choices":["`az appservice plan create`","`az group delete`","`az webapp`","`az webapp create`","`az webapp deployment`","`--plan $webappname`","`git clone $gitrepo`","`--repo-url $gitrepo --branch master --manual-integration`"],"correct":"`az webapp deployment`"},{"label":"Box 5","choices":["`az appservice plan create`","`az group delete`","`az webapp`","`az webapp create`","`az webapp deployment`","`--plan $webappname`","`git clone $gitrepo`","`--repo-url $gitrepo --branch master --manual-integration`"],"correct":"`--repo-url $gitrepo --branch master --manual-integration`"}]},{"id":4,"question":"You develop a software as a service (SaaS) offering to manage photographs. Users upload photos to a web service which then stores the photos in Azure Storage Blob storage. The storage account type is General-purpose V2. When photos are uploaded, they must be processed to produce and save a mobile-friendly version of the image. The process to produce a mobile-friendly version of the image must start in less than one minute. You need to design the process that starts the photo processing. Solution: Trigger the photo processing from Blob storage events. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Event Grid BlobCreated events are delivered within seconds of upload, easily meeting the sub-1-minute start requirement. Event Grid is the recommended reactive pattern for General-purpose v2 storage accounts. A subscriber function processes the blob event reliably with minimal latency.","images":[],"source":"README"},{"id":5,"question":"You develop and deploy an Azure App Service API app to a Windows-hosted deployment slot named `Development`. You create additional deployment slots named `Testing` and `Production`. You enable auto swap on the `Production` deployment slot. You need to ensure that scripts run and resources are available before a swap operation occurs. Solution: Update the `web.config` file to include the `applicationInitialization` configuration element. Specify custom initialization actions to run the scripts. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"The `applicationInitialization` element in web.config allows custom initialization (warm-up requests) to run before the swap completes. App Service ensures the slot is warmed with these specified paths/scripts before routing production traffic, preventing cold-start issues during auto swap.","images":[],"source":"README"},{"id":6,"question":"You develop and deploy an Azure App Service API app to a Windows-hosted deployment slot named `Development`. You create additional deployment slots named `Testing` and `Production`. You enable auto swap on the `Production` deployment slot. You need to ensure that scripts run and resources are available before a swap operation occurs. Solution: Enable auto swap for the `Testing` slot. Deploy the app to the `Testing` slot. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Enabling auto swap on Testing and deploying there doesn't run initialization scripts before the Production swap. Auto swap is already configured on Production. The correct approach is to use `applicationInitialization` in web.config or a warm-up endpoint to run scripts before the swap completes.","images":[],"source":"README"},{"id":7,"question":"You develop and deploy an Azure App Service API app to a Windows-hosted deployment slot named `Development`. You create additional deployment slots named `Testing` and `Production`. You enable auto swap on the `Production` deployment slot. You need to ensure that scripts run and resources are available before a swap operation occurs. Solution: Disable auto swap. Update the app with a method named `statuscheck` to run the scripts. Re-enable auto swap and deploy the app to the `Production` slot. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"A method named `statuscheck` is not a recognized warm-up endpoint. Azure looks for `applicationInitialization` paths in web.config (or the `WEBSITE_SWAP_WARMUP_PING_PATH` setting). Arbitrary method names won't be invoked before swap, so scripts won't reliably run prior to swap.","images":[],"source":"README"},{"id":8,"question":"You develop a software as a service (SaaS) offering to manage photographs. Users upload photos to a web service which then stores the photos in Azure Storage Blob storage. The storage account type is General-purpose V2. When photos are uploaded, they must be processed to produce and save a mobile-friendly version of the image. The process to produce a mobile-friendly version of the image must start in less than one minute. You need to design the process that starts the photo processing. Solution: Convert the Azure Storage account to a BlockBlobStorage storage account. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Changing the storage account type to BlockBlobStorage does not itself trigger any processing. The question asks how to start the mobile-friendly image generation in <1 minute. Simply converting the account type provides no event/trigger mechanism, so it fails the goal.","images":[],"source":"README"},{"id":9,"question":"You are developing an Azure Web App. You configure TLS mutual authentication for the web app. You need to validate the client certificate in the web app.","options":["Client certificate location: Client cookie. Encoding type: URL.","Client certificate location: HTTP message body. Encoding type: Base64.","Client certificate location: HTTP request header. Encoding type: Unicode.","Client certificate location: HTTP request header. Encoding type: Base64."],"answer":"Client certificate location: HTTP request header. Encoding type: Base64.","explanation":"App Service TLS mutual auth forwards the client certificate in the `X-ARR-ClientCert` HTTP request header, Base64-encoded. Application code reads this header and decodes it into an X509Certificate2 for validation. Certificates are never placed in cookies or message bodies.","images":["images/question9.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"Client certificate location","choices":["Client cookie","HTTP message body","HTTP request header","URL","Base64","Unicode"],"correct":"HTTP request header"},{"label":"Encoding type","choices":["Client cookie","HTTP message body","HTTP request header","URL","Base64","Unicode"],"correct":"Base64"}]},{"id":10,"question":"You are developing a Docker/Go using Azure App Service Web App for Containers. You plan to run the container in an App Service on Linux. You identify a Docker container image to use. None of your current resource groups reside in a location that supports Linux. You must minimize the number of resource groups required. You need to create the application and perform an initial deployment. Which three Azure CLI commands should you use to develop the solution?","options":["Box 1: `az webapp create`. Box 2: `az appservice plan create`. Box 3: `az group create`.","Box 1: `az appservice plan create`. Box 2: `az group create`. Box 3: `az group update`.","Box 1: `az group create`. Box 2: `az appservice plan create`. Box 3: `az webapp create`.","Box 1: `az appservice plan create`. Box 2: `az webapp create`. Box 3: `az webapp update`."],"answer":"Box 1: `az group create`. Box 2: `az appservice plan create`. Box 3: `az webapp create`.","explanation":"Since no existing resource group supports Linux, first create a new resource group in a supported location (`az group create`). Then create a Linux App Service plan (`az appservice plan create --is-linux`), and finally create the web app referencing the Docker image (`az webapp create`).","images":["images/question10.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`az appservice plan create`","`az group create`","`az webapp create`","`az group update`","`az webapp update`"],"correct":"`az group create`"},{"label":"Box 2","choices":["`az appservice plan create`","`az group create`","`az webapp create`","`az group update`","`az webapp update`"],"correct":"`az appservice plan create`"},{"label":"Box 3","choices":["`az appservice plan create`","`az group create`","`az webapp create`","`az group update`","`az webapp update`"],"correct":"`az webapp create`"}]},{"id":11,"question":"Fourth Coffee has an ASP.NET Core web app that runs in Docker. The app is mapped to the `www.fourthcoffee.com` domain. Fourth Coffee is migrating this application to Azure. You need to provision an App Service Web App to host this docker image and map the custom domain to the App Service web app. A resource group named `FourthCoffeePublicWebResourceGroup` has been created in the WestUS region that contains an App Service Plan named `AppServiceLinuxDockerPlan`. Which order should the CLI commands be used to develop the solution?","options":["Box 1: `#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`. Box 2: `az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`. Box 3: `az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`. Box 4: `az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`.","Box 1: `#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`. Box 2: `az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`. Box 3: `az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`. Box 4: `az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`.","Box 1: `az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`. Box 2: `az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`. Box 3: `az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`. Box 4: `#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`.","Box 1: `az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`. Box 2: `az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`. Box 3: `#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`. Box 4: `az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`."],"answer":"Box 1: `#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`. Box 2: `az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`. Box 3: `az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`. Box 4: `az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`.","explanation":"Order: declare shell variables, create the web app on the existing plan, set the Docker container image, then add the custom hostname. The hostname must be added after the web app exists. The container image can be set before or after hostname, but standard pattern is image set first, then hostname mapping.","images":["images/question11.jpeg"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["`#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`","`az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`","`az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`","`az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`"],"correct":"`#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`"},{"label":"Box 2","choices":["`#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`","`az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`","`az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`","`az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`"],"correct":"`az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`"},{"label":"Box 3","choices":["`#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`","`az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`","`az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`","`az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`"],"correct":"`az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`"},{"label":"Box 4","choices":["`#/bin/bash appName='FourthCoffeePublicWeb$random' location='WestUS' dockerHubContainerPath='FourthCoffee/publicweb:v1' fqdn='http://www.fourthcoffee.com'>www.fourthcoffee.com`","`az webapp config container set --docker-custom-image-name $dockerHubContainerPath --name $appName --resource-group fourthCoffeePublicWebResourceGroup`","`az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`","`az webapp create --name $appName --plan AppServiceLinuxDockerPlan --resource-group fourthCoffeePublicWebResourceGroup`"],"correct":"`az webapp config hostname add --webapp-name $appName --resource-group fourthCoffeePublicWebResourceGroup --hostname $fqdn`"}],"orderMode":true},{"id":12,"question":"You are developing a serverless Java application on Azure. You create a new Azure Key Vault to work with secrets from a new Azure Functions application. The application must meet the following requirements: Reference the Azure Key Vault without requiring any changes to the Java code. Dynamically add and remove instances of the Azure Functions host based on the number of incoming application events. Ensure that instances are perpetually warm to avoid any cold starts. Connect to a VNet. Authentication to the Azure Key Vault instance must be removed if the Azure Function application is deleted. You need to grant the Azure Functions application access to the Azure Key Vault. Which three actions should you perform in sequence?","options":["Box 1: Create the Azure Functions app with a Consumption plan type. Box 2: Create an access policy in Azure Key Vault for the application identity. Box 3: Create a user-assigned managed identity for the application.","Box 1: Create the Azure Functions app with a Premium plan type. Box 2: Create a system-assigned managed identity for the application. Box 3: Create an access policy in Azure Key Vault for the application identity.","Box 1: Create the Azure Functions app with a Consumption plan type. Box 2: Create a user-assigned managed identity for the application. Box 3: Create an access policy in Azure Key Vault for the application identity.","Box 1: Create the Azure Functions app with a Premium plan type. Box 2: Create a user-assigned managed identity for the application. Box 3: Create an access policy in Azure Key Vault for the application identity."],"answer":"Box 1: Create the Azure Functions app with a Premium plan type. Box 2: Create a system-assigned managed identity for the application. Box 3: Create an access policy in Azure Key Vault for the application identity.","explanation":"Premium plan supports always-warm instances, VNet integration, and dynamic scaling (Consumption lacks pre-warmed instances and VNet). System-assigned managed identity is tied to the resource lifecycle — deleting the Function app automatically removes the identity and its KV access (meeting the cleanup requirement). Finally, grant that identity an access policy in Key Vault.","images":["images/question12.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Create a system-assigned managed identity for the application","Create a user-assigned managed identity for the application","Create an access policy in Azure Key Vault for the application identity","Create the Azure Functions app with a Consumption plan type","Create the Azure Functions app with a Premium plan type"],"correct":"Create the Azure Functions app with a Premium plan type"},{"label":"Box 2","choices":["Create a system-assigned managed identity for the application","Create a user-assigned managed identity for the application","Create an access policy in Azure Key Vault for the application identity","Create the Azure Functions app with a Consumption plan type","Create the Azure Functions app with a Premium plan type"],"correct":"Create a system-assigned managed identity for the application"},{"label":"Box 3","choices":["Create a system-assigned managed identity for the application","Create a user-assigned managed identity for the application","Create an access policy in Azure Key Vault for the application identity","Create the Azure Functions app with a Consumption plan type","Create the Azure Functions app with a Premium plan type"],"correct":"Create an access policy in Azure Key Vault for the application identity"}],"orderMode":true},{"id":13,"question":"You develop a website. You plan to host the website in Azure. You expect the website to experience high traffic volumes after it is published. You must ensure that the website remains available and responsive while minimizing cost. You need to deploy the website. What should you do?","options":["Deploy the website to a virtual machine. Configure the virtual machine to automatically scale when the CPU load is high.","Deploy the website to an App Service that uses the Shared service tier. Configure the App Service plan to automatically scale when the CPU load is high.","Deploy the website to a virtual machine. Configure a Scale Set to increase the virtual machine instance count when the CPU load is high.","Deploy the website to an App Service that uses the Standard service tier. Configure the App Service plan to automatically scale when the CPU load is high."],"answer":"Deploy the website to an App Service that uses the Standard service tier. Configure the App Service plan to automatically scale when the CPU load is high.","explanation":"Standard tier supports autoscaling (up to 10 instances) at lower cost than Premium, while the Shared tier does NOT support autoscaling. VMs/Scale Sets involve more management overhead and cost. App Service Standard with autoscale is the cost-effective, managed PaaS solution.","images":[],"source":"README"},{"id":14,"question":"A company is developing a Java web app. The web app code is hosted in a GitHub repository located at `https://github.com/Contoso/webapp`. The web app must be evaluated before it is moved to production. You must deploy the initial code release to a deployment slot named `staging`. You need to create the web app and deploy the code. How should you complete the commands?","options":["Box 1: `group`. Box 2: `appservice plan`. Box 3: `webapp`. Box 4: `webapp deployment slot`. Box 5: `webapp deployment source`.","Box 1: `appservice plan`. Box 2: `group`. Box 3: `webapp`. Box 4: `webapp deployment slot`. Box 5: `webapp deployment source`.","Box 1: `webapp`. Box 2: `group`. Box 3: `webapp deployment source`. Box 4: `webapp deployment slot`. Box 5: `appservice plan`.","Box 1: `webapp`. Box 2: `group`. Box 3: `webapp deployment source`. Box 4: `webapp deployment slot`. Box 5: `appservice plan`."],"answer":"Box 1: `group`. Box 2: `appservice plan`. Box 3: `webapp`. Box 4: `webapp deployment slot`. Box 5: `webapp deployment source`.","explanation":"Standard CLI order: `az group create` for the resource group, `az appservice plan create` for the plan, `az webapp create` for the app, `az webapp deployment slot create` for the staging slot, then `az webapp deployment source config` to link GitHub code to the staging slot.","images":["images/question14.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`appservice plan`","`group`","`webapp deployment slot`","`webapp deployment source`","`webapp`"],"correct":"`group`"},{"label":"Box 2","choices":["`appservice plan`","`group`","`webapp deployment slot`","`webapp deployment source`","`webapp`"],"correct":"`appservice plan`"},{"label":"Box 3","choices":["`appservice plan`","`group`","`webapp deployment slot`","`webapp deployment source`","`webapp`"],"correct":"`webapp`"},{"label":"Box 4","choices":["`appservice plan`","`group`","`webapp deployment slot`","`webapp deployment source`","`webapp`"],"correct":"`webapp deployment slot`"},{"label":"Box 5","choices":["`appservice plan`","`group`","`webapp deployment slot`","`webapp deployment source`","`webapp`"],"correct":"`webapp deployment source`"}],"orderMode":true},{"id":15,"question":"You have a web service that is used to pay for food deliveries. The web service uses Azure Cosmos DB as the data store. You plan to add a new feature that allows users to set a tip amount. The new feature requires that a property named tip on the document in Cosmos DB must be present and contain a numeric value. There are many existing websites and mobile apps that use the web service that will not be updated to set the tip property for some time. How should you complete the trigger?","options":["Box 1: `__value();`. Box 2: `if (request.getValue('tip') === null) {`. Box 3: `__.upsertDocument(i);`.","Box 1: `__readDocument()('item');`. Box 2: `if (!('tip' in i)) {`. Box 3: `__.replaceDocument(i);`.","Box 1: `getContext().getRequest();`. Box 2: `if (!('tip' in i)) {`. Box 3: `r.setBody(i);`.","Box 1: `getContext().getRequest();`. Box 2: `if (isNaN(i)['tip'] || i['tip'] === null) {`. Box 3: `r.setValue(i);`."],"answer":"Box 1: `getContext().getRequest();`. Box 2: `if (!('tip' in i)) {`. Box 3: `r.setBody(i);`.","explanation":"Cosmos DB pre-triggers use `getContext().getRequest()` to access the incoming request. The `in` operator checks if the document lacks the `tip` property (so it can be defaulted). After mutation, `r.setBody(i)` writes the updated item back into the request, so the insert/replace proceeds with the modified document.","images":["images/question15.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`__readDocument()('item');`","`__value();`","`getContext().getRequest();`","`if (!('tip' in i)) {`","`if (isNaN(i)['tip'] || i['tip'] === null) {`","`if (request.getValue('tip') === null) {`","`__.replaceDocument(i);`","`__.upsertDocument(i);`","`r.setBody(i);`","`r.setValue(i);`"],"correct":"`getContext().getRequest();`"},{"label":"Box 2","choices":["`__readDocument()('item');`","`__value();`","`getContext().getRequest();`","`if (!('tip' in i)) {`","`if (isNaN(i)['tip'] || i['tip'] === null) {`","`if (request.getValue('tip') === null) {`","`__.replaceDocument(i);`","`__.upsertDocument(i);`","`r.setBody(i);`","`r.setValue(i);`"],"correct":"`if (!('tip' in i)) {`"},{"label":"Box 3","choices":["`__readDocument()('item');`","`__value();`","`getContext().getRequest();`","`if (!('tip' in i)) {`","`if (isNaN(i)['tip'] || i['tip'] === null) {`","`if (request.getValue('tip') === null) {`","`__.replaceDocument(i);`","`__.upsertDocument(i);`","`r.setBody(i);`","`r.setValue(i);`"],"correct":"`r.setBody(i);`"}]},{"id":16,"question":"You develop an HTTP triggered Azure Function app to process Azure Storage blob data. The app is triggered using an output binding on the blob. The app continues to time out after four minutes. The app must process the blob data. You need to ensure the app does not time out and processes the blob data. Solution: Use the Durable Function async pattern to process the blob data. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"The Durable Functions async HTTP API pattern returns a 202 status with a status endpoint, allowing long-running orchestrations to execute without the HTTP timeout limit. The orchestrator can run indefinitely while the client polls for completion, effectively bypassing the ~4 minute HTTP function limit.","images":[],"source":"README"},{"id":17,"question":"You develop an HTTP triggered Azure Function app to process Azure Storage blob data. The app is triggered using an output binding on the blob. The app continues to time out after four minutes. The app must process the blob data. You need to ensure the app does not time out and processes the blob data. Solution: Pass the HTTP trigger payload into an Azure Service Bus queue to be processed by a queue trigger function and return an immediate HTTP success response. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Offloading work to a Service Bus queue decouples the HTTP request/response lifecycle from the long-running blob processing. The HTTP function quickly acknowledges (avoiding the 4-minute timeout), and a separate queue-triggered function processes the blob asynchronously without HTTP-imposed time limits.","images":[],"source":"README"},{"id":18,"question":"You develop an HTTP triggered Azure Function app to process Azure Storage blob data. The app is triggered using an output binding on the blob. The app continues to time out after four minutes. The app must process the blob data. You need to ensure the app does not time out and processes the blob data. Solution: Configure the app to use an App Service hosting plan and enable the Always On setting. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Always On in an App Service plan prevents idle shutdown but does not change the HTTP request timeout (~230 seconds for App Service, ~4-10 min for functions). Long-running HTTP processing still cannot exceed the request timeout, so this solution doesn't address the timeout issue.","images":[],"source":"README"},{"id":19,"question":"You develop a software as a service (SaaS) offering to manage photographs. Users upload photos to a web service which then stores the photos in Azure Storage Blob storage. The storage account type is General-purpose V2. When photos are uploaded, they must be processed to produce and save a mobile-friendly version of the image. The process to produce a mobile-friendly version of the image must start in less than one minute. You need to design the process that starts the photo processing. Solution: Move photo processing to an Azure Function triggered from the blob upload. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"[Medium confidence] A Blob-triggered Azure Function reacts to new blobs. On GPv2 accounts the blob trigger polls storage logs and can have higher latency, but Microsoft's official answer accepts this as meeting the sub-1-minute goal for this scenario (using the blob trigger directly on uploads).","images":[],"source":"README"},{"id":20,"question":"You are developing an application that uses Azure Blob storage. The application must read the transaction logs of all the changes that occur to the blobs and the blob metadata in the storage account for auditing purposes. The changes must be in the order in which they occurred, include only create, update, delete, and copy operations and be retained for compliance reasons. You need to process the transaction logs asynchronously. What should you do?","options":["Process all Azure Blob storage events by using Azure Event Grid with a subscriber Azure Function app.","Enable the change feed on the storage account and process all changes for available events.","Process all Azure Storage Analytics logs for successful blob events.","Use the Azure Monitor HTTP Data Collector API and scan the request body for successful blob events."],"answer":"Enable the change feed on the storage account and process all changes for available events.","explanation":"Azure Blob Storage change feed provides an ordered, durable, read-only transaction log of create/update/delete/copy operations on blobs and their metadata — exactly the audit requirements. Event Grid is not a durable audit log (events aren't retained); Storage Analytics logs aren't guaranteed ordered; Monitor HTTP Data Collector isn't for blob audit.","images":[],"source":"README"},{"id":21,"question":"You plan to create a Docker image that runs an ASP.NET Core application named `ContosoApp`. You have a setup script named `setupScript.ps1` and a series of application files including `ContosoApp.dll`. You need to create a Dockerfile document that meets the following requirements: Call setupScripts.ps1 when the container is built. Run `ContosoApp.dll` when the container starts. The Dockerfile document must be created in the same folder where `ContosoApp.dll` and `setupScript.ps1` are stored. Which five commands should you use to develop the solution?","options":["Box 1: `CMD ['dotnet', 'ContosoApp.dll']`. Box 2: `FROM microsoft/aspnetcore:latest`. Box 3: `RUN powershell ./setupScript.ps1`. Box 4: `WORKDIR /apps/ContosoApp`. Box 5: `COPY ./ .`.","Box 1: `COPY ./ .`. Box 2: `RUN powershell ./setupScript.ps1`. Box 3: `FROM microsoft/aspnetcore:latest`. Box 4: `CMD ['dotnet', 'ContosoApp.dll']`. Box 5: `WORKDIR /apps/ContosoApp`.","Box 1: `RUN powershell ./setupScript.ps1`. Box 2: `CMD ['dotnet', 'ContosoApp.dll']`. Box 3: `FROM microsoft/aspnetcore:latest`. Box 4: `WORKDIR /apps/ContosoApp`. Box 5: `COPY ./ .`.","Box 1: `FROM microsoft/aspnetcore:latest`. Box 2: `WORKDIR /apps/ContosoApp`. Box 3: `COPY ./ .`. Box 4: `RUN powershell ./setupScript.ps1`. Box 5: `CMD ['dotnet', 'ContosoApp.dll']`."],"answer":"Box 1: `FROM microsoft/aspnetcore:latest`. Box 2: `WORKDIR /apps/ContosoApp`. Box 3: `COPY ./ .`. Box 4: `RUN powershell ./setupScript.ps1`. Box 5: `CMD ['dotnet', 'ContosoApp.dll']`.","explanation":"Dockerfile order: FROM selects the base image, WORKDIR sets the working directory, COPY brings in the app files, RUN executes the setup script at build time, and CMD defines the default command executed when the container starts (dotnet runs ContosoApp.dll).","images":["images/question21.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`CMD ['dotnet', 'ContosoApp.dll']`","`COPY ./ .`","`FROM microsoft/aspnetcore:latest`","`RUN powershell ./setupScript.ps1`","`WORKDIR /apps/ContosoApp`"],"correct":"`FROM microsoft/aspnetcore:latest`"},{"label":"Box 2","choices":["`CMD ['dotnet', 'ContosoApp.dll']`","`COPY ./ .`","`FROM microsoft/aspnetcore:latest`","`RUN powershell ./setupScript.ps1`","`WORKDIR /apps/ContosoApp`"],"correct":"`WORKDIR /apps/ContosoApp`"},{"label":"Box 3","choices":["`CMD ['dotnet', 'ContosoApp.dll']`","`COPY ./ .`","`FROM microsoft/aspnetcore:latest`","`RUN powershell ./setupScript.ps1`","`WORKDIR /apps/ContosoApp`"],"correct":"`COPY ./ .`"},{"label":"Box 4","choices":["`CMD ['dotnet', 'ContosoApp.dll']`","`COPY ./ .`","`FROM microsoft/aspnetcore:latest`","`RUN powershell ./setupScript.ps1`","`WORKDIR /apps/ContosoApp`"],"correct":"`RUN powershell ./setupScript.ps1`"},{"label":"Box 5","choices":["`CMD ['dotnet', 'ContosoApp.dll']`","`COPY ./ .`","`FROM microsoft/aspnetcore:latest`","`RUN powershell ./setupScript.ps1`","`WORKDIR /apps/ContosoApp`"],"correct":"`CMD ['dotnet', 'ContosoApp.dll']`"}],"orderMode":true},{"id":22,"question":"You are developing an Azure Function App that processes images that are uploaded to an Azure Blob container. Images must be processed as quickly as possible after they are uploaded, and the solution must minimize latency. You create code to process images when the Function App is triggered. You need to configure the Function App. What should you do?","options":["Use an App Service plan. Configure the Function App to use an Azure Blob Storage input trigger.","Use a Consumption plan. Configure the Function App to use an Azure Blob Storage trigger.","Use a Consumption plan. Configure the Function App to use a Timer trigger.","Use an App Service plan. Configure the Function App to use an Azure Blob Storage trigger.","Use a Consumption plan. Configure the Function App to use an Azure Blob Storage input trigger."],"answer":"Use an App Service plan. Configure the Function App to use an Azure Blob Storage trigger.","explanation":"[Medium confidence] A Consumption plan Blob trigger uses polling (up to 10-minute latency unless using Event Grid). An App Service plan with Always On and the Blob trigger provides lower latency. The Blob Storage trigger (not input binding) is required to fire when a blob is uploaded.","images":[],"source":"README"},{"id":23,"question":"You are configuring a new development environment for a Java application. The environment requires a Virtual Machine Scale Set (VMSS), several storage accounts, and networking components. The VMSS must not be created until the storage accounts have been successfully created and an associated load balancer and virtual network is configured. How should you complete the Azure Resource Manager template?","options":["Box 1: `copyIndex`. Box 2: `copy`. Box 3: `dependsOn`.","Box 1: `copy`. Box 2: `copyIndex`. Box 3: `dependsOn`.","Box 1: `priority`. Box 2: `dependsOn`. Box 3: `copyIndex`.","Box 1: `priority`. Box 2: `copyIndex`. Box 3: `dependsOn`."],"answer":"Box 1: `copyIndex`. Box 2: `copy`. Box 3: `dependsOn`.","explanation":"In ARM templates, copyIndex() returns the current iteration index used to create unique resource names, the copy element performs resource iteration to create multiple storage accounts, and dependsOn ensures the VMSS waits for the storage accounts, load balancer, and VNet to be created first.","images":["images/question23.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`copyIndex`","`copy`","`priority`","`dependsOn`"],"correct":"`copyIndex`"},{"label":"Box 2","choices":["`copyIndex`","`copy`","`priority`","`dependsOn`"],"correct":"`copy`"},{"label":"Box 3","choices":["`copyIndex`","`copy`","`priority`","`dependsOn`"],"correct":"`dependsOn`"}]},{"id":24,"question":"You are developing an Azure Function App by using Visual Studio. The app will process orders input by an Azure Web App. The web app places the order information into Azure Queue Storage. You need to review the Azure Function App code shown below. Question 1: The code will log the time that the order was processed from the queue.","options":["Yes.","No."],"answer":"No.","explanation":"The standard QueueTrigger code pattern does not automatically log the processing time. The insertionTime property on the queue message represents when the message was inserted, not when it was processed. Without explicit logging of DateTime.Now, the code will not log the order processing time.","images":["images/question24_25_26_27.png"],"source":"README"},{"id":25,"question":"You are developing an Azure Function App by using Visual Studio. The app will process orders input by an Azure Web App. The web app places the order information into Azure Queue Storage. You need to review the Azure Function App code shown below. Question 2: When the ProcessOrders function fails, the function will retry up to five times for a given order, including the first try.","options":["Yes.","No."],"answer":"Yes.","explanation":"The default retry policy for Queue Storage triggered functions is 5 attempts (including the first try). After 5 failed attempts the message is sent to the poison queue (<queueName>-poison). This matches the default dequeueCount threshold.","images":["images/question24_25_26_27.png"],"source":"README"},{"id":26,"question":"You are developing an Azure Function App by using Visual Studio. The app will process orders input by an Azure Web App. The web app places the order information into Azure Queue Storage. You need to review the Azure Function App code shown below. Question 3: When there are multiple orders in the queue, a batch of orders will be received from the queue and the ProcessOrders function will run multiple instances concurrently to process the orders.","options":["Yes.","No."],"answer":"Yes.","explanation":"Azure Functions queue trigger fetches up to batchSize messages in parallel by default (default 16) and invokes the function concurrently for each message. Multiple instances of ProcessOrders will run concurrently to process queued orders.","images":["images/question24_25_26_27.png"],"source":"README"},{"id":27,"question":"You are developing an Azure Function App by using Visual Studio. The app will process orders input by an Azure Web App. The web app places the order information into Azure Queue Storage. You need to review the Azure Function App code shown below. Question 4: The ProcessOrders function will output the order to an Orders table in Azure Table Storage.","options":["Yes.","No."],"answer":"Yes.","explanation":"When a Table output binding is declared (e.g., [Table(\"Orders\")] out Order order), the function writes the order to the specified Azure Table Storage table. The code outputs to the Orders table as configured in the binding.","images":["images/question24_25_26_27.png"],"source":"README"},{"id":28,"question":"You are developing a solution for a hospital to support the following use cases: The most recent patient status details must be retrieved even if multiple users in different locations have updated the patient record. Patient health monitoring data retrieved must be the current version or the prior version. After a patient is discharged and all charges have been assessed, the patient billing record contains the final charges. You provision a Cosmos DB NoSQL database and set the default consistency level for the database account to Strong. You set the value for Indexing Mode to Consistent. You need to minimize latency and any impact to the availability of the solution. You must override the default consistency level at the query level to meet the required consistency guarantees for the scenarios. Which consistency levels should you implement?","options":["Box 1: Strong. Box 2: Consistent Prefix. Box 3: Eventual.","Box 1: Eventual. Box 2: Strong. Box 3: Bounded Staleness.","Box 1: Consistent Prefix. Box 2: Bounded Staleness. Box 3: Eventual.","Box 1: Strong. Box 2: Bounded Staleness. Box 3: Eventual."],"answer":"Box 1: Strong. Box 2: Bounded Staleness. Box 3: Eventual.","explanation":"Strong consistency guarantees latest committed writes across regions (patient status with multi-writer). Bounded Staleness guarantees reads lag writes by at most K versions or T time (current or prior version of monitoring data). Eventual consistency offers best performance/availability for final billing which is no longer updated.","images":["images/question28.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Consistent Prefix","Eventual","Strong","Bounded Staleness"],"correct":"Strong"},{"label":"Box 2","choices":["Consistent Prefix","Eventual","Strong","Bounded Staleness"],"correct":"Bounded Staleness"},{"label":"Box 3","choices":["Consistent Prefix","Eventual","Strong","Bounded Staleness"],"correct":"Eventual"}]},{"id":29,"question":"You are configuring a development environment for your team. You deploy the latest Visual Studio image from the Azure Marketplace to your Azure subscription. The development environment requires several software development kits (SDKs) and third-party components to support application development across the organization. You install and customize the deployed virtual machine (VM) for your development team. The customized VM must be saved to allow provisioning of a new team member development environment. You need to save the customized VM for future provisioning. Which tools or services should you use?","options":["Generalize the VM: Visual Studio command prompt. Store images: Azure Data Lake Storage.","Generalize the VM: Azure PowerShell. Store images: Azure Blob Storage.","Generalize the VM: Visual Studio command prompt. Store images: Azure File Storage.","Generalize the VM: Azure PowerShell. Store images: Azure File Storage."],"answer":"Generalize the VM: Azure PowerShell. Store images: Azure Blob Storage.","explanation":"To generalize a VM for imaging, use Sysprep on Windows and mark it generalized via Azure PowerShell (Set-AzVm -Generalized) or Azure CLI. Managed/unmanaged VM images (VHDs) are stored in Azure Blob Storage (page blobs), not File or Data Lake Storage.","images":["images/question29.png"],"source":"README","boxMode":true,"boxes":[{"label":"Generalize the VM","choices":["Visual Studio command prompt","Azure PowerShell","Azure Data Lake Storage","Azure Blob Storage","Azure File Storage"],"correct":"Azure PowerShell"},{"label":"Store images","choices":["Visual Studio command prompt","Azure PowerShell","Azure Data Lake Storage","Azure Blob Storage","Azure File Storage"],"correct":"Azure Blob Storage"}]},{"id":30,"question":"You are preparing to deploy a website to an Azure Web App from a GitHub repository. The website includes static content generated by a script. You plan to use the Azure Web App continuous deployment feature. You need to run the static generation script before the website starts serving traffic. What are two possible ways to achieve this goal?","options":["Add the path to the static content generation tool to `WEBSITE_RUN_FROM_PACKAGE` setting in the `host.json` file.","Add a `PreBuild` target in the websites `csproj` project file that runs the static content generation script.","Create a file named `run.cmd` in the folder `/run` that calls a script which generates the static content and deploys the website.","Create a file named `.deployment` in the root of the repository that calls a script which generates the static content and deploys the website."],"answer":"Add a `PreBuild` target in the websites `csproj` project file that runs the static content generation script.|Create a file named `.deployment` in the root of the repository that calls a script which generates the static content and deploys the website.","explanation":"A PreBuild MSBuild target in the csproj runs custom tasks before build/publish. A .deployment file in the repo root can specify a custom deployment script (e.g., deploy.cmd) that Kudu runs during continuous deployment to perform pre-start generation steps.","images":[],"source":"README"},{"id":31,"question":"You are developing an application to use Azure Blob storage. You have configured Azure Blob storage to include change feeds. A copy of your storage account must be created in another region. Data must be copied from the current storage account to the new storage account directly between the storage servers. You need to create a copy of the storage account in another region and copy the data. In which order should you perform the actions?","options":["Box 1: Create a new template deployment. Box 2: Export a Resource Manager template. Box 3: Modify the template by changing the storage account name and region. Box 4: Deploy the template to create a new storage account in the target region. Box 5: Use `AZCopy` to copy the data to the new storage account.","Box 1: Use `AZCopy` to copy the data to the new storage account. Box 2: Create a new template deployment. Box 3: Modify the template by changing the storage account name and region. Box 4: Deploy the template to create a new storage account in the target region. Box 5: Export a Resource Manager template.","Box 1: Export a Resource Manager template. Box 2: Create a new template deployment. Box 3: Modify the template by changing the storage account name and region. Box 4: Deploy the template to create a new storage account in the target region. Box 5: Use `AZCopy` to copy the data to the new storage account.","Box 1: Use `AZCopy` to copy the data to the new storage account. Box 2: Create a new template deployment. Box 3: Modify the template by changing the storage account name and region. Box 4: Deploy the template to create a new storage account in the target region. Box 5: Export a Resource Manager template."],"answer":"Box 1: Export a Resource Manager template. Box 2: Modify the template by changing the storage account name and region. Box 3: Create a new template deployment. Box 4: Deploy the template to create a new storage account in the target region. Box 5: Use `AZCopy` to copy the data to the new storage account","explanation":"First export the existing storage account ARM template, then modify the name/region. Next create a new template deployment, deploy it to provision the new account in the target region, and finally use AzCopy (with server-to-server copy) to move data directly between storage accounts.","images":["images/question31.jpeg"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["Create a new template deployment","Deploy the template to create a new storage account in the target region","Export a Resource Manager template","Modify the template by changing the storage account name and region","Use `AZCopy` to copy the data to the new storage account"],"correct":"Export a Resource Manager template"},{"label":"Box 2","choices":["Create a new template deployment","Deploy the template to create a new storage account in the target region","Export a Resource Manager template","Modify the template by changing the storage account name and region","Use `AZCopy` to copy the data to the new storage account"],"correct":"Modify the template by changing the storage account name and region"},{"label":"Box 3","choices":["Create a new template deployment","Deploy the template to create a new storage account in the target region","Export a Resource Manager template","Modify the template by changing the storage account name and region","Use `AZCopy` to copy the data to the new storage account"],"correct":"Create a new template deployment"},{"label":"Box 4","choices":["Create a new template deployment","Deploy the template to create a new storage account in the target region","Export a Resource Manager template","Modify the template by changing the storage account name and region","Use `AZCopy` to copy the data to the new storage account"],"correct":"Deploy the template to create a new storage account in the target region"},{"label":"Box 5","choices":["Create a new template deployment","Deploy the template to create a new storage account in the target region","Export a Resource Manager template","Modify the template by changing the storage account name and region","Use `AZCopy` to copy the data to the new storage account"],"correct":"Use `AZCopy` to copy the data to the new storage account"}],"orderMode":true},{"id":32,"question":"You are preparing to deploy an Azure virtual machine (VM)-based application. The VMs that run the application have the following requirements: When a VM is provisioned the firewall must be automatically configured before it can access Azure resources. Supporting services must be installed by using an Azure PowerShell script that is stored in Azure Storage. You need to ensure that the requirements are met. Which features should you use?","options":["Firewall configuration: Run Command. Supporting services script: Hybrid Runbook Worker.","Firewall configuration: Custom Script Extension. Supporting services script: Serial console.","Firewall configuration: Run Command. Supporting services script: Custom Script Extension.","Firewall configuration: Hybrid Runbook Worker. Supporting services script: Custom Script Extension."],"answer":"Firewall configuration: Run Command. Supporting services script: Custom Script Extension.","explanation":"[Medium confidence] Run Command executes scripts on a VM post-provision but requires network connectivity to work, so it can configure the firewall quickly via Azure agent. Custom Script Extension downloads scripts from Azure Storage (or GitHub) and runs them on the VM, ideal for installing supporting services.","images":["images/question32.jpeg"],"source":"README","boxMode":true,"boxes":[{"label":"Firewall configuration","choices":["Run Command","Custom Script Extension","Hybrid Runbook Worker","Serial console"],"correct":"Run Command"},{"label":"Supporting services script","choices":["Run Command","Custom Script Extension","Hybrid Runbook Worker","Serial console"],"correct":"Custom Script Extension"}]},{"id":33,"question":"A company is developing a Node.js web app. The web app code is hosted in a GitHub repository located at `https://github.com/TailSpinToys/webapp`. The web app must be reviewed before it is moved to production. You must deploy the initial code release to a deployment slot named `review`. You need to create the web app and deploy the code. How should you complete the commands?","options":["Box 1: `New-AzWebAppSlot`. Box 2: `New-AzWebApp`. Box 3: `New-AzAppServicePlan`. Box 4: `New-AzResourceGroup`.","Box 1: `New-AzResourceGroup`. Box 2: `New-AzAppServicePlan`. Box 3: `New-AzWebApp`. Box 4: `New-AzWebAppSlot`.","Box 1: `New-AzWebAppSlot`. Box 2: `New-AzAppServicePlan`. Box 3: `New-AzWebApp`. Box 4: `New-AzResourceGroup`.","Box 1: `New-AzResourceGroup`. Box 2: `New-AzAppServicePlan`. Box 3: `New-AzWebAppSlot`. Box 4: `New-AzWebApp`."],"answer":"Box 1: `New-AzResourceGroup`. Box 2: `New-AzAppServicePlan`. Box 3: `New-AzWebApp`. Box 4: `New-AzWebAppSlot`.","explanation":"Correct PowerShell provisioning order: create the resource group, then the App Service Plan, then the Web App that lives in the plan, then the deployment slot (review) on the Web App.","images":["images/question33.jpeg"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["`New-AzAppServicePlan`","`New-AzResourceGroup`","`New-AzWebAppSlot`","`New-AzWebApp`"],"correct":"`New-AzResourceGroup`"},{"label":"Box 2","choices":["`New-AzAppServicePlan`","`New-AzResourceGroup`","`New-AzWebAppSlot`","`New-AzWebApp`"],"correct":"`New-AzAppServicePlan`"},{"label":"Box 3","choices":["`New-AzAppServicePlan`","`New-AzResourceGroup`","`New-AzWebAppSlot`","`New-AzWebApp`"],"correct":"`New-AzWebApp`"},{"label":"Box 4","choices":["`New-AzAppServicePlan`","`New-AzResourceGroup`","`New-AzWebAppSlot`","`New-AzWebApp`"],"correct":"`New-AzWebAppSlot`"}],"orderMode":true},{"id":34,"question":"You are developing an application that needs access to an Azure virtual machine (VM). The access lifecycle for the application must be associated with the VM service instance. You need to enable managed identity for the VM. How should you complete the PowerShell segment?","options":["Box 1: `-AssignIdentity:`. Box 2: `$SystemAssigned`.","Box 1: `-AssignIdentity:`. Box 2: `$UserAssigned`.","Box 1: `-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown). Box 2: `$SystemAssigned`.","Box 1: `-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown). Box 2: `$UserAssigned`."],"answer":"Box 1: `-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown). Box 2: `$SystemAssigned`.","explanation":"Because the access lifecycle must be tied to the VM instance, use a System-Assigned managed identity (deleted when the VM is deleted). Update-AzVM uses -IdentityType with value SystemAssigned. A user-assigned identity has an independent lifecycle.","images":["images/question34.jpeg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`-AssignIdentity:`","`-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown)","`$SystemAssigned`","`$UserAssigned`"],"correct":"`-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown)"},{"label":"Box 2","choices":["`-AssignIdentity:`","`-IdentityId:` (note: screenshot has mistake, it should be `-IdentityType:` in the dropdown)","`$SystemAssigned`","`$UserAssigned`"],"correct":"`$SystemAssigned`"}]},{"id":35,"question":"You develop a software as a service (SaaS) offering to manage photographs. Users upload photos to a web service which then stores the photos in Azure Storage Blob storage. The storage account type is General-purpose V2. When photos are uploaded, they must be processed to produce and save a mobile-friendly version of the image. The process to produce a mobile-friendly version of the image must start in less than one minute. You need to design the process that starts the photo processing. Solution: Create an Azure Function app that uses the Consumption hosting model and that is triggered from the blob upload. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"A Consumption plan blob trigger uses polling and may have up to 10 minutes of latency for detecting new blobs (longer for cold instances). This fails the under-one-minute requirement. Use Event Grid triggered function or an App Service/Premium plan instead.","images":[],"source":"README"},{"id":36,"question":"You develop and deploy an Azure App Service API app to a Windows-hosted deployment slot named `Development`. You create additional deployment slots named `Testing` and `Production`. You enable auto swap on the `Production` deployment slot. You need to ensure that scripts run and resources are available before a swap operation occurs. Solution: Update the app with a method named `statuscheck` to run the scripts. Update the app settings for the app. Set the `WEBSITE_SWAP_WARMUP_PING_PATH` and `WEBSITE_SWAP_WARMUP_PING_STATUSES` with a path to the new method and appropriate response codes. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Setting WEBSITE_SWAP_WARMUP_PING_PATH and WEBSITE_SWAP_WARMUP_PING_STATUSES configures App Service to ping the specified path and verify expected response codes during the warm-up phase of the swap, ensuring scripts run and resources are ready before traffic is swapped.","images":[],"source":"README"},{"id":37,"question":"You create the following PowerShell script. Question 1: A log alert is created that sends an email when the CPU percentage is above 60 percent for five minutes.","options":["Yes.","No."],"answer":"No.","explanation":"[Medium confidence] The script creates a scheduled query (log) alert. The condition/query in the script tests machine heartbeats (Heartbeat table), not CPU percentage. Therefore the alert is not based on CPU > 60% for five minutes.","images":["images/question37_38_39.png"],"source":"README"},{"id":38,"question":"You create the following PowerShell script. Question 2: A log alert is created that sends an email when the number of machine heartbeats in the past hour is less than five.","options":["Yes.","No."],"answer":"Yes.","explanation":"[Medium confidence] The log alert uses a Heartbeat query with a threshold operator 'LessThan' and value 5 over a time window of one hour, matching the statement that an email is sent when fewer than five heartbeats are recorded in the past hour.","images":["images/question37_38_39.png"],"source":"README"},{"id":39,"question":"You create the following PowerShell script. Question 3: The log alert is scheduled to run every two hours.","options":["Yes.","No."],"answer":"No.","explanation":"[Medium confidence] The New-AzScheduledQueryRuleSchedule cmdlet in the script specifies a frequency (e.g., 60 minutes) that does not equal two hours. The alert runs on a different interval than every two hours, so the statement is false.","images":["images/question37_38_39.png"],"source":"README"},{"id":40,"question":"You are developing an Azure Function app. The app must meet the following requirements: Enable developers to write the functions by using the Rust language. Declaratively connect to an Azure Blob Storage account. You need to implement the app. Which Azure Function app features should you use?","options":["Enable developers to write the functions by using the Rust language: Hosting plan. Declaratively connect to an Azure Blog Storage account: Custom handler.","Enable developers to write the functions by using the Rust language: Runti
