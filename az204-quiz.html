scale throughput. With AutoscaleMaxThroughput of 5000, the minimum is 500 RU/s, not 400 RU/s. 400 RU/s is the manual provisioned minimum, not autoscale.","images":[],"source":"README"},{"id":204,"question":"You have an Azure Web app that uses Cosmos DB as a data store. You create a CosmosDB container by running the following PowerShell script: `$resourceGroupName = 'testResourceGroup' $accountName = 'testCosmosAccount' $databaseName = 'testDatabase' $containerName = 'testContainer' $partitionKeyPath = '/EmployeeId' $autoscaleMaxThroughput = 5000 New-AzCosmosDBSqlContainer - -ResourceGroupName $resourceGroupName -AccountName $accountName -DatabaseName $databaseName -Name $containerName -PartitionKeyKind Hash -PartitionKeyPath $partitionKeyPath -AutoscaleMaxThroughput $autoscaleMaxThroughput`. You create the following queries that target the container: `SELECT * FROM c WHERE c.EmployeeId > '12345' SELECT * FROM c WHERE c.UserID = '12345'`. Is the first query statement an in-partition query?","options":["Yes.","No."],"answer":"No.","explanation":"The partition key is /EmployeeId. The first query filters on EmployeeId with a range operator (>) which does not target a single partition value; it is a cross-partition (fan-out) query, not an in-partition query. In-partition queries require equality on the partition key.","images":[],"source":"README"},{"id":205,"question":"You have an Azure Web app that uses Cosmos DB as a data store. You create a CosmosDB container by running the following PowerShell script: `$resourceGroupName = 'testResourceGroup' $accountName = 'testCosmosAccount' $databaseName = 'testDatabase' $containerName = 'testContainer' $partitionKeyPath = '/EmployeeId' $autoscaleMaxThroughput = 5000 New-AzCosmosDBSqlContainer - -ResourceGroupName $resourceGroupName -AccountName $accountName -DatabaseName $databaseName -Name $containerName -PartitionKeyKind Hash -PartitionKeyPath $partitionKeyPath -AutoscaleMaxThroughput $autoscaleMaxThroughput`. You create the following queries that target the container: `SELECT * FROM c WHERE c.EmployeeId > '12345' SELECT * FROM c WHERE c.UserID = '12345'`. Is the second query statement a cross-partition query?","options":["Yes.","No."],"answer":"Yes.","explanation":"The partition key is /EmployeeId, but the second query filters on UserID which is not the partition key. Cosmos DB must fan out the query across all partitions, making it a cross-partition query.","images":[],"source":"README"},{"id":206,"question":"Your Microsoft Entra ID tenant has an Azure subscription linked to it. Your developer has created a mobile application that obtains Microsoft Entra ID access tokens using the OAuth 2 implicit grant type. The mobile application must be registered in Microsoft Entra ID. You require [a redirect URI] from the developer for registration purposes.","options":["No change required.","a secret.","a login hint.","a client ID."],"answer":"No change required.","explanation":"For OAuth 2.0 implicit grant flow used by mobile/SPA clients, registration in Microsoft Entra ID requires a redirect URI (reply URL) so tokens can be returned to the application. Client secrets are not used in the implicit flow.","images":[],"source":"README"},{"id":207,"question":"You develop an ASP.NET Core MVC application. You configure the application to track webpages and custom events. You need to identify trends in application usage. Which Azure Application Insights Usage Analysis features should you use?","options":["Box 1: Funnels. Box 2: Impact. Box 3: Retention. Box 4: User Flows.","Box 1: Impact. Box 2: Funnels. Box 3: Retention. Box 4: User Flows.","Box 1: Users. Box 2: Impact. Box 3: Retention. Box 4: User Flows.","Box 1: Impact. Box 2: Users. Box 3: User Flows. Box 4: Funnels."],"answer":"Box 1: Users. Box 2: Impact. Box 3: Retention. Box 4: User Flows.","explanation":"[FLAGGED - lower confidence] Application Insights Usage Analysis features: Users counts unique users; Impact analyzes how page load times influence conversions; Retention tracks how often users return; User Flows visualizes paths users take through the app. Changed from 'Funnels' to 'Users' based on typical ordering in Azure docs (image-dependent).","images":["images/question207.png"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["Funnels","Impact","Users","Retention","User Flows"],"correct":"Users"},{"label":"Box 2","choices":["Funnels","Impact","Users","Retention","User Flows"],"correct":"Impact"},{"label":"Box 3","choices":["Funnels","Impact","Users","Retention","User Flows"],"correct":"Retention"},{"label":"Box 4","choices":["Funnels","Impact","Users","Retention","User Flows"],"correct":"User Flows"}]},{"id":208,"question":"You are developing an application that uses a premium block blob storage account. You are optimizing costs by automating Azure Blob Storage access tiers. You apply the following policy rules to the storage account. You must determine the implications of applying the rules to the data. (Line numbers are included for reference only.) Question 1: Block blobs prefixed with container1/salesorders or container2/inventory which have not been modified in over 60 days are moved to cool storage. Blobs that have not been modified in 120 days are moved to the archive tier.","options":["Yes.","No."],"answer":"Yes.","explanation":"The lifecycle policy filters on container1/salesorders and container2/inventory prefixes. Blobs not modified for 60+ days move to cool, and not modified for 120+ days move to archive. This matches the described behavior.","images":["images/question208_209_210_211.png"],"source":"README"},{"id":209,"question":"You are developing an application that uses a premium block blob storage account. You are optimizing costs by automating Azure Blob Storage access tiers. You apply the following policy rules to the storage account. You must determine the implications of applying the rules to the data. (Line numbers are included for reference only.) Question 2: Blobs are moved to cool storage if they have not been accessed for 30 days.","options":["Yes.","No."],"answer":"No.","explanation":"The lifecycle policy uses daysAfterModificationGreaterThan (last modified time), not daysAfterLastAccessTimeGreaterThan. Blobs are moved to cool based on last modification date, not last-access date. Changed from Yes to No.","images":["images/question208_209_210_211.png"],"source":"README"},{"id":210,"question":"You are developing an application that uses a premium block blob storage account. You are optimizing costs by automating Azure Blob Storage access tiers. You apply the following policy rules to the storage account. You must determine the implications of applying the rules to the data. (Line numbers are included for reference only.) Question 3: Blobs will automatically be tiered from cool back to hot if accessed again after being tiered to cool.","options":["Yes.","No."],"answer":"No.","explanation":"Azure Blob Storage lifecycle management policies do not automatically re-tier blobs from cool back to hot when accessed. Auto-tiering back to hot on access requires access tracking with daysAfterLastAccessTimeGreaterThan combined with access-time tracking enabled, not a standard cool->hot rehydration. Changed from Yes to No.","images":["images/question208_209_210_211.png"],"source":"README"},{"id":211,"question":"You are developing an application that uses a premium block blob storage account. You are optimizing costs by automating Azure Blob Storage access tiers. You apply the following policy rules to the storage account. You must determine the implications of applying the rules to the data. (Line numbers are included for reference only.) Question 4: All block blobs older than 730 days will be deleted.","options":["Yes.","No."],"answer":"No.","explanation":"The delete action applies only to blobs matching the prefix filter (container1/salesorders and container2/inventory), not all block blobs in the storage account. Therefore the statement that 'all block blobs' older than 730 days will be deleted is incorrect.","images":["images/question208_209_210_211.png"],"source":"README"},{"id":212,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to store the user agreements. Where should you store the agreement after it is completed?","options":["Azure Storage queue.","Azure Event Hub.","Azure Service Bus topic.","Azure Event Grid topic."],"answer":"Azure Event Hub.","explanation":"User agreements must support millions per hour, be durable across services, and available to multiple parties. Azure Event Hubs is a high-throughput event ingestion/streaming platform supporting millions of events per second and allows multiple consumer groups to read the same stream independently.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg"],"source":"README"},{"id":213,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a u reate Cn alert Cg … - -scopes … - -condition \"avg Percentage CPU > 8\"`.","`az monitor metrics alert create Cn alert Cg … - -scopes … - -condition \"avg Percentage CPU > 800\"`.","`az monitor metrics alert create Cn alert Cg … - -scopes … - -condition \"CPU Usage > 800\"`.","`az monitor metrics alert create Cn alert Cg … - -scopes … - -condition \"CPU Usage > 8\"`."],"answer":"`az monitor metrics alert create Cn alert Cg … - -scopes … - -condition \"CPU Usage > 800\"`.","explanation":"[Medium confidence] Container Instances CPU Usage metric is reported in millicores (nanocores / CPU unit). 80% of 8 cores equals 6.4 cores, but the ACI CPU Usage metric reports in hundredths of a core, so 800 represents the threshold for 80% across 8 cores. The metric name is 'CPU Usage' for ACI, not 'Percentage CPU' (which is VM-level).","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg"],"source":"README"},{"id":214,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentA include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to deploy the `CheckUserContent` Azure Function. The solution must meet the security and cost requirements. Which hosting model should you use?","options":["Premium plan.","App Service plan.","Consumption plan."],"answer":"Premium plan.","explanation":"Security requires internal services to be accessible only from internal VNets. Consumption plan does not support VNet integration for Azure Functions. The Premium plan supports VNet integration and private endpoints while still providing elastic scaling with lower cost than a dedicated App Service plan. Changed from App Service plan to Premium plan.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg"],"source":"README"},{"id":219,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to ensure that validation testing is triggered per the requirements. How should you complete the code segment?","options":["Box 1: `ImagePushed`. Box 2: `repository`. Box 3: `topic`.","Box 1: `ImageDeployed`. Box 2: `service`. Box 3: `imageCollection`.","Box 1: `RepositoryUpdated`. Box 2: `service`. Box 3: `imageCollection`.","Box 1: `RepositoryItem`. Box 2: `aci`. Box 3: `topic`."],"answer":"Box 1: `ImagePushed`. Box 2: `repository`. Box 3: `topic`.","explanation":"Azure Container Registry emits an 'ImagePushed' event when a new image version is pushed. Event Grid subscription filters on 'repository' (e.g., the image repo name) and the event handler routes to the 'topic' (Event Grid topic) to trigger validation testing.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg","images/question219.jpeg"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["`ImageDeployed`","`ImagePushed`","`RepositoryItem`","`RepositoryUpdated`","`aci`","`imageCollection`","`repository`","`service`","`topic`"],"correct":"`ImagePushed`"},{"label":"Box 2","choices":["`ImageDeployed`","`ImagePushed`","`RepositoryItem`","`RepositoryUpdated`","`aci`","`imageCollection`","`repository`","`service`","`topic`"],"correct":"`repository`"},{"label":"Box 3","choices":["`ImageDeployed`","`ImagePushed`","`RepositoryItem`","`RepositoryUpdated`","`aci`","`imageCollection`","`repository`","`service`","`topic`"],"correct":"`topic`"}],"orderMode":true},{"id":220,"question":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage. You are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA: Messages are sent to `ContentUploadService`. Content is processed by `ContentAnalysisService`. After processing is complete, the content is posted to the social network or a rejection message is posted in its place. The `ContentAnalysisService` is deployed with Azure Container Instances from a private Azure Container Registry named `contosoimages`. The solution will use eight CPU cores. Microsoft Entra ID: Contoso, Ltd. uses Microsoft Entra ID for both internal and guest accounts. Requirements: `ContentAnalysisService` - The company's data science group built `ContentAnalysisService` which accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named `CheckUserContent` to perform the content checks. Costs: You must minimize costs for all Azure services. Manual review: To review content, the user must authenticate to the website portion of the `ContentAnalysisService` using their Microsoft Entra ID credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes. High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability. Monitoring: An alert must be raised if the `ContentUploadService` uses more than 80 percent of available CPU cores. Security: You have the following security requirements: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Microsoft Entra ID. User agreements: When a user submits content, they must agree to a user agreement. The agreement allows employees of Contoso, Ltd. to review content, store cookies on user devices, and track user's IP addresses. Information regarding agreements is used by multiple divisions within Contoso, Ltd. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour. Validation testing: When a new version of the `ContentAnalysisService` is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version. Issues: Users of the `ContentUploadService` report that they occasionally see HTTP `502` responses on specific pages. Code - `ContentUploadService` - `ApplicationManifest`. You need to configure the `ContentUploadService` deployment. Which two actions should you perform?","options":["Add the following markup to line CS23: `type: Private`.","Add the following markup to line CS24: `osType: Windows`.","Add the following markup to line CS24: `osType: Linux`.","Add the following markup to line CS23: `type: Public`."],"answer":"Add the following markup to line CS23: `type: Private`.|Add the following markup to line CS24: `osType: Linux`.","explanation":"Internal services must only be reachable from internal VNets, so the ACI IP address type should be 'Private' (attaches to a VNet). The ContentUploadService container images are Linux-based (typical for ACI + private registry scenarios), requiring osType: Linux.","images":["images/question193_194_195_212_213_214_215_216_217_218_219_220_1.jpeg","images/question193_194_195_212_213_214_215_216_217_218_219_220_2.jpeg"],"source":"README"},{"id":221,"source":"PDF","images":[],"background":"CASE STUDY 1 — Litware Inc\n\nYou are a developer for Litware Inc., a SaaS company that provides a solution for managing employee expenses. The solution consists of an ASP.NET Core Web API project that is deployed as an Azure Web App.\n\nOverall architecture: Employees upload receipts for the system to process. When processing is complete, the employee receives a summary report email. Employees use a web application to manage their receipts and perform additional tasks needed for reimbursement.\n\nReceipt processing: Employees may upload receipts in two ways:\n• Uploading using an Azure Files mounted folder\n• Uploading using the web application\n\nData Storage: Receipt and employee information is stored in an Azure SQL database.\n\nUsers table columns: UserId, ExpenseAccount (format 1234-123-1234), AllowedAmount, SupervisorId, SecurityPin.\n\nWeb Application: MSI is enabled for the Web App and configured to use the security principal name.\n\nIssue — Upload format: Employees occasionally report an issue when uploading a receipt using the web application. When they upload using the Azure File Share, the receipt does not appear in their profile. When this occurs, they delete the file in the file share and use the web application, which returns a 500 Internal Server error page.","question":"You need to ensure that the upload format issue is resolved. What code should you add at line RU14?\n\nThe code must check: response.StatusCode == [Box 1] && response.ReasonPhrase == \"[Box 2]\"","options":["A. Box 1: HttpStatusCode.InternalServerError  |  Box 2: CannotDeleteFileOrDirectory","B. Box 1: HttpStatusCode.Conflict  |  Box 2: SMBDeletePending","C. Box 1: HttpStatusCode.Conflict  |  Box 2: ShareBeingDeleted","D. Box 1: HttpStatusCode.InternalServerError  |  Box 2: ShareBeingDeleted"],"answer":"C","explanation":"When a file share is being deleted and a client tries to operate on it (e.g., recreate/rename/delete files within it), Azure Files returns HTTP 409 Conflict with ReasonPhrase 'ShareBeingDeleted'. Box 1 = HttpStatusCode.Conflict (409), Box 2 = ShareBeingDeleted. This is the documented Azure Storage error code for operations against a share that is in the process of being deleted.","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["HttpStatusCode.Conflict  |","HttpStatusCode.InternalServerError  |","CannotDeleteFileOrDirectory","SMBDeletePending","ShareBeingDeleted"],"correct":""},{"label":"Box 2","choices":["HttpStatusCode.Conflict  |","HttpStatusCode.InternalServerError  |","CannotDeleteFileOrDirectory","SMBDeletePending","ShareBeingDeleted"],"correct":""}],"caseStudy":"Litware Inc"},{"id":222,"source":"PDF","images":[],"background":"CASE STUDY 2 — Coho Winery (LabelMaker app)\n\nCoho Winery produces bottles and distributes a variety of wines globally. You are a developer implementing highly scalable and resilient applications to support online order processing using Azure solutions.\n\nLabelMaker app: Coho Winery has a LabelMaker application that prints labels for wine bottles. The application sends data to several printers. The application consists of five modules that run independently on virtual machines (VMs). Coho Winery plans to move the application to Azure and continue to support label creation.\n\nExternal partners send data to the LabelMaker application to include artwork and text for custom label designs.\n\nSecurity requirement: The LabelMaker applications must be secured by using an AAD account that has full access to all namespaces of the Azure Kubernetes Service (AKS) cluster.","question":"You need to meet the LabelMaker application security requirement. What should you do?","options":["A. Create a conditional access policy and assign it to the Azure Kubernetes Service cluster.","B. Place the Azure Active Directory account into an Azure AD group. Create a ClusterRoleBinding and assign it to the group.","C. Create a RoleBinding and assign it to the Azure AD account.","D. Create a Microsoft Azure Active Directory service principal and assign it to the Azure Kubernetes Service (AKS) cluster."],"answer":"B","explanation":"Full access to ALL namespaces of an AKS cluster requires a ClusterRoleBinding (not a namespace-scoped RoleBinding). AKS with Azure AD integration binds Kubernetes RBAC to AAD groups, so placing the AAD account in a group and binding the ClusterRole to that group is the documented pattern.","caseStudy":"Coho Winery"},{"id":223,"source":"PDF","images":[],"background":"CASE STUDY 3 — City Power & Light\n\nCity Power & Light company provides electrical infrastructure monitoring solutions for homes and businesses. The company is migrating solutions to Azure.\n\nArchitecture overview: The company has a public website located at http://www.cpandl.com/. The site is a single-page web application that runs in Azure App Service on Linux. The website uses files stored in Azure Storage and is cached in Azure Content Delivery Network (CDN) to serve static content.\n\nAPI Management and Azure Function App functions are used to process and store data in Azure Database for PostgreSQL. API Management is used to broker communications to the Azure Function app functions for Logic app integration. Logic apps are used to orchestrate the data processing while Service Bus and Event Grid handle messaging and events.\n\nThe solution uses Application Insights, Azure Monitor, and Azure Key Vault.\n\nFunction app — RequestUserApproval issue: You perform local testing for the RequestUserApproval function. The following error message displays:\n'Timeout value of 00:10:00 exceeded by function: RequestUserApproval'\nThe same error message displays when you test the function in an Azure development environment (via Kusto query on FunctionAppLogs where FunctionName == \"RequestUserApproval\").\n\nAsync operation tracking: The HTTP response is designed to implement long-running HTTP async APIs with Durable Functions. This pattern is sometimes referred to as the polling consumer pattern. Both the client and server implementations are built into the Durable Functions HTTP APIs.","question":"You need to correct the RequestUserApproval Function app error. What should you do?","options":["A. Update line RA13 to use the async keyword and return an HttpRequest object value.","B. Configure the Function app to use an App Service hosting plan. Enable the Always On setting of the hosting plan.","C. Update the function to be stateful by using Durable Functions to process the request payload.","D. Update the functionTimeout property of the host.json project file to 15 minutes."],"answer":"C","explanation":"Azure Functions on Consumption plan have a 10-minute max timeout. The scenario explicitly mentions implementing long-running HTTP async APIs via the async HTTP/polling consumer pattern, which is a built-in Durable Functions pattern. Making the function stateful with Durable Functions avoids the timeout by orchestrating long-running work.","caseStudy":"City Power & Light"},{"id":224,"source":"PDF","images":[],"background":"CASE STUDY 4 — Best For You Organics Company\n\nBest for You Organics Company is a global restaurant franchise that has multiple locations. The company wants to enhance user experiences and vendor integrations. The company plans to implement automated mobile ordering and delivery services.\n\nBest For You Organics hosts an Azure web app at https://www.bestforyouorganics.com. Users can use the web app to browse restaurant locations, menu items, nutritional information, and company information. The company developed and deployed a cross-platform mobile app.\n\nRequirements: You must develop a chatbot by using the Bot Builder SDK and Language Understanding Intelligence Service (LUIS). The chatbot must allow users to order food for pickup or delivery.\n\nDelivery API error — Scenario: The Delivery API intermittently throws the following exception:\n\"System.Data.Entity.Core.EntityCommandExecutionException: An error occurred while executing the command definition. See the inner exception for details. --> System.Data.SqlClient.SqlException: A transport-level error has occurred when receiving results from the server. (provider: Session Provider, error: 19 - Physical connection is not usable)\"\n\nIn Retry logic, error 19 is not included by default. You have to pass error code 19 to set retry logic for error code 19 (via errorNumbersToAdd: new List<int>() { 19 }).","question":"You need to resolve the delivery API error. What should you do?","options":["A. Implement simple retry by using the EnableRetryOnFailure feature of Entity Framework.","B. Implement exponential backoff by using the EnableRetryOnFailure feature of Entity Framework.","C. Implement the Circuit Breaker pattern by using the EnableRetryOnFailure feature of Entity Framework.","D. Invoke a custom execution strategy in Entity Framework."],"answer":"B","explanation":"EF Core's EnableRetryOnFailure uses an execution strategy (SqlServerRetryingExecutionStrategy) that implements exponential backoff by default, not simple retry. The scenario shows a transient SQL connection error (19); enabling retry on failure with errorNumbersToAdd = {19} provides exponential backoff retries for that error.","caseStudy":"Best For You Organics"},{"id":225,"source":"PDF","images":[],"background":"CASE STUDY 5 — Wide World Importers\n\nWide World Importers is moving all their datacenters to Azure. The company has developed several applications and services to support supply chain operations and would like to leverage serverless computing where possible.\n\nCurrent environment — Windows Server 2016 VM running BizTalk Server 2016 with workflows:\n• Ocean Transport – gathers and validates container information including container contents and arrival notices at various shipping ports.\n• Inland Transport – gathers and validates trucking information including fuel usage, number of stops, and routes.\n\nREST API calls supported: Container API, Location API, Shipping REST API.\n\nShipping Data: The application uses MongoDB JSON document storage database for all container and transport information.\n\nShipping Web Site: Located at http://shipping.wideworldimporters.com — displays shipping container tracking information and container contents.\n\nData migration requirement: Data migration from on-premises to Azure must minimize costs and downtime. The application uses MongoDB JSON document storage database for all container and transport information.","question":"You need to migrate on-premises shipping data to Azure. What should you use?","options":["A. Azure Cosmos DB Data Migration tool (dt.exe)","B. Azure Database Migration service","C. AzCopy","D. Azure Migrate"],"answer":"B","explanation":"Azure Database Migration Service performs resilient online migrations of MongoDB data to Azure Cosmos DB API for MongoDB at scale with minimal downtime. The scenario explicitly calls for minimizing costs and downtime for a MongoDB source, which matches DMS exactly. The older dt.exe tool is offline-only and does not minimize downtime.","caseStudy":"Wide World Importers"},{"id":226,"source":"PDF","images":[],"background":"CASE STUDY 6 — Contoso, Ltd\n\nYou are a developer for Contoso, Ltd. The company has a social networking website developed as a Single Page Application (SPA). The main web application loads user-uploaded content from blob storage.\n\nContent upload process: When users upload content using the SPA:\n• Messages are sent to ContentUploadService.\n• Content is processed by ContentAnalysisService.\n• After processing is complete, the content is posted to the social network or a rejection message is posted in its place.\n\nThe ContentAnalysisService is deployed with Azure Container Instances from a private Azure Container Registry named contosoimages. The solution will use eight CPU cores.\n\nAzure Active Directory: Contoso, Ltd. uses Azure Active Directory (Azure AD) for both internal and guest accounts.\n\nIssue: You need to investigate the http server log output to resolve the issue with the ContentUploadService.","question":"Which command should you use first?","options":["A. az webapp log","B. az ams live-output","C. az monitor activity-log","D. az container attach"],"answer":"D","explanation":"ContentAnalysisService runs on Azure Container Instances. 'az container attach' attaches the local console to a container's stdout/stderr streams, allowing you to view HTTP server log output directly. 'az webapp log' is for App Service, not ACI.","caseStudy":"Contoso, Ltd"},{"id":227,"source":"PDF","images":[],"background":"CASE STUDY 7 — Proseware, Inc\n\nYou are a developer for Proseware, Inc. You are developing an application that applies a set of governance policies for Proseware's internal services, external services, and applications. The application will also provide a shared library for common functionality.\n\nRequirements — Policy service: You develop and deploy a stateful ASP.NET Core 2.1 web application named Policy service to an Azure App Service Web App. The application reacts to events from Azure Event Grid and performs policy actions based on those events.\n\nRequirements:\n• The application must include the Event Grid Event ID field in all Application Insights telemetry.\n• Policy service must use Application Insights to automatically scale with the number of policy actions it is performing.\n\nNotification latency issue: Always On enables waking up on HTTP trigger, but does not prevent exceeding the max timeout of 230 seconds. If your function app is on the Consumption plan, there can be up to a 10-minute delay in processing new blobs if a function app has gone idle. To avoid this latency, you can switch to an App Service plan with Always On enabled.","question":"You need to resolve a notification latency issue. Which two actions should you perform? (Each correct answer presents part of the solution.)","options":["A. Ensure that the Azure Function is set to use a consumption plan.","B. Ensure that the Azure Function is using an App Service plan.","C. Set Always On to false.","D. Set Always On to true."],"answer":"B, D","explanation":"Consumption-plan function apps can go idle, causing up to 10-minute trigger latency. Switching to an App Service plan (B) and enabling Always On (D) keeps the app warm and eliminates cold-start latency. Always On is only available on App Service/Premium plans, so both are required.","caseStudy":"Proseware, Inc"},{"id":228,"source":"PDF","images":[],"background":"CASE STUDY 8 — VanArsdel, Ltd\n\nVanArsdel, Ltd. is a global office supply company based in Canada with retail store locations across the world. The company is developing several cloud-based solutions to support their stores, distributors, suppliers, and delivery services.\n\nCorporate website: The company provides a public website (http://www.vanarsdelltd.com). The website consists of a React JavaScript user interface, HTML, CSS, image assets, and several APIs hosted in Azure Functions.\n\nRetail Store Locations: The company supports thousands of store locations globally. Store locations send data every hour to an Azure Blob storage account to support inventory, purchasing and delivery services. Each record includes a location identifier and sales transaction information.\n\nInventory services requirement: The company has contracted a third-party to develop an API for inventory processing that requires access to a specific blob within the retail store storage account for three months to include read-only access to the data.","question":"You need to grant access to the retail store location data for the inventory service development effort. What should you use?","options":["A. Azure AD access token","B. Azure RBAC role","C. Shared access signature (SAS) token","D. Azure AD ID token","E. Azure AD refresh token"],"answer":"C","explanation":"A Shared Access Signature (SAS) grants delegated, time-limited, permission-scoped access to specific storage resources. The requirement — access to a specific blob for three months with read-only access for a third party — is precisely the SAS use case.","caseStudy":"VanArsdel, Ltd"},{"id":229,"source":"PDF","images":[],"background":"CASE STUDY 9 — Munson's Pickles and Preserves Farm\n\nMunson's Pickles and Preserves Farm is an agricultural cooperative corporation based in Washington, US, with farms located across the United States. The company supports agricultural production resources by distributing seeds, fertilizers, chemicals, fuel, and farm machinery to the farms.\n\nCurrent Environment: The company is migrating all applications from an on-premises datacenter to Microsoft Azure. Applications support distributors, farmers, and internal company staff.\n\nCorporate website: The company hosts a public website at http://www.munsonspicklesandpreservesfarm.com. The site supports farmers and distributors who request agricultural production resources.\n\nFarms: The company created a new customer tenant in the Microsoft Entra admin center to support authentication and authorization for applications.\n\nDistributors: Distributors integrate their applications with data that is accessible by using APIs hosted at http://www.munsonspicklesandpreservesfarm.com/api to receive and update resource data.\n\nSecurity requirement: You need to secure the corporate website to meet security requirements.","question":"What should you do?","options":["A. Create an Azure Cache for Redis instance. Update the code to support the cache.","B. Create an Azure Content Delivery Network profile and endpoint. Configure the endpoint.","C. Create an App Service instance with a standard plan. Configure the custom domain with a TLS/SSL certificate.","D. Create an Azure Application Gateway with a Web Application Firewall (WAF). Configure end-to-end TLS encryption and the WAF."],"answer":"D","explanation":"Azure Application Gateway with Web Application Firewall (WAF) provides OWASP-based protection for public web apps, and end-to-end TLS encrypts traffic both to the gateway and from the gateway to the backend. This is the documented pattern for securing a public corporate website.","caseStudy":"Munson's Pickles and Preserves Farm"},{"id":230,"source":"PDF","images":[],"background":"You are developing an Azure App Service REST API.\n\nThe API must be called by an Azure App Service web app. The API must retrieve and update user profile information stored in Azure Active Directory (Azure AD).\n\nYou need to configure the API to make the updates.\n\nNOTE: Each correct selection is worth one point.","question":"Which two tools should you use?","options":["A. Microsoft Graph API","B. Microsoft Authentication Library (MSAL)","C. Azure API Management","D. Microsoft Azure Security Center","E. Microsoft Azure Key Vault SDK"],"answer":"A, B","explanation":"Microsoft Graph API is the supported way to read/update Azure AD user profile information. MSAL is used to acquire the access tokens required to call Graph. Together they enable authenticated profile updates from the API.","caseStudy":null},{"id":231,"source":"PDF","images":[],"background":"You develop a REST API. You implement a user delegation SAS token to communicate with Azure Blob storage.\n\nThe token is compromised.\n\nYou need to revoke the token.\n\nNOTE: Each correct selection is worth one point (select two complete solutions).","question":"What are two possible ways to achieve this goal?","options":["A. Revoke the delegation key.","B. Delete the stored access policy.","C. Regenerate the account key.","D. Remove the role assignment for the security principal."],"answer":"A, D","explanation":"A user delegation SAS is signed with a user delegation key tied to an Azure AD security principal. It can be revoked by (A) revoking the user delegation key (Revoke-AzStorageAccountUserDelegationKeys), which invalidates all SAS tokens signed by it, or (D) removing the Azure RBAC role assignment for the principal used to issue the SAS. Account key regeneration does not affect user delegation SAS.","caseStudy":null},{"id":232,"source":"PDF","images":[],"background":"You develop and deploy an Azure Logic app that calls an Azure Function app. The Azure Function app includes an OpenAPI (Swagger) definition and uses an Azure Blob storage account. All resources are secured by using Azure Active Directory (Azure AD).\n\nRequirements:\n• The Azure Logic app must securely access the Azure Blob storage account.\n• Azure AD resources must remain if the Azure Logic app is deleted.\n\nYou need to secure the Azure Logic app.","question":"What should you do?","options":["A. Create a user-assigned managed identity and assign role-based access controls.","B. Create an Azure AD custom role and assign the role to the Azure Blob storage account.","C. Create an Azure Key Vault and issue a client certificate.","D. Create a system-assigned managed identity and issue a client certificate.","E. Create an Azure AD custom role and assign role-based access controls."],"answer":"A","explanation":"A user-assigned managed identity is created as a standalone Azure resource with its own lifecycle, so it remains in Azure AD even if the Logic App is deleted. Assigning RBAC roles on the Storage account to that identity grants secure, credential-free access. A system-assigned identity would be deleted with the Logic App, violating the requirement.","caseStudy":null},{"id":233,"source":"PDF","images":[],"background":"You are developing a solution that will use a multi-partitioned Azure Cosmos DB database. You plan to use the latest Azure Cosmos DB SDK for development.\n\nThe solution must meet the following requirements:\n• Send insert and update operations to an Azure Blob storage account.\n• Process changes to all partitions immediately.\n• Allow parallelization of change processing.\n\nYou need to process the Azure Cosmos DB operations.\n\nNOTE: Each correct selection is worth one point (select two complete solutions).","question":"What are two possible ways to achieve this goal?","options":["A. Create an Azure App Service API and implement the change feed estimator of the SDK. Scale the API by using multiple Azure App Service instances.","B. Create a background job in an Azure Kubernetes Service and implement the change feed feature of the SDK.","C. Create an Azure Function to use a trigger for Azure Cosmos DB. Configure the trigger to connect to the container.","D. Create an Azure Function that uses a FeedIterator object that processes the change feed by using the pull model on the container. Use a FeedRange object to parallelize the processing of the change feed across multiple functions."],"answer":"C, D","explanation":"C: The Azure Functions Cosmos DB trigger uses the change feed processor under the hood, automatically processing changes across all partitions in parallel and scaling out. D: The pull model via FeedIterator with FeedRange lets you explicitly partition the change feed into ranges and process them in parallel from multiple function instances. Both satisfy immediate, parallelized change processing.","caseStudy":null},{"id":234,"source":"PDF","images":[],"background":"You are developing a road tollway tracking application that sends tracking events by using Azure Event Hubs using premium tier.\n\nEach road must have a throttling policy uniquely assigned.\n\nYou need to configure the event hub to allow for per-road throttling.","question":"What should you do?","options":["A. Use a unique consumer group for each road.","B. Ensure each road stores events in a different partition.","C. Ensure each road has a unique connection string.","D. Use a unique application group for each road."],"answer":"D","explanation":"Event Hubs premium/dedicated supports Application Groups — a collection of client apps identified by a shared condition (e.g., SAS policy or AAD app ID) to which resource policies such as throttling can be applied. This enables per-road (per-application-group) throttling policies.","caseStudy":null},{"id":235,"source":"PDF","images":[],"background":"You are building a loyalty program for a major snack producer. When customers buy a snack at any of 100 participating retailers the event is recorded in Azure Event Hub. Each retailer is given a unique identifier that is used as the primary identifier for the loyalty program.\n\nRetailers must be able to be added or removed at any time. Retailers must only be able to record sales for themselves.\n\nYou need to ensure that retailers can record sales.","question":"What should you do?","options":["A. Use publisher policies for retailers.","B. Create a partition for each retailer.","C. Define a namespace for each retailer."],"answer":"A","explanation":"Event Hubs publisher policies give each publisher a unique identifier and enforce that a client can only publish events under its own identifier. This maps naturally to giving each retailer a unique publisher ID so they can only record sales for themselves, while allowing easy add/remove.","caseStudy":null},{"id":236,"source":"PDF","images":[],"background":"You deploy an ASP.NET web app to Azure App Service. You must monitor the web app by using Application Insights. You need to configure Application Insights to meet the requirements below.\n\nNOTE: Each correct selection is worth one point.\n\nRequirements:\n1. Automatically warn you of potential performance problems and failure anomalies in the web app.\n2. Automatically collect the state of the source code and variables when an exception is thrown in the web app.\n3. Capture performance traces of the web app without negatively affecting users of the web app.","question":"Match each requirement to the correct Application Insights feature. Which feature addresses each requirement?","options":["A. Requirement 1: Smart Detection  |  Requirement 2: Snapshot Debugger  |  Requirement 3: Profiler","B. Requirement 1: Profiler  |  Requirement 2: Smart Detection  |  Requirement 3: Snapshot Debugger","C. Requirement 1: Snapshot Debugger  |  Requirement 2: Profiler  |  Requirement 3: Smart Detection","D. Requirement 1: Smart Detection  |  Requirement 2: Profiler  |  Requirement 3: Snapshot Debugger"],"answer":"A","explanation":"Smart Detection proactively analyzes telemetry to warn about performance problems and failure anomalies. Snapshot Debugger captures source state and local variables when an exception is thrown. Application Insights Profiler captures production performance traces with minimal user impact. Mapping: 1-Smart Detection, 2-Snapshot Debugger, 3-Profiler.","caseStudy":null},{"id":237,"source":"PDF","images":[],"background":"You develop and deploy a web application to Azure App Service. The application accesses data stored in an Azure Storage account. The account contains several containers with several blobs with large amounts of data. You deploy all Azure resources to a single region.\n\nYou need to move the Azure Storage account to a new region. You must copy all data to the new region.\n\nNOTE: Select the action to perform FIRST.","question":"What should you do first?","options":["A. Export the Azure Storage account Azure Resource Manager template","B. Initiate a storage account failover","C. Configure object replication for all blobs","D. Use the AzCopy command line tool","E. Create a new Azure Storage account in the current region","F. Create a new subscription in the current region"],"answer":"A","explanation":"Documented Microsoft steps to move a storage account to a new region: (1) export the source account's ARM template, (2) modify the template for the new region/name, (3) deploy it to create the new account, (4) copy data with AzCopy, (5) clean up the old account. The FIRST step is exporting the ARM template.","caseStudy":null},{"id":238,"source":"PDF","images":[],"background":"Note: This question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.\n\nYou are developing a solution for a public facing API. The API back end is hosted in an Azure App Service instance. You have implemented a RESTful service for the API back end.\n\nYou must configure back-end authentication for the API Management service instance.\n\nSolution: You configure Client cert gateway credentials for the Azure resource.","question":"Does the solution meet the goal?","options":["A. Yes","B. No"],"answer":"B","explanation":"API Management backend authentication for an Azure resource of type App Service does not use 'Client cert' gateway credentials — client certificate authentication applies to HTTP(S) backends. For App Service, the recommended approach is managed identity or AAD auth. Therefore the proposed solution does not meet the goal.","caseStudy":null},{"id":239,"source":"PDF","images":[],"background":"Your company's Azure subscription includes an Azure Log Analytics workspace.\n\nYour company has a hundred on-premises servers that run either Windows Server 2012 R2 or Windows Server 2016, and is linked to the Azure Log Analytics workspace. The Azure Log Analytics workspace is set up to gather performance counters associated with security from these linked servers.\n\nYou must configure alerts based on the information gathered by the Azure Log Analytics workspace.\n\nRequirements:\n• Alert rules must allow for dimensions.\n• Alert creation time should be kept to a minimum.\n• A single alert notification must be created when the alert is created AND when the alert is resolved.\n\nYou need to make use of the necessary signal type when creating the alert rules.","question":"Which of the following is the option you should use?","options":["A. The Activity log signal type.","B. The Application Log signal type.","C. The Metric signal type.","D. The Audit Log signal type."],"answer":"C","explanation":"Metric alerts support dimensions, have the fastest/minimal setup, and automatically send notifications when a threshold is crossed and again when resolved (stateful). Log/Activity log alerts do not natively support the fire-and-resolve notification with dimensions as simply as metric alerts.","caseStudy":null},{"id":240,"source":"PDF","images":[],"background":"You develop a Web App on a tier D1 app service plan.\n\nYou notice that page load times increase during periods of peak traffic.\n\nYou want to implement automatic scaling when CPU load is above 80 percent. Your solution must minimize costs.","question":"What should you do first?","options":["A. Enable autoscaling on the Web App.","B. Switch to the Premium App Service tier plan.","C. Switch to the Standard App Service tier plan.","D. Switch to the Azure App Services consumption plan."],"answer":"C","explanation":"The D1 (Shared) tier does not support autoscaling. Standard is the lowest App Service tier that supports autoscale rules (e.g., CPU > 80%). Premium also supports autoscale but at higher cost, so Standard minimizes cost while meeting the requirement. Autoscale cannot be enabled until the plan is upgraded, so switching the plan must happen first.","caseStudy":null},{"id":241,"source":"PDF","images":[],"background":"You manage an Azure SQL database that allows for Azure AD authentication.\n\nYou need to make sure that database developers can connect to the SQL database via Microsoft SQL Server Management Studio (SSMS). You also need to make sure the developers use their on-premises Active Directory account for authentication. Your strategy should allow for authentication prompts to be kept to a minimum.\n\nWhich of the following should you implement?","question":"Which authentication method should you implement?","options":["A. Azure AD token.","B. Azure Multi-Factor Authentication.","C. Active Directory integrated authentication.","D. OATH software tokens."],"answer":"C","explanation":"Active Directory integrated authentication uses the developer's existing on-premises AD/Windows credentials (via federation with Azure AD) without prompting for a password, minimizing authentication prompts. In SSMS this is 'Active Directory - Integrated'. Token-based or MFA approaches require additional prompts.","caseStudy":null},{"id":242,"question":"You need to configure the integration for Azure Service Bus and Azure Event Grid for the City Power & Light solution.\n\nAzure Event Grid must use Azure Service Bus for queue-based load leveling. Events in Azure Event Grid must be routed directly to Service Bus queues for use in buffering.\n\nHow should you complete the CLI statement?\n\naz [Box 1] [Box 2] create --name ... --source-resource-id ... --endpoint-type [Box 3] --endpoint ...","options":["Box 1: eventgrid | Box 2: event-subscription | Box 3: servicebusqueue","Box 1: monitor | Box 2: event-subscription | Box 3: servicebusqueue","Box 1: eventgrid | Box 2: topic | Box 3: storagequeue","Box 1: servicebus | Box 2: subscription | Box 3: eventgridtopic"],"answer":"Box 1: eventgrid | Box 2: event-subscription | Box 3: servicebusqueue","explanation":"To route Azure Event Grid events to a Service Bus queue, you use the CLI command 'az eventgrid event-subscription create' with '--endpoint-type servicebusqueue'. Box 1 is 'eventgrid' (the CLI service group), Box 2 is 'event-subscription' (the sub-command), and Box 3 is 'servicebusqueue' (the endpoint type). This creates an event subscription that routes events directly from Event Grid to a Service Bus queue for queue-based load leveling and buffering, as required by the City Power & Light architecture.","images":[],"source":"PDF","caseStudy":"City Power & Light","background":"City Power & Light company provides electrical infrastructure monitoring solutions for homes and businesses. The company is migrating solutions to Azure.\n\nCurrent environment - Architecture overview:\nThe company has a public website located at http://www.cpandl.com/. The site is a single-page web application that runs in Azure App Service on Linux. The website uses files stored in Azure Storage and cached in Azure Content Delivery Network (CDN) to serve static content. API Management and Azure Function App functions are used to process and store data in Azure Database for PostgreSQL. API Management is used to broker communications to the Azure Function app functions for Logic app integration. Logic apps are used to orchestrate the data processing while Service Bus and Event Grid handle messaging and events. The solution uses Application Insights, Azure Monitor, and Azure Key Vault.\n\nUser authentication:\n1. The user selects Sign in in the website.\n2. The browser redirects the user to the Azure Active Directory (Azure AD) sign in page.\n3. The user signs in.\n4. Azure AD redirects the user's session back to the web application. The URL includes an access token.\n5. The web application calls an API and includes the access token in the authentication header. The application ID is sent as the audience ('aud') claim in the access token.\n6. The back-end API validates the access token.\n\nRequirements:\n- Corporate website: Communications and content must be secured by using SSL. Communications must use HTTPS. Data must be replicated to a secondary region and three availability zones. Data storage costs must be minimized.\n- Azure Database for PostgreSQL: The database connection string is stored in Azure Key Vault (name: cpandlkeyvault, secret: PostgreSQLConn). The connection information is updated frequently; the application must always use the latest information.\n- Azure Service Bus and Azure Event Grid: Azure Event Grid must use Azure Service Bus for queue-based load leveling. Events in Azure Event Grid must be routed directly to Service Bus queues for use in buffering. Events from Azure Service Bus and other Azure services must continue to be routed to Azure Event Grid for processing.\n- Security: All SSL certificates and credentials must be stored in Azure Key Vault. File access must restrict access by IP, protocol, and Azure AD rights. All user accounts and processes must receive only those privileges which are essential to perform their intended function.\n- Compliance: Auditing of the file updates and transfers must be enabled to comply with GDPR. The file updates must be read-only, stored in the order in which they occurred, include only create, update, delete, and copy operations, and be retained for compliance reasons.\n\nIssues:\n- Corporate website: CryptographicException: The system cannot find the file specified.\n- Function app: 'Timeout value of 00:10:00 exceeded by function: RequestUserApproval'\n- Logic app: '400 Bad Request' when calling the RequestUserApproval function via HttpTrigger.","boxMode":true,"boxes":[{"label":"Box 1","choices":["eventgrid","monitor","servicebus","storage","event-subscription","topic","subscription","queue","servicebusqueue","storagequeue","eventgridtopic","webhook"],"correct":"eventgrid"},{"label":"Box 2","choices":["eventgrid","monitor","servicebus","storage","event-subscription","topic","subscription","queue","servicebusqueue","storagequeue","eventgridtopic","webhook"],"correct":"event-subscription"},{"label":"Box 3","choices":["eventgrid","monitor","servicebus","storage","event-subscription","topic","subscription","queue","servicebusqueue","storagequeue","eventgridtopic","webhook"],"correct":"servicebusqueue"}]},{"id":243,"question":"You need to configure the ContentUploadService deployment for Contoso, Ltd.\n\nAll Internal services must only be accessible from internal Virtual Networks (VNets). The ContentAnalysisService is deployed with Azure Container Instances from a private Azure Container Registry.\n\nWhich two actions should you perform? Each correct answer presents part of the solution.\n\nNOTE: Each correct selection is worth one point.\n\nA. Add the following markup to line CS23: type: Private\nB. Add the following markup to line CS24: osType: Windows\nC. Add the following markup to line CS24: osType: Linux\nD. Add the following markup to line CS23: type: Public","options":["Add the following markup to line CS23: type: Private","Add the following markup to line CS24: osType: Windows","Add the following markup to line CS24: osType: Linux","Add the following markup to line CS23: type: Public"],"answer":"Add the following markup to line CS23: type: Private, Add the following markup to line CS24: osType: Linux","explanation":"Setting the network type to 'Private' ensures that the container group is only accessible from within a Virtual Network, satisfying the requirement that all internal services must only be accessible from internal VNets. Setting osType to 'Linux' is correct because the ContentAnalysisService is deployed from a private Azure Container Registry using Azure Container Instances, which defaults to and is optimized for Linux containers. Setting type to 'Public' would expose the service externally, violating security requirements, and Windows osType is not indicated by the scenario.","images":[],"source":"PDF","caseStudy":"Contoso, Ltd","background":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage.\n\nYou are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA:\n- Messages are sent to ContentUploadService.\n- Content is processed by ContentAnalysisService.\n- After processing is complete, the content is posted to the social network or a rejection message is posted in its place.\n\nThe ContentAnalysisService is deployed with Azure Container Instances from a private Azure Container Registry named contosoimages. The solution will use eight CPU cores.\n\nContoso, Ltd. uses Azure Active Directory (Azure AD) for both internal and guest accounts.\n\nRequirements:\n- ContentAnalysisService: Accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named CheckUserContent to perform the content checks.\n- Costs: You must minimize costs for all Azure services.\n- Manual review: To review content, the user must authenticate using their Azure AD credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes.\n- High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability.\n- Monitoring: An alert must be raised if the ContentUploadService uses more than 80 percent of available CPU cores.\n- Security: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Azure AD.\n- User agreements: When a user submits content, they must agree to a user agreement. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour.\n- Validation testing: When a new version of the ContentAnalysisService is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version.\n\nIssues: Users of the ContentUploadService report that they occasionally see HTTP 502 responses on specific pages.","boxMode":true,"boxes":[{"label":"Line CS23 (type)","choices":["type: Private","type: Public","osType: Windows","osType: Linux"],"correct":"type: Private"},{"label":"Line CS24 (osType)","choices":["type: Private","type: Public","osType: Windows","osType: Linux"],"correct":"osType: Linux"}]},{"id":244,"question":"You need to store the user agreements for Contoso, Ltd.\n\nWhen a user submits content, they must agree to a user agreement. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour.\n\nWhere should you store the agreement after it is completed?","options":["Azure Storage queue","Azure Event Hub","Azure Service Bus topic","Azure Event Grid topic"],"answer":"Azure Event Hub","explanation":"Azure Event Hub is designed for high-throughput telemetry and distributed data streaming, capable of receiving and processing millions of events per second with low latency and at-least-once delivery guarantees. This directly matches the requirement for millions of agreements per hour that must not be lost and must be available to all parties. Event Hub also supports replaying stored raw data, allowing multiple divisions to consume agreements independently regardless of their individual uptime. Azure Storage queues and Service Bus topics are not designed for this scale, and Event Grid topics are for event routing rather than durable storage.","images":[],"source":"PDF","caseStudy":"Contoso, Ltd","background":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage.\n\nYou are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA:\n- Messages are sent to ContentUploadService.\n- Content is processed by ContentAnalysisService.\n- After processing is complete, the content is posted to the social network or a rejection message is posted in its place.\n\nThe ContentAnalysisService is deployed with Azure Container Instances from a private Azure Container Registry named contosoimages. The solution will use eight CPU cores.\n\nContoso, Ltd. uses Azure Active Directory (Azure AD) for both internal and guest accounts.\n\nRequirements:\n- ContentAnalysisService: Accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named CheckUserContent to perform the content checks.\n- Costs: You must minimize costs for all Azure services.\n- Manual review: To review content, the user must authenticate using their Azure AD credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes.\n- High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability.\n- Monitoring: An alert must be raised if the ContentUploadService uses more than 80 percent of available CPU cores.\n- Security: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Azure AD.\n- User agreements: When a user submits content, they must agree to a user agreement. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour.\n- Validation testing: When a new version of the ContentAnalysisService is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version.\n\nIssues: Users of the ContentUploadService report that they occasionally see HTTP 502 responses on specific pages.","boxMode":false},{"id":245,"question":"You need to secure the Shipping Logic App for Wide World Importers.\n\nThe Shipping Logic App requires secure resources to the corporate VNet and use dedicated storage resources with a fixed costing model.\n\nWhat should you use?","options":["Azure App Service Environment (ASE)","Integration Service Environment (ISE)","VNet service endpoint","Azure AD B2B integration"],"answer":"Integration Service Environment (ISE)","explanation":"An Integration Service Environment (ISE) provides Logic Apps with direct, isolated access to resources inside an Azure Virtual Network. ISEs run in dedicated, isolated environments with their own dedicated storage and a fixed (not consumption-based) pricing model, satisfying both the VNet security requirement and the fixed costing model requirement. Azure App Service Environment (ASE) is for App Service workloads, not Logic Apps. VNet service endpoints only provide network-level access to Azure services without the dedicated runtime isolation ISE provides. Azure AD B2B is for guest identity federation.","images":[],"source":"PDF","caseStudy":"Wide World Importers","background":"Wide World Importers is migrating an on-premises shipping application to Azure.\n\nCurrent environment:\nA Windows Server 2016 VM runs BizTalk Server 2016 with the following workflows:\n- Ocean Transport: gathers and validates container information including container contents and arrival notices at various shipping ports.\n- Inland Transport: gathers and validates trucking information including fuel usage, number of stops, and routes.\n\nThe VM supports: Container API, Location API, and Shipping REST API. The application uses MongoDB for all container and transport information. The shipping website is at http://shipping.wideworldimporters.com/\n\nProposed solution: The VM has been migrated to a Standard_D16s_v3 Azure VM using Azure Site Recovery and must remain running in Azure to complete the BizTalk component migrations.\n\nRequirements:\n- Shipping Logic app: Support ocean and inland transport workflows. Support industry-standard X12 message format for vessel content details and arrival notices. Secure resources to the corporate VNet and use dedicated storage resources with a fixed costing model. Maintain on-premises connectivity to support legacy applications and final BizTalk migrations.\n- Shipping Function app: Implement secure function endpoints using app-level security and include Azure Active Directory (Azure AD).\n- REST APIs: Secure resources to the corporate VNet. Allow deployment to a testing location within Azure while not incurring additional costs. Automatically scale to double capacity during peak shipping times while not causing application downtime. Minimize costs when selecting an Azure payment model.\n- Shipping data: Data migration from on-premises to Azure must minimize costs and downtime.\n- Shipping website: Use Azure CDN and ensure maximum performance for dynamic content while minimizing latency and costs.\n\nIssues:\n- Windows Server 2016 VM: High network latency, jitter, and high CPU utilization. The VM must enable a quick restore from a 7-day snapshot to include in-place restore of disks.\n- Shipping website and REST APIs: 'No Access-Control-Allow-Origin header' CORS error when testing.","boxMode":false},{"id":246,"question":"You need to authenticate the user to the corporate website for City Power & Light as indicated by the architectural diagram.\n\nThe web application calls an API and includes the access token in the authentication header. The application ID is sent as the audience ('aud') claim in the access token. The back-end API validates the access token.\n\nWhich two values should you use? Each correct answer presents part of the solution.","options":["ID token signature","ID token claims","HTTP response code","Azure AD endpoint URI","Azure AD tenant ID"],"answer":"ID token signature, Azure AD endpoint URI","explanation":"To authenticate users via Azure AD, you need the ID token signature to validate the integrity and authenticity of the JWT (the signature is the raw material used to validate the token and confirm it was signed by Azure AD and not tampered with), and the Azure AD endpoint URI to identify the correct Azure AD endpoint from which to request and validate tokens. JWTs are split into three pieces: Header, Payload (claims), and Signature. The endpoint URI is used to construct the authorization endpoint. ID token claims alone are insufficient without signature validation, and the tenant ID alone does not serve as the validation mechanism.","images":[],"source":"PDF","caseStudy":"City Power & Light","background":"City Power & Light company provides electrical infrastructure monitoring solutions for homes and businesses. The company is migrating solutions to Azure.\n\nCurrent environment - Architecture overview:\nThe company has a public website located at http://www.cpandl.com/. The site is a single-page web application that runs in Azure App Service on Linux. The website uses files stored in Azure Storage and cached in Azure Content Delivery Network (CDN) to serve static content. API Management and Azure Function App functions are used to process and store data in Azure Database for P
