ostgreSQL. API Management is used to broker communications to the Azure Function app functions for Logic app integration. Logic apps are used to orchestrate the data processing while Service Bus and Event Grid handle messaging and events. The solution uses Application Insights, Azure Monitor, and Azure Key Vault.\n\nUser authentication:\n1. The user selects Sign in in the website.\n2. The browser redirects the user to the Azure Active Directory (Azure AD) sign in page.\n3. The user signs in.\n4. Azure AD redirects the user's session back to the web application. The URL includes an access token.\n5. The web application calls an API and includes the access token in the authentication header. The application ID is sent as the audience ('aud') claim in the access token.\n6. The back-end API validates the access token.\n\nRequirements:\n- Corporate website: Communications and content must be secured by using SSL. Communications must use HTTPS. Data must be replicated to a secondary region and three availability zones. Data storage costs must be minimized.\n- Azure Database for PostgreSQL: The database connection string is stored in Azure Key Vault (name: cpandlkeyvault, secret: PostgreSQLConn). The connection information is updated frequently; the application must always use the latest information.\n- Azure Service Bus and Azure Event Grid: Azure Event Grid must use Azure Service Bus for queue-based load leveling. Events in Azure Event Grid must be routed directly to Service Bus queues for use in buffering. Events from Azure Service Bus and other Azure services must continue to be routed to Azure Event Grid for processing.\n- Security: All SSL certificates and credentials must be stored in Azure Key Vault. File access must restrict access by IP, protocol, and Azure AD rights. All user accounts and processes must receive only those privileges which are essential to perform their intended function.\n- Compliance: Auditing of the file updates and transfers must be enabled to comply with GDPR. The file updates must be read-only, stored in the order in which they occurred, include only create, update, delete, and copy operations, and be retained for compliance reasons.\n\nIssues:\n- Corporate website: CryptographicException: The system cannot find the file specified.\n- Function app: 'Timeout value of 00:10:00 exceeded by function: RequestUserApproval'\n- Logic app: '400 Bad Request' when calling the RequestUserApproval function via HttpTrigger.","boxMode":false},{"id":247,"question":"You need to monitor ContentUploadService for Contoso, Ltd. according to the requirements.\n\nAn alert must be raised if the ContentUploadService uses more than 80 percent of available CPU cores. The solution will use eight CPU cores.\n\nWhich command should you use?","options":["az monitor metrics alert create –n alert –g … --scopes … --condition \"avg Percentage CPU > 8\"","az monitor metrics alert create –n alert –g … --scopes … --condition \"avg Percentage CPU > 800\"","az monitor metrics alert create –n alert –g … --scopes … --condition \"CPU Usage > 800\"","az monitor metrics alert create –n alert –g … --scopes … --condition \"CPU Usage > 8\""],"answer":"az monitor metrics alert create –n alert –g … --scopes … --condition \"avg Percentage CPU > 800\"","explanation":"The correct Azure Monitor CLI metric name is 'Percentage CPU' (not 'CPU Usage'). The solution uses 8 CPU cores, and 80% of 8 cores equals 6.4 cores. In the context of Azure Container Instances with multiple cores, the Percentage CPU metric aggregates across all cores: 8 cores at 100% each = 800 total. Therefore the threshold value is 800, representing 80% utilization across all 8 CPU cores. The threshold of 8 would only represent 1% per core, which is incorrect. Options using 'CPU Usage' are wrong because that is not the correct Azure Monitor metric name.","images":[],"source":"PDF","caseStudy":"Contoso, Ltd","background":"You are a developer for Contoso, Ltd. The company has a social networking website that is developed as a Single Page Application (SPA). The main web application for the social networking website loads user uploaded content from blob storage.\n\nYou are developing a solution to monitor uploaded data for inappropriate content. The following process occurs when users upload content by using the SPA:\n- Messages are sent to ContentUploadService.\n- Content is processed by ContentAnalysisService.\n- After processing is complete, the content is posted to the social network or a rejection message is posted in its place.\n\nThe ContentAnalysisService is deployed with Azure Container Instances from a private Azure Container Registry named contosoimages. The solution will use eight CPU cores.\n\nContoso, Ltd. uses Azure Active Directory (Azure AD) for both internal and guest accounts.\n\nRequirements:\n- ContentAnalysisService: Accepts user generated content as a string and returns a probable value for inappropriate content. Any values over a specific threshold must be reviewed by an employee of Contoso, Ltd. You must create an Azure Function named CheckUserContent to perform the content checks.\n- Costs: You must minimize costs for all Azure services.\n- Manual review: To review content, the user must authenticate using their Azure AD credentials. The website is built using React and all pages and API endpoints require authentication. In order to review content a user must be part of a ContentReviewer role. All completed reviews must include the reviewer's email address for auditing purposes.\n- High availability: All services must run in multiple regions. The failure of any service in a region must not impact overall application availability.\n- Monitoring: An alert must be raised if the ContentUploadService uses more than 80 percent of available CPU cores.\n- Security: Any web service accessible over the Internet must be protected from cross site scripting attacks. All websites and services must use SSL from a valid root certificate authority. Azure Storage access keys must only be stored in memory and must be available only to the service. All Internal services must only be accessible from internal Virtual Networks (VNets). All parts of the system must support inbound and outbound traffic restrictions. All service calls must be authenticated by using Azure AD.\n- User agreements: When a user submits content, they must agree to a user agreement. User responses must not be lost and must be available to all parties regardless of individual service uptime. The volume of agreements is expected to be in the millions per hour.\n- Validation testing: When a new version of the ContentAnalysisService is available the previous seven days of content must be processed with the new version to verify that the new version does not significantly deviate from the old version.\n\nIssues: Users of the ContentUploadService report that they occasionally see HTTP 502 responses on specific pages.","boxMode":false},{"id":248,"question":"You need to investigate the Azure Function app error message in the City Power & Light development environment.\n\nThe RequestUserApproval function times out with 'Timeout value of 00:10:00 exceeded'. The Logic app returns '400 Bad Request' when calling the function via HttpTrigger.\n\nWhat should you do?","options":["Connect Live Metrics Stream from Application Insights to the Azure Function app and filter the metrics.","Create a new Azure Log Analytics workspace and instrument the Azure Function app with Application Insights.","Update the Azure Function app with extension methods from Microsoft.Extensions.Logging to log events by using the log instance.","Add a new diagnostic setting to the Azure Function app to send logs to Log Analytics."],"answer":"Connect Live Metrics Stream from Application Insights to the Azure Function app and filter the metrics.","explanation":"Live Metrics Stream in Application Insights provides near-real-time monitoring of Azure Function apps, displaying metrics data as it is created with minimal delay. Azure Functions has built-in integration with Application Insights, and Live Metrics is specifically useful for investigating active errors and performance issues in a development environment. The other options (creating a new Log Analytics workspace, adding logging extension methods, or adding a new diagnostic setting) all involve setup steps that add latency before you can observe metrics, whereas Live Metrics Stream provides immediate visibility into failures, exceptions, and request rates.","images":[],"source":"PDF","caseStudy":"City Power & Light","background":"City Power & Light company provides electrical infrastructure monitoring solutions for homes and businesses. The company is migrating solutions to Azure.\n\nCurrent environment - Architecture overview:\nThe company has a public website located at http://www.cpandl.com/. The site is a single-page web application that runs in Azure App Service on Linux. The website uses files stored in Azure Storage and cached in Azure Content Delivery Network (CDN) to serve static content. API Management and Azure Function App functions are used to process and store data in Azure Database for PostgreSQL. API Management is used to broker communications to the Azure Function app functions for Logic app integration. Logic apps are used to orchestrate the data processing while Service Bus and Event Grid handle messaging and events. The solution uses Application Insights, Azure Monitor, and Azure Key Vault.\n\nUser authentication:\n1. The user selects Sign in in the website.\n2. The browser redirects the user to the Azure Active Directory (Azure AD) sign in page.\n3. The user signs in.\n4. Azure AD redirects the user's session back to the web application. The URL includes an access token.\n5. The web application calls an API and includes the access token in the authentication header. The application ID is sent as the audience ('aud') claim in the access token.\n6. The back-end API validates the access token.\n\nRequirements:\n- Corporate website: Communications and content must be secured by using SSL. Communications must use HTTPS. Data must be replicated to a secondary region and three availability zones. Data storage costs must be minimized.\n- Azure Database for PostgreSQL: The database connection string is stored in Azure Key Vault (name: cpandlkeyvault, secret: PostgreSQLConn). The connection information is updated frequently; the application must always use the latest information.\n- Azure Service Bus and Azure Event Grid: Azure Event Grid must use Azure Service Bus for queue-based load leveling. Events in Azure Event Grid must be routed directly to Service Bus queues for use in buffering. Events from Azure Service Bus and other Azure services must continue to be routed to Azure Event Grid for processing.\n- Security: All SSL certificates and credentials must be stored in Azure Key Vault. File access must restrict access by IP, protocol, and Azure AD rights. All user accounts and processes must receive only those privileges which are essential to perform their intended function.\n- Compliance: Auditing of the file updates and transfers must be enabled to comply with GDPR. The file updates must be read-only, stored in the order in which they occurred, include only create, update, delete, and copy operations, and be retained for compliance reasons.\n\nIssues:\n- Corporate website: CryptographicException: The system cannot find the file specified.\n- Function app: 'Timeout value of 00:10:00 exceeded by function: RequestUserApproval'\n- Logic app: '400 Bad Request' when calling the RequestUserApproval function via HttpTrigger.","boxMode":false},{"id":249,"question":"You need to support the requirements for the Shipping Logic App for Wide World Importers.\n\nThe Shipping Logic App must maintain on-premises connectivity to support legacy applications and final BizTalk migrations. It must support X12 message format and the gateway supports BizTalk Server 2016.\n\nWhat should you use?","options":["Azure Active Directory Application Proxy","Site-to-Site (S2S) VPN connection","On-premises Data Gateway","Point-to-Site (P2S) VPN connection"],"answer":"On-premises Data Gateway","explanation":"The On-premises Data Gateway enables Azure Logic Apps to securely connect to on-premises data sources, acting as a bridge for quick data transfer and encryption between on-premises systems and cloud logic apps. The gateway specifically supports BizTalk Server 2016 and, combined with Logic Apps Enterprise Integration Pack, enables X12 EDI message format processing. Azure AD Application Proxy is for publishing on-premises web apps. S2S and P2S VPN connections establish network-level connectivity but are not the specific mechanism Logic Apps uses for on-premises data source access. The On-premises Data Gateway is the correct Logic Apps-native solution.","images":[],"source":"PDF","caseStudy":"Wide World Importers","background":"Wide World Importers is migrating an on-premises shipping application to Azure.\n\nCurrent environment:\nA Windows Server 2016 VM runs BizTalk Server 2016 with the following workflows:\n- Ocean Transport: gathers and validates container information including container contents and arrival notices at various shipping ports.\n- Inland Transport: gathers and validates trucking information including fuel usage, number of stops, and routes.\n\nThe VM supports: Container API, Location API, and Shipping REST API. The application uses MongoDB for all container and transport information. The shipping website is at http://shipping.wideworldimporters.com/\n\nProposed solution: The VM has been migrated to a Standard_D16s_v3 Azure VM using Azure Site Recovery and must remain running in Azure to complete the BizTalk component migrations.\n\nRequirements:\n- Shipping Logic app: Support ocean and inland transport workflows. Support industry-standard X12 message format for vessel content details and arrival notices. Secure resources to the corporate VNet and use dedicated storage resources with a fixed costing model. Maintain on-premises connectivity to support legacy applications and final BizTalk migrations.\n- Shipping Function app: Implement secure function endpoints using app-level security and include Azure Active Directory (Azure AD).\n- REST APIs: Secure resources to the corporate VNet. Allow deployment to a testing location within Azure while not incurring additional costs. Automatically scale to double capacity during peak shipping times while not causing application downtime. Minimize costs when selecting an Azure payment model.\n- Shipping data: Data migration from on-premises to Azure must minimize costs and downtime.\n- Shipping website: Use Azure CDN and ensure maximum performance for dynamic content while minimizing latency and costs.\n\nIssues:\n- Windows Server 2016 VM: High network latency, jitter, and high CPU utilization. The VM must enable a quick restore from a 7-day snapshot to include in-place restore of disks.\n- Shipping website and REST APIs: 'No Access-Control-Allow-Origin header' CORS error when testing.","boxMode":false}];
</script>
<script id="questions-data"></script>
<script>
// We'll load questions inline below
</script>
<script>
// =========== APP CODE ===========

const Storage = {
  get(key, def) { try { const v = localStorage.getItem('az204_' + key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set(key, val) { try { localStorage.setItem('az204_' + key, JSON.stringify(val)); } catch {} }
};

let state = {
  mode: 'menu',
  quizMode: 'all',
  questions: [],
  currentIndex: 0,
  selectedOptions: [],
  answered: false,
  correct: Storage.get('correct', {}),
  wrong: Storage.get('wrong', {}),
  wrongHistory: Storage.get('wrongHistory', {}),
  bookmarked: Storage.get('bookmarked', {}),
  shuffle: Storage.get('shuffle', true),
  sessionCorrect: 0,
  sessionWrong: 0,
  sessionTotal: 0,
  showExplanation: false,
  // Box mode state
  boxSelections: {},  // { boxIndex: selectedChoiceIndex }
  // Session resume
  savedSession: Storage.get('savedSession', null),
  // Study tools
  notes: Storage.get('notes', {}),
  confidence: Storage.get('confidence', {}),
  streak: Storage.get('streak', { lastStudied: null, currentStreak: 0, longestStreak: 0 }),
  sessionStreak: 0,
  bestSessionStreak: 0,
  smartMixCfg: Storage.get('smartMixCfg', { newPct: 60, wrongPct: 30, bookmarkedPct: 10, count: 20 }),
  examMode: false,
  examEndTime: null,
  examDurationMin: 120,
  examQuestionCount: 40,
  flashcardMode: false,
  flashcardRevealed: false,
  searchQuery: '',
  // Memorize mode
  memorizeMode: false,
  memorizeRevealed: false,
  memorizeData: Storage.get('memorize', {}),
  topicFilter: Storage.get('topicFilter', null)
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function isMultiAnswer(q) {
  if (q.boxMode) return false;
  const ans = q.answer || '';
  return ans.includes(',') || ans.includes('|') || ans.includes(';');
}

function isBoxQuestion(q) {
  return q.boxMode === true && q.boxes && q.boxes.length > 0;
}

function getCorrectAnswers(q) {
  const ans = q.answer || '';
  if (ans.includes('|')) return ans.split('|').map(a => a.trim());
  if (/^[A-E][,\s]*[A-E]/.test(ans)) {
    return ans.replace(/[\s,]+/g, '').split('').filter(c => /[A-E]/.test(c));
  }
  return [ans.trim()];
}

function isOptionCorrect(q, optionText, optionIndex) {
  const correctAnswers = getCorrectAnswers(q);
  if (correctAnswers.includes(optionText)) return true;
  const letter = String.fromCharCode(65 + optionIndex);
  if (correctAnswers.includes(letter)) return true;
  const optLetter = optionText.match(/^([A-E])\./);
  if (optLetter && correctAnswers.includes(optLetter[1])) return true;
  return false;
}

function saveSession() {
  const session = {
    quizMode: state.quizMode,
    questionIds: state.questions.map(q => q.id),
    currentIndex: state.currentIndex,
    sessionCorrect: state.sessionCorrect,
    sessionWrong: state.sessionWrong,
    sessionTotal: state.sessionTotal
  };
  Storage.set('savedSession', session);
  state.savedSession = session;
}

function clearSession() {
  Storage.set('savedSession', null);
  state.savedSession = null;
}

function resumeSession() {
  const s = state.savedSession;
  if (!s) return;
  const idSet = new Set(s.questionIds);
  const ordered = s.questionIds.map(id => ALL_QUESTIONS.find(q => q.id === id)).filter(Boolean);
  if (ordered.length === 0) { clearSession(); return; }
  state.mode = 'quiz';
  state.quizMode = s.quizMode;
  state.questions = ordered;
  state.currentIndex = s.currentIndex;
  state.sessionCorrect = s.sessionCorrect;
  state.sessionWrong = s.sessionWrong;
  state.sessionTotal = s.sessionTotal;
  state.selectedOptions = [];
  state.boxSelections = {};
  state.answered = false;
  state.showExplanation = false;
  render();
}

// =========== STUDY TOOLS: backup / export / import ===========
function createBackup(reason) {
  var snap = { timestamp: Date.now(), reason: reason || 'auto', keys: {} };
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('az204_') === 0 && k !== 'az204_backup') snap.keys[k] = localStorage.getItem(k);
  }
  try { localStorage.setItem('az204_backup', JSON.stringify(snap)); } catch(e) {}
}

function restoreBackup() {
  var raw = localStorage.getItem('az204_backup');
  if (!raw) { alert('No backup available.'); return; }
  var b;
  try { b = JSON.parse(raw); } catch(e) { alert('Backup is corrupt.'); return; }
  if (!b || !b.keys) { alert('No backup data.'); return; }
  var when = new Date(b.timestamp).toLocaleString();
  if (!confirm('Restore backup from ' + when + ' (' + (b.reason || 'unknown') + ')? Current progress will be overwritten.')) return;
  for (var k in b.keys) { if (Object.prototype.hasOwnProperty.call(b.keys, k)) localStorage.setItem(k, b.keys[k]); }
  alert('Backup restored. Reloading.');
  location.reload();
}

function exportProgress() {
  var data = { exportedAt: new Date().toISOString(), version: 1, keys: {} };
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('az204_') === 0) data.keys[k] = localStorage.getItem(k);
  }
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'az204-progress-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function importProgressFile(fileInput) {
  var file = fileInput.files && fileInput.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data || !data.keys) throw new Error('Missing keys field');
      if (!confirm('Import will overwrite current progress. A backup of your current state will be saved first. Continue?')) return;
      createBackup('pre-import');
      for (var k in data.keys) {
        if (Object.prototype.hasOwnProperty.call(data.keys, k) && k.indexOf('az204_') === 0 && k !== 'az204_backup') {
          localStorage.setItem(k, data.keys[k]);
        }
      }
      alert('Progress imported. Reloading.');
      location.reload();
    } catch(err) { alert('Invalid progress file: ' + err.message); }
  };
  reader.readAsText(file);
  fileInput.value = '';
}

// =========== STUDY TOOLS: streaks ===========
function todayStr() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function daysBetween(a, b) {
  if (!a || !b) return null;
  var pa = a.split('-').map(Number), pb = b.split('-').map(Number);
  var da = new Date(pa[0], pa[1]-1, pa[2]);
  var db = new Date(pb[0], pb[1]-1, pb[2]);
  return Math.round((db - da) / 86400000);
}
function bumpDailyStreak() {
  var today = todayStr();
  var s = state.streak || { lastStudied: null, currentStreak: 0, longestStreak: 0 };
  if (s.lastStudied === today) return;
  var gap = daysBetween(s.lastStudied, today);
  if (gap === 1) s.currentStreak = (s.currentStreak || 0) + 1;
  else s.currentStreak = 1;
  if (s.currentStreak > (s.longestStreak || 0)) s.longestStreak = s.currentStreak;
  s.lastStudied = today;
  state.streak = s;
  Storage.set('streak', s);
}

// =========== STUDY TOOLS: question selection ===========
function drillHardestOrder(questions) {
  // Score: wrongCount heavily weighted, penalised by correct attempts and hard confidence.
  return [...questions].map(function(q) {
    var w = state.wrongHistory[q.id] || 0;
    var c = state.correct[q.id] || 0;
    var conf = state.confidence[q.id];
    var confBoost = conf === 'hard' ? 3 : conf === 'medium' ? 1 : conf === 'easy' ? -2 : 0;
    var currentlyWrong = state.wrong[q.id] ? 5 : 0;
    return { q: q, score: w * 10 + currentlyWrong + confBoost - c * 0.8 + Math.random() * 1.5 };
  }).sort(function(a, b) { return b.score - a.score; }).map(function(x) { return x.q; });
}

function buildSmartMix() {
  var cfg = state.smartMixCfg;
  var count = Math.max(5, Math.min(ALL_QUESTIONS.length, cfg.count || 20));
  var wrongPool = ALL_QUESTIONS.filter(function(q) { return state.wrong[q.id]; });
  var bookmarkedPool = ALL_QUESTIONS.filter(function(q) { return state.bookmarked[q.id] && !state.wrong[q.id]; });
  var unseenPool = ALL_QUESTIONS.filter(function(q) { return !state.correct[q.id] && !state.wrong[q.id]; });
  var seenPool = ALL_QUESTIONS.filter(function(q) { return state.correct[q.id] && !state.wrong[q.id] && !state.bookmarked[q.id]; });
  var newPool = unseenPool.length > 0 ? unseenPool : seenPool;
  var nWrong = Math.round(count * (cfg.wrongPct || 0) / 100);
  var nBook = Math.round(count * (cfg.bookmarkedPct || 0) / 100);
  var nNew = count - nWrong - nBook;
  var seenIds = {}, out = [];
  function take(pool, n) {
    var picked = shuffle(pool).filter(function(q) { return !seenIds[q.id]; }).slice(0, n);
    picked.forEach(function(q) { seenIds[q.id] = 1; out.push(q); });
  }
  take(wrongPool, nWrong);
  take(bookmarkedPool, nBook);
  take(newPool, nNew);
  // Fill gaps from any remaining pool
  if (out.length < count) {
    var remaining = ALL_QUESTIONS.filter(function(q) { return !seenIds[q.id]; });
    take(remaining, count - out.length);
  }
  return shuffle(out);
}

// =========== STUDY TOOLS: exam mode ===========
function startExam() {
  if (!confirm('Start exam simulation?\n\n' + state.examQuestionCount + ' random questions, ' + state.examDurationMin + ' minutes, no explanations during the exam. You can still bookmark. Good luck.')) return;
  var qs = shuffle([...ALL_QUESTIONS]).slice(0, state.examQuestionCount);
  state.mode = 'quiz';
  state.quizMode = 'exam';
  state.examMode = true;
  state.examEndTime = Date.now() + state.examDurationMin * 60 * 1000;
  state.questions = qs;
  state.currentIndex = 0;
  state.selectedOptions = [];
  state.boxSelections = {};
  state.answered = false;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionTotal = qs.length;
  state.showExplanation = false;
  state.sessionStreak = 0;
  state.bestSessionStreak = 0;
  saveSession();
  render();
}

function endExam(auto) {
  if (!state.examMode) return;
  state.examMode = false;
  state.examEndTime = null;
  state.mode = 'results';
  clearSession();
  if (auto) alert('Time is up! The exam has ended.');
  render();
}

function tickExamTimer() {
  if (!state.examMode || !state.examEndTime) return;
  var el = document.getElementById('examTimer');
  var banner = document.getElementById('examBanner');
  var ms = state.examEndTime - Date.now();
  if (ms <= 0) { if (el) el.textContent = '00:00'; endExam(true); return; }
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  var txt = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  if (el) el.textContent = txt;
  if (banner) {
    if (ms < 5 * 60 * 1000) banner.classList.add('warning');
    else banner.classList.remove('warning');
  }
}
setInterval(tickExamTimer, 1000);

// =========== STUDY TOOLS: notes & confidence ===========
function saveNote(qId, text) {
  if (text && text.trim()) state.notes[qId] = text;
  else delete state.notes[qId];
  Storage.set('notes', state.notes);
}

function setConfidence(qId, level) {
  if (state.confidence[qId] === level) delete state.confidence[qId];
  else state.confidence[qId] = level;
  Storage.set('confidence', state.confidence);
  render();
}

// =========== STUDY TOOLS: flashcards ===========
function startFlashcards(sourceMode) {
  var pool = [...ALL_QUESTIONS];
  if (sourceMode === 'wrong') pool = pool.filter(function(q) { return state.wrong[q.id]; });
  else if (sourceMode === 'bookmarked') pool = pool.filter(function(q) { return state.bookmarked[q.id]; });
  if (pool.length === 0) { alert('No questions in this set.'); return; }
  if (state.shuffle) pool = shuffle(pool);
  state.mode = 'quiz';
  state.quizMode = 'flashcard';
  state.flashcardMode = true;
  state.flashcardRevealed = false;
  state.questions = pool;
  state.currentIndex = 0;
  state.selectedOptions = [];
  state.boxSelections = {};
  state.answered = false;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionTotal = pool.length;
  state.showExplanation = false;
  state.sessionStreak = 0;

// =========== STUDY TOOLS: search ===========
function onSearchInput(v) { state.searchQuery = v; renderMenu(document.getElementById('app')); }

function startQuiz(mode) {
  let qs = [...ALL_QUESTIONS];
  if (mode === 'wrong') qs = qs.filter(q => state.wrong[q.id]);
  else if (mode === 'bookmarked') qs = qs.filter(q => state.bookmarked[q.id]);
  else if (mode === 'drill') {
    // Hardest: uses wrongHistory + current wrong + hard confidence. Falls back to all if empty.
    var pool = ALL_QUESTIONS.filter(function(q) { return (state.wrongHistory[q.id] || 0) > 0 || state.wrong[q.id] || state.confidence[q.id] === 'hard'; });
    if (pool.length === 0) pool = [...ALL_QUESTIONS];
    qs = drillHardestOrder(pool);
  }
  else if (mode === 'smart') { qs = buildSmartMix(); }
  else if (mode === 'missing-exp') { qs = ALL_QUESTIONS.filter(function(q) { return !q.explanation || !q.explanation.trim(); }); }
  if (qs.length === 0) {
    alert(mode === 'wrong' ? 'No wrong answers to review!' : mode === 'bookmarked' ? 'No bookmarked questions!' : mode === 'missing-exp' ? 'All questions have explanations!' : 'No questions found for this mode.');
    return;
  }
  if (state.shuffle && mode !== 'drill' && mode !== 'smart') qs = shuffle(qs);
  state.mode = 'quiz';
  state.quizMode = mode;
  state.examMode = false;
  state.flashcardMode = false;
  state.questions = qs;
  state.currentIndex = 0;
  state.selectedOptions = [];
  state.boxSelections = {};
  state.answered = false;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionTotal = qs.length;
  state.showExplanation = false;
  state.sessionStreak = 0;
  state.bestSessionStreak = 0;
  saveSession();
  render();
}

function selectOption(idx) {
  if (state.answered) return;
  const q = state.questions[state.currentIndex];
  if (isMultiAnswer(q)) {
    if (state.selectedOptions.includes(idx)) state.selectedOptions = state.selectedOptions.filter(i => i !== idx);
    else state.selectedOptions.push(idx);
  } else {
    state.selectedOptions = [idx];
  }
  render();
}

function selectBoxChoice(boxIdx, choiceIdx) {
  if (state.answered) return;
  state.boxSelections[boxIdx] = choiceIdx;
  render();
}

function submitAnswer() {
  const q = state.questions[state.currentIndex];

  if (isBoxQuestion(q)) {
    // Check that all boxes have a selection
    for (let i = 0; i < q.boxes.length; i++) {
      if (state.boxSelections[i] === undefined) return;
    }
    state.answered = true;
    // Check each box
    let allCorrect = true;
    for (let i = 0; i < q.boxes.length; i++) {
      const selected = q.boxes[i].choices[state.boxSelections[i]];
      if (selected !== q.boxes[i].correct) allCorrect = false;
    }
    if (allCorrect) {
      state.sessionCorrect++;
      state.correct[q.id] = (state.correct[q.id] || 0) + 1;
      delete state.wrong[q.id];
      state.sessionStreak++;
      if (state.sessionStreak > state.bestSessionStreak) state.bestSessionStreak = state.sessionStreak;
    } else {
      state.sessionWrong++;
      state.wrong[q.id] = true;
      state.wrongHistory[q.id] = (state.wrongHistory[q.id] || 0) + 1;
      state.sessionStreak = 0;
    }
  } else {
    if (state.selectedOptions.length === 0) return;
    state.answered = true;
    const correctIndices = [];
    q.options.forEach((opt, i) => { if (isOptionCorrect(q, opt, i)) correctIndices.push(i); });
    const selectedSet = new Set(state.selectedOptions);
    const correctSet = new Set(correctIndices);
    let allCorrect = selectedSet.size === correctSet.size;
    if (allCorrect) for (const s of selectedSet) { if (!correctSet.has(s)) { allCorrect = false; break; } }
    if (allCorrect) {
      state.sessionCorrect++;
      state.correct[q.id] = (state.correct[q.id] || 0) + 1;
      delete state.wrong[q.id];
      state.sessionStreak++;
      if (state.sessionStreak > state.bestSessionStreak) state.bestSessionStreak = state.sessionStreak;
    } else {
      state.sessionWrong++;
      state.wrong[q.id] = true;
      state.wrongHistory[q.id] = (state.wrongHistory[q.id] || 0) + 1;
      state.sessionStreak = 0;
    }
  }

  Storage.set('correct', state.correct);
  Storage.set('wrong', state.wrong);
  Storage.set('wrongHistory', state.wrongHistory);
  bumpDailyStreak();
  saveSession();
  render();
}

function nextQuestion() {
  if (state.currentIndex < state.questions.length - 1) {
    state.currentIndex++;
    state.selectedOptions = [];
    state.boxSelections = {};
    state.answered = false;
    state.showExplanation = false;
    state.flashcardRevealed = false;
    saveSession();
    render();
    window.scrollTo(0, 0);
  } else {
    state.mode = 'results';
    if (state.examMode) { state.examMode = false; state.examEndTime = null; }
    if (state.memorizeMode) { state.memorizeMode = false; }
    clearSession();
    render();
  }
}

function prevQuestion() {
  if (state.currentIndex > 0) {

    state.answered = false;
    state.showExplanation = false;
    state.flashcardRevealed = false;
    saveSession();
    render();

}

// =========== MEMORIZE MODE ===========
const SR_INTERVALS_DAYS = [1, 3, 7, 14, 30]; // streak 1→5+

function srNextDue(streak) {
  const days = SR_INTERVALS_DAYS[Math.min(streak - 1, SR_INTERVALS_DAYS.length - 1)];
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

function buildMemorizeQueue() {
  const pool = filteredPool();
  const now = Date.now();
  const md = state.memorizeData;
  const unseen   = pool.filter(q => !md[q.id]);
  const overdue  = pool.filter(q => md[q.id] && new Date(md[q.id].nextDue).getTime() <= now)
                       .sort((a, b) => new Date(md[a.id].nextDue) - new Date(md[b.id].nextDue));
  const upcoming = pool.filter(q => md[q.id] && new Date(md[q.id].nextDue).getTime() > now)
                       .sort((a, b) => new Date(md[a.id].nextDue) - new Date(md[b.id].nextDue));
  return [...overdue, ...shuffle(unseen), ...upcoming];
}

function startMemorize() {
  const qs = buildMemorizeQueue();
  if (qs.length === 0) { alert('No questions found for this filter.'); return; }
  state.mode = 'quiz';
  state.quizMode = 'memorize';
  state.memorizeMode = true;
  state.memorizeRevealed = false;
  state.flashcardMode = false;
  state.examMode = false;
  state.questions = qs;
  state.currentIndex = 0;
  state.selectedOptions = [];
  state.boxSelections = {};
  state.answered = false;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionTotal = qs.length;
  state.sessionStreak = 0;
  state.bestSessionStreak = 0;
  render();
}

function memorizeReveal() {
  state.memorizeRevealed = true;
  render();
}

function memorizeGrade(knewIt) {
  const q = state.questions[state.currentIndex];
  if (!q) return;
  const md = state.memorizeData;
  const entry = md[q.id] || { streak: 0, totalSeen: 0 };
  entry.totalSeen = (entry.totalSeen || 0) + 1;
  if (knewIt) {
    entry.streak = (entry.streak || 0) + 1;
    entry.nextDue = srNextDue(entry.streak);
    state.correct[q.id] = (state.correct[q.id] || 0) + 1;
    delete state.wrong[q.id];
    state.sessionCorrect++;
    state.sessionStreak++;
    if (state.sessionStreak > state.bestSessionStreak) state.bestSessionStreak = state.sessionStreak;
  } else {
    entry.streak = 0;
    const d = new Date(); d.setMinutes(d.getMinutes() + 10);
    entry.nextDue = d.toISOString();
    state.wrong[q.id] = true;
    state.wrongHistory[q.id] = (state.wrongHistory[q.id] || 0) + 1;
    state.sessionWrong++;
    state.sessionStreak = 0;
  }
  md[q.id] = entry;
  state.memorizeData = md;
  Storage.set('memorize', md);
  Storage.set('correct', state.correct);
  Storage.set('wrong', state.wrong);
  Storage.set('wrongHistory', state.wrongHistory);
  bumpDailyStreak();
  state.memorizeRevealed = false;
  nextQuestion();
}

function getMasterCount() {
  return ALL_QUESTIONS.filter(q => (state.memorizeData[q.id]||{}).streak >= 3).length;
}

function resetMemorizeProgress() {
  if (!confirm('Reset all Memorize spaced-repetition progress? Your quiz correct/wrong stats are kept.')) return;
  state.memorizeData = {};
  Storage.set('memorize', {});
  render();
}

  const srBar = `<div class="memorize-sr-bar">${masteredLabel}${seenLabel}</div>`;

  // Build options list — always visible, never clickable.
  // Before reveal: neutral styling. After reveal: correct = green, wrong = dimmed.
  let optionsBlock = '';
  if (!q.boxMode && q.options && q.options.length) {
    const correctIndices = [];
    if (state.memorizeRevealed) {
      q.options.forEach((opt, i) => { if (isOptionCorrect(q, opt, i)) correctIndices.push(i); });
    }
    const optHtml = q.options.map((opt, i) => {
      const safeOpt = opt.replace(/</g,'&lt;').replace(/>/g,'&gt;');

      }
      return `<div style="${style}">${safeOpt}</div>`;

  if (!state.memorizeRevealed) {

    </div>${expBlock}

    </div>`;

        <button class="mode-btn active" onclick="startMemorize()" style="background:rgba(168,85,247,0.25);border-color:#a855f7;color:#d8b4fe;">
          🧠 Start Memorize ${state.topicFilter ? '('+state.topicFilter+')' : '(All)'} <span class="badge" style="background:rgba(168,85,247,0.3);">${filteredPool().length}</span>
        </button>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;font-size:0.8rem;color:var(--text-dim);">
        <span>⭐ Mastered (3+ streak): <strong style="color:var(--green);">${getMasterCount()}</strong> / ${totalQ}</span>
        <span>🔁 In progress: <strong style="color:var(--yellow);">${Object.values(state.memorizeData).filter(d=>d.streak>0&&d.streak<3).length}</strong></span>
        <span>🆕 Unseen: <strong>${totalQ - Object.keys(state.memorizeData).length}</strong></span>
        <button class="toolbar-btn" onclick="resetMemorizeProgress()" style="font-size:0.72rem;padding:4px 10px;">Reset SR Progress</button>
      </div>
    </div>

    <div class="mode-group">
      <div class="mode-group-title">Practice</div>
      <div class="mode-selector">
        <button class="mode-btn" onclick="startQuiz('all')">All <span class="badge">${totalQ}</span></button>
        <button class="mode-btn" onclick="startQuiz('wrong')">Wrong <span class="badge">${wrongCount}</span></button>
        <button class="mode-btn" onclick="startQuiz('bookmarked')">Bookmarked <span class="badge">${bookmarkedCount}</span></button>
        <button class="mode-btn" onclick="state.mode='wrongList'; render();">View Wrong List <span class="badge">${wrongCount}</span></button>
      </div>
    </div>

    <div class="mode-group">
      <div class="mode-group-title">Smart Study</div>
      <div class="mode-selector">
        <button class="mode-btn" onclick="startQuiz('drill')" title="Questions ranked by how often you got them wrong + 'hard' confidence">&#128293; Drill Hardest</button>
        <button class="mode-btn" onclick="startQuiz('smart')" title="Mix of new + wrong + bookmarked">&#128302; Smart Mix <span class="badge">${cfg.count}</span></button>
        <button class="mode-btn" onclick="startFlashcards('all')" title="See question, reveal answer, self-grade">&#127921; Flashcards</button>
        <button class="mode-btn" onclick="startFlashcards('wrong')">Flashcards (Wrong)</button>
      </div>
      <div class="smart-mix-cfg">
        Smart Mix:
        <label>New % <input type="number" min="0" max="100" value="${cfg.newPct}" onchange="state.smartMixCfg.newPct=parseInt(this.value)||0; Storage.set('smartMixCfg', state.smartMixCfg);"></label>
        <label>Wrong % <input type="number" min="0" max="100" value="${cfg.wrongPct}" onchange="state.smartMixCfg.wrongPct=parseInt(this.value)||0; Storage.set('smartMixCfg', state.smartMixCfg);"></label>
        <label>Bookmarked % <input type="number" min="0" max="100" value="${cfg.bookmarkedPct}" onchange="state.smartMixCfg.bookmarkedPct=parseInt(this.value)||0; Storage.set('smartMixCfg', state.smartMixCfg);"></label>
        <label>Count <input type="number" min="5" max="${totalQ}" value="${cfg.count}" onchange="state.smartMixCfg.count=parseInt(this.value)||20; Storage.set('smartMixCfg', state.smartMixCfg);"></label>
      </div>
    </div>

    <div class="mode-group">
      <div class="mode-group-title">Exam</div>
      <div class="mode-selector">
        <button class="mode-btn" onclick="startExam()" title="${state.examQuestionCount} random questions, ${state.examDurationMin}-minute timer">&#9202; Exam Simulation <span class="badge">${state.examQuestionCount}q / ${state.examDurationMin}m</span></button>
        <button class="mode-btn" onclick="var c=prompt('Number of questions?', state.examQuestionCount); if(c){state.examQuestionCount=Math.max(5,Math.min(${totalQ},parseInt(c)||40));} var t=prompt('Minutes?', state.examDurationMin); if(t){state.examDurationMin=Math.max(5,parseInt(t)||120);} render();">Configure Exam</button>
      </div>
    </div>

    <div class="mode-group">
      <div class="mode-group-title">Find</div>
      <input type="text" class="search-box" placeholder="&#128269; Search question text, answer, or explanation..." value="${(state.searchQuery||'').replace(/"/g,'&quot;')}" oninput="onSearchInput(this.value)">
      ${searchHtml}
      ${missingExpCount > 0 ? '<div class="toolbar-row"><button class="toolbar-btn" onclick="startQuiz(\'missing-exp\')">&#9888; Practice ' + missingExpCount + ' with Missing Explanations</button></div>' : ''}
    </div>

    <div class="mode-group">
      <div class="mode-group-title">Progress Backup</div>
      <div class="toolbar-row">
        <button class="toolbar-btn" onclick="exportProgress()" title="Download all your progress as JSON">&#128229; Export JSON</button>
        <button class="toolbar-btn" onclick="document.getElementById('importFile').click()" title="Restore progress from a JSON file">&#128228; Import JSON</button>
        <input type="file" id="importFile" class="hidden-file" accept=".json,application/json" onchange="importProgressFile(this)">
        ${hasBackup ? '<button class="toolbar-btn" onclick="restoreBackup()" title="Restore the auto-backup saved before your last reset/import">&#8630; Undo Reset</button>' : ''}
      </div>
      <div class="small-note" style="text-align:center;">Progress is stored in this browser. Export regularly to keep it safe.</div>
    </div>

    <div style="text-align:center; margin-top: 30px;">
      <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
    </div>
  `;
}

function renderQuiz(app) {
  const q = state.questions[state.currentIndex];
  const multi = isMultiAnswer(q);
  const boxMode = isBoxQuestion(q);
  const isBookmarked = state.bookmarked[q.id];
  const wasWrong = state.wrongHistory[q.id] || 0;
  const progress = ((state.currentIndex + 1) / state.questions.length * 100).toFixed(1);
  const conf = state.confidence[q.id];
  const note = state.notes[q.id] || '';
  const isExam = state.examMode;
  const isFlash = state.flashcardMode;
  const isMemorize = state.memorizeMode;

  // Memorize mode: no options, just reveal + self-grade
  let bodyHtml = '';
  if (isMemorize) {
    bodyHtml = renderMemorizeBody(q);
  } else if (isFlash) {
    if (!state.flashcardRevealed) {
      bodyHtml = '<div class="flashcard-reveal" onclick="flashcardReveal()">' +
                 '<div style="font-size:1.1rem;margin-bottom:8px;">&#128064; Click to reveal answer</div>' +
                 '<div class="hint">(or press Enter)</div></div>';
    } else {
      // Show options with correct highlighted, plus explanation + answer
      let correctIndices = [];
      if (!boxMode) q.options.forEach((opt, i) => { if (isOptionCorrect(q, opt, i)) correctIndices.push(i); });
      if (boxMode) {
        bodyHtml = renderBoxQuestion({ ...q, _revealForFlash: true });
        // Re-render with answered=true look: easier to set flag during render
        state.answered = true;
        bodyHtml = renderBoxQuestion(q);
        state.answered = false;
      } else {
        let optionsHtml = q.options.map(function(opt, i) {
          var cls = 'option-btn disabled';
          if (correctIndices.indexOf(i) !== -1) cls += ' show-correct';
          var safeOpt = opt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return '<button class="' + cls + '">' + safeOpt + '</button>';
        }).join('');
        bodyHtml = '<div class="options-list">' + optionsHtml + '</div>';
      }
      var safeAns = (q.answer || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var safeExp = (q.explanation || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      bodyHtml += '<div class="flashcard-answer"><strong>Answer:</strong> ' + safeAns + (safeExp ? '<br><br>' + safeExp : '') + '</div>';
      bodyHtml += '<div class="flashcard-self-grade">' +
                  '<button class="nav-btn secondary" onclick="flashcardSelfGrade(false)" style="background:rgba(239,68,68,0.2);">&#10060; Didn\'t Know</button>' +
                  '<button class="nav-btn primary" onclick="flashcardSelfGrade(true)" style="background:rgba(34,197,94,0.8);">&#9989; Knew It</button>' +
                  '</div>';
    }
  } else if (boxMode) {
    bodyHtml = renderBoxQuestion(q);
  } else {
    const correctIndices = [];
    if (state.answered) {
      q.options.forEach((opt, i) => { if (isOptionCorrect(q, opt, i)) correctIndices.push(i); });
    }
    let optionsHtml = q.options.map((opt, i) => {
      let cls = 'option-btn';
      if (state.answered) {
        cls += ' disabled';
        if (correctIndices.includes(i)) cls += state.selectedOptions.includes(i) ? ' correct' : ' show-correct';
        else if (state.selectedOptions.includes(i)) cls += ' incorrect';
      } else if (state.selectedOptions.includes(i)) cls += ' selected';
      const safeOpt = opt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<button class="' + cls + '" onclick="selectOption(' + i + ')">' + safeOpt + '</button>';
    }).join('');
    bodyHtml = (multi ? '<div class="multi-note">Select all that apply (multiple answers)</div>' : '') +
               '<div class="options-list">' + optionsHtml + '</div>';
  }

  // Explanation block (suppressed during exam)
  let explanationHtml = '';
  if (!isExam && !isFlash && state.answered && q.explanation) {
    const safeExp = q.explanation.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    explanationHtml = '<div class="explanation" style="margin-top:12px;">' + safeExp + '<br><br><strong>Answer: ' + q.answer.replace(/</g, '&lt;') + '</strong></div>';
  }
  if (!isExam && !isFlash && state.answered && !q.explanation) {
    explanationHtml = '<div class="small-note" style="text-align:center;margin-top:8px;">&#9888; No explanation recorded for this question &mdash; add one in Notes below.</div>';
  }

  // Confidence widget (after answering or in flashcard reveal)
  let confidenceHtml = '';
  if ((state.answered || (isFlash && state.flashcardRevealed)) && !isExam) {
    confidenceHtml = '<div class="confidence-row">' +
      '<span style="color:var(--text-dim);font-size:0.78rem;align-self:center;margin-right:4px;">How did that feel?</span>' +
      '<button class="conf-btn easy ' + (conf==='easy'?'active':'') + '" onclick="setConfidence(' + q.id + ',\'easy\')">&#128515; Easy</button>' +
      '<button class="conf-btn medium ' + (conf==='medium'?'active':'') + '" onclick="setConfidence(' + q.id + ',\'medium\')">&#128528; Medium</button>' +
      '<button class="conf-btn hard ' + (conf==='hard'?'active':'') + '" onclick="setConfidence(' + q.id + ',\'hard\')">&#128553; Hard</button>' +
      '</div>';
  }

  // Notes widget (always available; hidden during exam)
  let notesHtml = '';
  if (!isExam) {
    var safeNote = note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    notesHtml = '<div class="notes-area">' +
      '<label>&#128221; Your Notes (auto-saved)</label>' +
      '<textarea id="noteBox" placeholder="Add a mnemonic, key fact, or why you got this wrong..." oninput="saveNote(' + q.id + ', this.value)">' + safeNote + '</textarea>' +
      '</div>';
  }

  const wrongBadge = wasWrong > 0 ? '<span style="color: var(--red); font-size: 0.75rem; margin-left: 8px;">Wrong ' + wasWrong + 'x</span>' : '';
  const confBadge = conf ? '<span style="color: ' + (conf==='hard'?'var(--red)':conf==='medium'?'var(--yellow)':'var(--green)') + '; font-size: 0.72rem; margin-left: 6px;">[' + conf + ']</span>' : '';

  let canSubmit = false;
  if (boxMode) {
    canSubmit = true;
    for (let i = 0; i < q.boxes.length; i++) {
      if (state.boxSelections[i] === undefined) { canSubmit = false; break; }
    }
  } else {
    canSubmit = state.selectedOptions.length > 0;
  }

  var examBannerHtml = isExam ?
    '<div id="examBanner" class="exam-banner">&#9202; Exam Mode &mdash; <span id="examTimer" class="timer">--:--</span> &mdash; Q ' + (state.currentIndex+1) + '/' + state.questions.length + ' &mdash; <button class="nav-btn secondary" style="padding:4px 12px;font-size:0.75rem;" onclick="if(confirm(\'End exam now?\'))endExam(false)">End Exam</button></div>'
    : '';

  var streakPill = state.sessionStreak > 2 ? ' &nbsp;&#128293; ' + state.sessionStreak + ' streak' : '';

  app.innerHTML = `
    ${examBannerHtml}
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <button class="nav-btn secondary" style="padding:8px 16px; font-size:0.8rem;" onclick="goToMenu()">&#9664; Pause &amp; Menu</button>
      <span style="color: var(--text-dim); font-size: 0.85rem;">
        ${state.sessionCorrect} correct / ${state.sessionWrong} wrong${streakPill}
      </span>
    </div>
    <div class="progress-container"><div class="progress-fill" style="width: ${progress}%"></div></div>
    <div class="question-card">
      <div class="q-header">
        <span class="q-number">${isMemorize ? '🧠 Memorize' : isFlash ? 'Flashcard' : isExam ? 'Exam Q' : 'Question'} ${state.currentIndex + 1} of ${state.questions.length} ${wrongBadge}${confBadge}</span>
        <span>
          <button class="bookmark-btn" onclick="toggleBookmark(${q.id})" title="Bookmark (b)">${isBookmarked ? '&#11088;' : '&#9734;'}</button>
          <span class="q-source">${q.source}</span>
        </span>
      </div>
      ${q.caseStudy ? '<div><span class="q-case-study-title">📋 ' + q.caseStudy.replace(/</g,'&lt;') + '</span></div>' : ''}
      ${q.background ? renderBackground(q.background) : ''}
      <div class="q-text">${q.question.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\x60([^\x60]+)\x60/g, '<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:0.9em;">$1</code>')}</div>
      ${renderImages(q.images)}
      ${bodyHtml}
      ${!isMemorize && !isFlash && !state.answered ? '<div class="nav-buttons" style="margin-top:16px;"><button class="nav-btn primary" onclick="submitAnswer()" ' + (canSubmit ? '' : 'disabled') + '>Submit Answer</button></div>' : ''}
      ${!isMemorize && state.answered ? explanationHtml : ''}
      ${!isMemorize ? confidenceHtml : ''}
      ${!isMemorize ? notesHtml : ''}
      ${!isMemorize && !isFlash ? `<div class="nav-buttons">
        <button class="nav-btn secondary" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>Previous</button>
        ${state.answered ?
          '<button class="nav-btn primary" onclick="nextQuestion()">' + (state.currentIndex < state.questions.length - 1 ? 'Next Question' : 'See Results') + '</button>' :
          '<button class="nav-btn secondary" onclick="nextQuestion()">Skip</button>'
        }
      </div>` : ''}
    </div>
  `;

  // Initialize exam timer display
  if (isExam) tickExamTimer();
}

function renderBoxQuestion(q) {
  const isOrdering = q.orderMode === true;

  // Collect already-selected values for ordering questions (to dim duplicates)
  const usedValues = new Set();
  if (isOrdering) {
    for (const [bIdx, cIdx] of Object.entries(state.boxSelections)) {
      usedValues.add(q.boxes[bIdx].choices[cIdx]);
    }
  }

  let html = '';
  if (isOrdering) {
    html += '<div class="box-question-note">&#128204; Place each action in the correct position (1 = first, ' + q.boxes.length + ' = last). Each item can only be used once.</div>';
  } else {
    html += '<div class="box-question-note">&#128204; Select the correct value for each box individually &mdash; all boxes must be correct.</div>';
  }

  for (let bIdx = 0; bIdx < q.boxes.length; bIdx++) {
    const box = q.boxes[bIdx];
    const selected = state.boxSelections[bIdx];
    const selectedValue = selected !== undefined ? box.choices[selected] : null;

    html += '<div class="box-section">';
    if (isOrdering) {
      html += '<div class="box-label">Step ' + (bIdx + 1) + '</div>';
    } else {
      html += '<div class="box-label">' + box.label.replace(/</g, '&lt;') + '</div>';
    }
    html += '<div class="box-choices">';

    for (let cIdx = 0; cIdx < box.choices.length; cIdx++) {
      const choice = box.choices[cIdx];
      const safeChoice = choice.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:1px 5px;border-radius:3px;font-size:0.88em;">$1</code>');
      let cls = 'box-choice-btn';

      if (state.answered) {
        cls += ' disabled';
        const isCorrect = choice === box.correct;
        const isSelected = selected === cIdx;
        if (isCorrect && isSelected) cls += ' correct';
        else if (isCorrect) cls += ' show-correct';
        else if (isSelected) cls += ' incorrect';
      } else if (selected === cIdx) {
        cls += ' selected';
      } else if (isOrdering && usedValues.has(choice) && selected !== cIdx) {
        // Dim choices already used in other boxes
        cls += ' used-elsewhere';
      }

      html += '<button class="' + cls + '" onclick="selectBoxChoice(' + bIdx + ',' + cIdx + ')">' + safeChoice + '</button>';
    }

    html += '</div></div>';
  }
  return html;
}


function renderResults(app) {
  const total = state.sessionCorrect + state.sessionWrong;
  const pct = total > 0 ? Math.round((state.sessionCorrect / total) * 100) : 0;
  const cls = pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad';
  const wrongCount = Object.keys(state.wrong).length;
  const wasExam = state.quizMode === 'exam';
  const heading = wasExam ? (pct >= 70 ? '&#127942; Exam Passed!' : '&#128203; Exam Complete') : 'Session Complete!';
  const passNote = wasExam ? '<p style="color:var(--text-dim);font-size:0.9rem;margin-top:-6px;">Real AZ-204 passing score is ~700/1000 (about 70%).</p>' : '';
  app.innerHTML = `
    <div class="results">
      <h2>${heading}</h2>
      <div class="score ${cls}">${pct}%</div>
      <p style="font-size:1.1rem; margin-bottom:8px;">${state.sessionCorrect} correct out of ${total} answered</p>
      ${passNote}
      <div class="stats-bar" style="justify-content:center;margin-top:14px;">
        <div class="stat-card green"><div class="num">${state.sessionCorrect}</div><div class="label">Correct</div></div>
        <div class="stat-card red"><div class="num">${state.sessionWrong}</div><div class="label">Wrong</div></div>
        <div class="stat-card"><div class="num">${state.questions.length - total}</div><div class="label">Skipped</div></div>
        <div class="stat-card yellow"><div class="num">${state.bestSessionStreak || 0}</div><div class="label">Best Streak</div></div>
      </div>
      <div class="nav-buttons" style="margin-top:24px;">
        <button class="nav-btn primary" onclick="goToMenu()">Back to Menu</button>
        ${wrongCount > 0 ? '<button class="nav-btn secondary" onclick="startQuiz(\'wrong\')">Practice Wrong (' + wrongCount + ')</button>' : ''}
        ${!wasExam ? '<button class="nav-btn secondary" onclick="startQuiz(state.quizMode)">Retry Same Set</button>' : ''}
        ${wrongCount > 0 ? '<button class="nav-btn secondary" onclick="startQuiz(\'drill\')">Drill Hardest</button>' : ''}
      </div>
    </div>
  `;
}

function renderWrongList(app) {
  const wrongQs = ALL_QUESTIONS.filter(q => state.wrong[q.id]);
  let listHtml = wrongQs.length === 0
    ? '<p style="text-align:center; color: var(--green); padding: 40px;">No wrong answers! Great job!</p>'
    : wrongQs.map(q => {
      const times = state.wrongHistory[q.id] || 1;
      return '<div class="wrong-item" onclick="jumpToQuestion(' + q.id + ')">' +
        '<div class="wrong-q">' + q.question.substring(0, 150).replace(/</g, '&lt;') + '...</div>' +
        '<div class="wrong-meta">Source: ' + q.source + ' | Wrong ' + times + ' time' + (times > 1 ? 's' : '') +
        ' | Answer: ' + q.answer.substring(0, 80).replace(/</g, '&lt;') + '</div></div>';
    }).join('');
  app.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <button class="nav-btn secondary" style="padding:8px 16px; font-size:0.8rem;" onclick="goToMenu()">Back to Menu</button>
      <h2 style="font-size:1.2rem;">Wrong Answers (${wrongQs.length})</h2>
      <div></div>
    </div>
    <div class="wrong-list">${listHtml}</div>
    ${wrongQs.length > 0 ? '<div class="nav-buttons" style="margin-top:20px;"><button class="nav-btn primary" onclick="startQuiz(\'wrong\')">Practice All Wrong</button><button class="nav-btn secondary" onclick="clearWrongList()">Clear Wrong List</button></div>' : ''}
  `;
}

function jumpToQuestion(qId) {
  const q = ALL_QUESTIONS.find(q => q.id === qId);
  if (!q) return;
  state.mode = 'quiz'; state.quizMode = 'single'; state.questions = [q]; state.currentIndex = 0;
  state.selectedOptions = []; state.boxSelections = {}; state.answered = false;
  state.sessionCorrect = 0; state.sessionWrong = 0; state.sessionTotal = 1; state.showExplanation = false;
  render();
}

function clearWrongList() {
  if (!confirm('Clear all wrong answers from the list?')) return;
  state.wrong = {}; Storage.set('wrong', {}); render();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (state.mode !== 'quiz') return;
  const q = state.questions[state.currentIndex];
  if (!q) return;
  // Skip typing in textarea/input
  var tag = (e.target && e.target.tagName) || '';
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;

  // Memorize flow
  if (state.memorizeMode) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!state.memorizeRevealed) memorizeReveal();
      return;
    }
    if (state.memorizeRevealed) {
      if (e.key === 'y' || e.key === 'Y' || e.key === 'ArrowRight') { e.preventDefault(); memorizeGrade(true); return; }
      if (e.key === 'n' || e.key === 'N' || e.key === 'ArrowLeft')  { e.preventDefault(); memorizeGrade(false); return; }
    }
    return;
  }

  // Flashcard flow
  if (state.flashcardMode) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!state.flashcardRevealed) flashcardReveal();
      return;
    }
    if (state.flashcardRevealed) {
      if (e.key === 'y' || e.key === 'Y') { flashcardSelfGrade(true); return; }
      if (e.key === 'n' || e.key === 'N') { flashcardSelfGrade(false); return; }
    }
    if (e.key === 'ArrowLeft') prevQuestion();
    return;
  }

  if (!isBoxQuestion(q)) {
    if (e.key >= '1' && e.key <= '9') {
      const idx = parseInt(e.key) - 1;
      if (idx < q.options.length && !state.answered) selectOption(idx);
    }
  }
  if (e.key === 'Enter') {
    if (!state.answered) submitAnswer();
    else nextQuestion();
  }
  if (e.key === 'ArrowRight' && state.answered) nextQuestion();
  if (e.key === 'ArrowLeft') prevQuestion();
  if (e.key === 'b' || e.key === 'B') { toggleBookmark(q.id); }
  if ((e.key === 'e' || e.key === 'E') && state.answered && q.explanation) { state.showExplanation = !state.showExplanation; render(); }
  if (e.key === 'n' || e.key === 'N') {
    var nb = document.getElementById('noteBox');
    if (nb) { e.preventDefault(); nb.focus(); }
  }
});

render();
</script>
</body>
</html>
