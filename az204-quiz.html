ADME","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`","`Get-AzKeyVaultSecret -VaultName $vaultName`","`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`","`Get-AzSubscription`","`Set-AzContext -SubscriptionId $subscriptionID`"],"correct":"`Get-AzSubscription`"},{"label":"Box 2","choices":["`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`","`Get-AzKeyVaultSecret -VaultName $vaultName`","`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`","`Get-AzSubscription`","`Set-AzContext -SubscriptionId $subscriptionID`"],"correct":"`Set-AzContext -SubscriptionId $subscriptionID`"},{"label":"Box 3","choices":["`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`","`Get-AzKeyVaultSecret -VaultName $vaultName`","`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`","`Get-AzSubscription`","`Set-AzContext -SubscriptionId $subscriptionID`"],"correct":"`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`"},{"label":"Box 4","choices":["`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`","`Get-AzKeyVaultSecret -VaultName $vaultName`","`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`","`Get-AzSubscription`","`Set-AzContext -SubscriptionId $subscriptionID`"],"correct":"`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`"},{"label":"Box 5","choices":["`$secretvalue = ConvertTo-SecureString $storAcctkey -AsPlainText -Force Set-AzKeyVaultSecret -VaultName $vaultName -Name $secretName -SecretValue $secretvalue`","`Get-AzKeyVaultSecret -VaultName $vaultName`","`Get-AzStorageAccountKey -ResourceGroupName $resGroup -Name $storAcct`","`Get-AzSubscription`","`Set-AzContext -SubscriptionId $subscriptionID`"],"correct":"`Get-AzKeyVaultSecret -VaultName $vaultName`"}],"orderMode":true},{"id":92,"question":"You develop Azure solutions. You must grant a virtual machine (VM) access to specific resource groups in Azure Resource Manager. You need to obtain an Azure Resource Manager access token. Solution: Use an `X.509` certificate to authenticate the VM with Azure Resource Manager. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"An X.509 certificate alone does not obtain an ARM access token for a VM. The recommended approach is to use Managed Identity for Azure Resources and call the local IMDS endpoint to obtain a token. Certificate-based auth requires a service principal configuration - it does not automatically grant the VM access to ARM resources.","images":[],"source":"README"},{"id":93,"question":"You develop Azure solutions. You must grant a virtual machine (VM) access to specific resource groups in Azure Resource Manager. You need to obtain an Azure Resource Manager access token. Solution: Use the `Reader` role-based access control (RBAC) role to authenticate the VM with Azure Resource Manager. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Assigning the Reader RBAC role grants authorization (what the VM can do) but does not authenticate the VM or produce an access token. You still need a managed identity or service principal for authentication. RBAC alone does not solve obtaining a token.","images":[],"source":"README"},{"id":94,"question":"You are building a website that is used to review restaurants. The website will use an Azure CDN to improve performance and add functionality to requests. You build and deploy a mobile app for Apple iPhones. Whenever a user accesses the website from an iPhone, the user must be redirected to the app store. You need to implement an Azure CDN rule that ensures that iPhone users are redirected to the app store. How should you complete the Azure Resource Manager template?","options":["Box 1: `iOS`. Box 2: `DeliveryRulelsDeviceConditionParameters`. Box 3: `HTTP_USER_AGENT`. Box 4: `DeliveryRuleRequestHeaderConditionParameters`. Box 5: `iOS`.","Box 1: `Mobile`. Box 2: `DeliveryRulelsDeviceConditionParameters`. Box 3: `HTTP_USER_AGENT`. Box 4: `DeliveryRuleRequestHeaderConditionParameters`. Box 5: `iPhone`.","Box 1: `Desktop`. Box 2: `DeliveryRuleCookiesConditionParameters`. Box 3: `PRAGMA`. Box 4: `DeliveryRulelsDeviceConditionParameters`. Box 5: `Desktop`.","Box 1: `iOS`. Box 2: `DeliveryRulelsDeviceConditionParameters`. Box 3: `FROM`. Box 4: `DeliveryRulePostArgsConditionParameters`. Box 5: `Mobile`."],"answer":"Box 1: `Mobile`. Box 2: `DeliveryRulelsDeviceConditionParameters`. Box 3: `HTTP_USER_AGENT`. Box 4: `DeliveryRuleRequestHeaderConditionParameters`. Box 5: `iPhone`.","explanation":"Use the IsDevice condition (DeliveryRuleIsDeviceConditionParameters) set to Mobile to match mobile devices. Then inspect the HTTP_USER_AGENT request header (DeliveryRuleRequestHeaderConditionParameters) to detect iPhone specifically. Azure CDN's IsDevice supports only Mobile/Desktop, so iPhone detection requires the user-agent header.","images":["images/question94.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`Desktop`","`Mobile`","`iOS`","`DeliveryRuleCookiesConditionParameters`","`DeliveryRulelsDeviceConditionParameters`","`FROM`","`HTTP_USER_AGENT`","`PRAGMA`","`DeliveryRulePostArgsConditionParameters`","`DeliveryRuleRequestHeaderConditionParameters`","`iPhone`"],"correct":"`Mobile`"},{"label":"Box 2","choices":["`Desktop`","`Mobile`","`iOS`","`DeliveryRuleCookiesConditionParameters`","`DeliveryRulelsDeviceConditionParameters`","`FROM`","`HTTP_USER_AGENT`","`PRAGMA`","`DeliveryRulePostArgsConditionParameters`","`DeliveryRuleRequestHeaderConditionParameters`","`iPhone`"],"correct":"`DeliveryRulelsDeviceConditionParameters`"},{"label":"Box 3","choices":["`Desktop`","`Mobile`","`iOS`","`DeliveryRuleCookiesConditionParameters`","`DeliveryRulelsDeviceConditionParameters`","`FROM`","`HTTP_USER_AGENT`","`PRAGMA`","`DeliveryRulePostArgsConditionParameters`","`DeliveryRuleRequestHeaderConditionParameters`","`iPhone`"],"correct":"`HTTP_USER_AGENT`"},{"label":"Box 4","choices":["`Desktop`","`Mobile`","`iOS`","`DeliveryRuleCookiesConditionParameters`","`DeliveryRulelsDeviceConditionParameters`","`FROM`","`HTTP_USER_AGENT`","`PRAGMA`","`DeliveryRulePostArgsConditionParameters`","`DeliveryRuleRequestHeaderConditionParameters`","`iPhone`"],"correct":"`DeliveryRuleRequestHeaderConditionParameters`"},{"label":"Box 5","choices":["`Desktop`","`Mobile`","`iOS`","`DeliveryRuleCookiesConditionParameters`","`DeliveryRulelsDeviceConditionParameters`","`FROM`","`HTTP_USER_AGENT`","`PRAGMA`","`DeliveryRulePostArgsConditionParameters`","`DeliveryRuleRequestHeaderConditionParameters`","`iPhone`"],"correct":"`iPhone`"}]},{"id":95,"question":"You are developing a website that will run as an Azure Web App. Users will authenticate by using their Microsoft Entra ID credentials. You plan to assign users one of the following permission levels for the website: `admin`, `normal`, and `reader`. A user's Microsoft Entra ID group membership must be used to determine the permission level. You need to configure authorization. Solution: Configure and use Integrated Windows Authentication in the website. In the website, query Microsoft Graph API to load the group to which the user is a member. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Integrated Windows Authentication is for on-premises Active Directory (Kerberos/NTLM) within a domain - it does not work for authenticating external users to an Azure Web App via Microsoft Entra ID. You should use Microsoft Entra ID OpenID Connect/OAuth for authentication, then query Microsoft Graph for group membership.","images":[],"source":"README"},{"id":96,"question":"You develop Azure solutions. You must grant a virtual machine (VM) access to specific resource groups in Azure Resource Manager. You need to obtain an Azure Resource Manager access token. Solution: Run the `Invoke-RestMethod` cmdlet to make a request to the local managed identity for Azure resources endpoint. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Invoke-RestMethod to the local Instance Metadata Service (IMDS) managed identity endpoint (http://169.254.169.254/metadata/identity/oauth2/token) is the supported way for a VM with a managed identity to obtain an ARM access token. This is the canonical pattern.","images":[],"source":"README"},{"id":97,"question":"Your company's Azure subscription includes an Azure Log Analytics workspace. Your company has a hundred on-premises servers that run either Windows Server 2012 R2 or Windows Server 2016, and is linked to the Azure Log Analytics workspace. The Azure Log Analytics workspace is set up to gather performance counters associated with security from these linked servers. You must configure alerts based on the information gathered by the Azure Log Analytics workspace. You have to make sure that alert rules allow for dimensions, and that alert creation time should be kept to a minimum. Furthermore, a single alert notification must be created when the alert is created and when the alert is resolved. You need to make use of the necessary signal type when creating the alert rules. Which of the following is the option you should use?","options":["The Activity log signal type.","The Application Log signal type.","The Metric signal type.","The Audit Log signal type."],"answer":"The Metric signal type.","explanation":"Metric alerts support dimensions, have near real-time evaluation (minimal creation time), and can be configured to send a single notification when fired and when resolved (auto-resolve). Activity Log alerts don't support dimensions and log-search alerts typically have higher latency.","images":[],"source":"README"},{"id":98,"question":"You are developing a .NET Core MVC application that allows customers to research independent holiday accommodation providers. You want to implement Azure Search to allow the application to search the index by using various criteria to locate documents related to accommodation. You want the application to allow customers to search the index by using regular expressions. What should you do?","options":["Configure the `SearchMode` property of the `SearchParameters` class.","Configure the `QueryType` property of the `SearchParameters` class.","Configure the `Facets` property of the `SearchParameters` class.","Configure the `Filter` property of the `SearchParameters` class."],"answer":"Configure the `QueryType` property of the `SearchParameters` class.","explanation":"Setting QueryType to 'full' enables the Lucene query syntax, which supports regular expressions (e.g., /pattern/), fuzzy search, proximity search, and term boosting. The default 'simple' query type does not support regex. SearchMode controls any/all term matching - not syntax.","images":[],"source":"README"},{"id":99,"question":"You are a developer at your company. You need to update the definitions for an existing Logic App. What should you use?","options":["The Enterprise Integration Pack (EIP).","The Logic App Code View.","The API Connections.","The Logic Apps Designer."],"answer":"The Logic App Code View.","explanation":"The Logic App Code View allows direct editing of the underlying JSON workflow definition, enabling updates to any part of the definition including those not exposed in the Designer. The Logic Apps Designer is graphical but more limited; EIP is for B2B integrations, and API Connections configure connectors, not definitions.","images":[],"source":"README"},{"id":100,"question":"The cluster uses Azure Monitor for containers to monitor the cluster. The application has sticky sessions enabled on the ingress controller. Some customers report a large number of errors in the application over the last 24 hours. You need to determine on which virtual machines (VMs) the errors are occurring. How should you complete the Azure Monitor query?","options":["Box 1: `ago(1d)`. Box 2: `distinct ContainerID`. Box 3: `where ContainerID in (ContainerIDs)`. Box 4: `summarize count() by Computer`.","Box 1: `date(now() - 1d)`. Box 2: `sample ContainerID`. Box 3: `where ContainerID in (ContainerIDs)`. Box 4: `partition count() by Computer`.","Box 1: `ago(1d)`. Box 2: `distinct ContainerID`. Box 3: `join ContainerID = = ContainerIDs.ContainerID`. Box 4: `summarize by Computer`.","Box 1: `totimespan(1d)`. Box 2: `top ContainerID`. Box 3: `fork containerIDs`. Box 4: `project by Computer`."],"answer":"Box 1: `ago(1d)`. Box 2: `distinct ContainerID`. Box 3: `where ContainerID in (ContainerIDs)`. Box 4: `summarize count() by Computer`.","explanation":"KQL: ago(1d) filters last 24 hours. distinct ContainerID gets unique container IDs with errors. where ContainerID in (ContainerIDs) correlates back to perf/inventory data for those containers. summarize count() by Computer aggregates error counts per VM (Computer column).","images":["images/question100.png"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["`ago(1d)`","`date(now() - 1d)`","`totimespan(1d)`","`distinct ContainerID`","`sample ContainerID`","`top ContainerID`","`fork containerIDs`","`join ContainerID = = ContainerIDs.ContainerID`","`where ContainerID in (ContainerIDs)`","`partition count() by Computer`","`project by Computer`","`summarize by Computer`","`summarize count() by Computer`"],"correct":"`ago(1d)`"},{"label":"Box 2","choices":["`ago(1d)`","`date(now() - 1d)`","`totimespan(1d)`","`distinct ContainerID`","`sample ContainerID`","`top ContainerID`","`fork containerIDs`","`join ContainerID = = ContainerIDs.ContainerID`","`where ContainerID in (ContainerIDs)`","`partition count() by Computer`","`project by Computer`","`summarize by Computer`","`summarize count() by Computer`"],"correct":"`distinct ContainerID`"},{"label":"Box 3","choices":["`ago(1d)`","`date(now() - 1d)`","`totimespan(1d)`","`distinct ContainerID`","`sample ContainerID`","`top ContainerID`","`fork containerIDs`","`join ContainerID = = ContainerIDs.ContainerID`","`where ContainerID in (ContainerIDs)`","`partition count() by Computer`","`project by Computer`","`summarize by Computer`","`summarize count() by Computer`"],"correct":"`where ContainerID in (ContainerIDs)`"},{"label":"Box 4","choices":["`ago(1d)`","`date(now() - 1d)`","`totimespan(1d)`","`distinct ContainerID`","`sample ContainerID`","`top ContainerID`","`fork containerIDs`","`join ContainerID = = ContainerIDs.ContainerID`","`where ContainerID in (ContainerIDs)`","`partition count() by Computer`","`project by Computer`","`summarize by Computer`","`summarize count() by Computer`"],"correct":"`summarize count() by Computer`"}]},{"id":101,"question":"You plan to deploy a web app to App Service on Linux. You create an App Service plan. You create and push a custom Docker image that contains the web app to Azure Container Registry. You need to access the console logs generated from inside the container in real-time. How should you complete the Azure CLI command?","options":["Box 1: `config`. Box 2: `--docker-container-logging`. Box 3: `webapp`. Box 4: `tail`.","Box 1: `tail`. Box 2: `--web-server-logging`. Box 3: `aks` Box 4: `show`.","Box 1: `show`. Box 2: `--web-server-logging`. Box 3: `acr`. Box 4: `config`.","Box 1: `config`. Box 2: `--application-logging`. Box 3: `webapp`. Box 4: `show`."],"answer":"Box 1: `config`. Box 2: `--docker-container-logging`. Box 3: `webapp`. Box 4: `tail`.","explanation":"To enable Docker container logging for a Linux App Service, use `az webapp log config --docker-container-logging filesystem`. To then stream logs in real-time, use `az webapp log tail`. The `webapp` command group handles App Service web apps; `config` sets logging options and `tail` streams them live.","images":["images/question101.png"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["`config`","`show`","`tail`","`--application-logging`","`--docker-container-logging`","`--web-server-logging`","`acr`","`aks`","`webapp`"],"correct":"`config`"},{"label":"Box 2","choices":["`config`","`show`","`tail`","`--application-logging`","`--docker-container-logging`","`--web-server-logging`","`acr`","`aks`","`webapp`"],"correct":"`--docker-container-logging`"},{"label":"Box 3","choices":["`config`","`show`","`tail`","`--application-logging`","`--docker-container-logging`","`--web-server-logging`","`acr`","`aks`","`webapp`"],"correct":"`webapp`"},{"label":"Box 4","choices":["`config`","`show`","`tail`","`--application-logging`","`--docker-container-logging`","`--web-server-logging`","`acr`","`aks`","`webapp`"],"correct":"`tail`"}]},{"id":102,"question":"You develop an app that allows users to upload photos and videos to Azure storage. The app uses a storage REST API call to upload the media to a blob storage account named `Account1`. You have blob storage containers named `Container1` and `Container2`. Uploading of videos occurs on an irregular basis. You need to copy specific blobs from `Container1` to `Container2` when a new video is uploaded. What should you do?","options":["Copy blobs to `Container2` by using the Put Blob operation of the Blob Service REST API.","Create an Event Grid topic that uses the `Start-AzureStorageBlobCopy` cmdlet.","Use `AzCopy` with the Snapshot switch to copy blobs to `Container2`.","Download the blob to a virtual machine and then upload the blob to `Container2`."],"answer":"Create an Event Grid topic that uses the `Start-AzureStorageBlobCopy` cmdlet.","explanation":"Because uploads are irregular, an event-driven solution is ideal. Azure Blob Storage raises BlobCreated events via Event Grid. A subscriber can invoke `Start-AzureStorageBlobCopy` to asynchronously copy the new blob from Container1 to Container2 without downloading it. Put Blob would require re-uploading content, and AzCopy Snapshot is unrelated to container-to-container copy triggers.","images":[],"source":"README"},{"id":103,"question":"A web service provides customer summary information for e-commerce partners. The web service is implemented as an Azure Function app with an HTTP trigger. Access to the API is provided by an Azure API Management instance. The API Management instance is configured in consumption plan mode. All API calls are authenticated by using OAuth. API calls must be cached. Customers must not be able to view cached data for other customers. You need to configure API Management policies for caching. How should you complete the policy statement?","options":["caching-type: `Internal`. downstream-caching-type: `Private`. vary-by-header: `Authorization`.","caching-type: `Public`. downstream-caching-type: `Expect`. vary-by-header: `Private`.","caching-type: `Internal`. downstream-caching-type: `External`. vary-by-header: `Authorization`.","caching-type: `External`. downstream-caching-type: `Private`. vary-by-header: `Authorization`."],"answer":"caching-type: `External`. downstream-caching-type: `Private`. vary-by-header: `Authorization`.","explanation":"APIM consumption tier has no built-in cache, so an `External` cache (e.g., Azure Cache for Redis) must be used. `Private` downstream-caching allows caching private responses per user. Varying by the `Authorization` header ensures each customer's OAuth-authenticated response is cached separately, preventing data leakage between customers.","images":["images/question103.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"caching-type","choices":["`Internal`","`Public`","`External`","`Private`","`Expect`","`Authorization`"],"correct":"`External`"},{"label":"downstream-caching-type","choices":["`Internal`","`Public`","`External`","`Private`","`Expect`","`Authorization`"],"correct":"`Private`"},{"label":"vary-by-header","choices":["`Internal`","`Public`","`External`","`Private`","`Expect`","`Authorization`"],"correct":"`Authorization`"}]},{"id":104,"question":"You are developing an ASP.NET Core website that uses Azure FrontDoor. The website is used to build custom weather data sets for researchers. Data sets are downloaded by users as Comma Separated Value (CSV) files. The data is refreshed every 10 hours. Specific files must be purged from the FrontDoor cache based upon Response Header values. You need to purge individual assets from the Front Door cache. Which type of cache purge should you use?","options":["`single path`.","`wildcard`.","`root domain`."],"answer":"`single path`.","explanation":"Single path purge removes a specific asset by URL path, which is what's needed when purging individual files based on response header values. Wildcard purge removes all assets under a path pattern, and root domain purge clears the domain's root. Since only specific files must be purged individually, single path is the correct choice.","images":[],"source":"README"},{"id":105,"question":"Contoso, Ltd. provides an API to customers by using Azure API Management (APIM). The API authorizes users with a JWT token. You must implement response caching for the APIM gateway. The caching mechanism must detect the user ID of the client that accesses data for a given location and cache the response for that user ID. You need to add the following policies to the policies file: a set-variable policy to store the detected user identity a cache-lookup-value policy a cache-store-value policy a find-and-replace policy to update the response body with the user profile information To which policy section should you add the policies?","options":["Set-variable: Inbound. Cache-lookup-value: Inbound. Cache-store-value: Outbound. Find-and-replace: Outbound.","Set-variable: Outbound. Cache-lookup-value: Inbound. Cache-store-value: Outbound. Find-and-replace: Inbound.","Set-variable: Inbound. Cache-lookup-value: Outbound. Cache-store-value: Inbound. Find-and-replace: Outbound.","Set-variable: Outbound. Cache-lookup-value: Outbound. Cache-store-value: Inbound. Find-and-replace: Inbound."],"answer":"Set-variable: Inbound. Cache-lookup-value: Inbound. Cache-store-value: Outbound. Find-and-replace: Outbound.","explanation":"The user ID must be extracted from the incoming JWT (Inbound). Cache lookup occurs Inbound to short-circuit the request if cached. If not cached, the backend responds and cache-store-value saves the response Outbound. The find-and-replace modifies the response body Outbound before returning it to the client.","images":["images/question105.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"Set-variable","choices":["Inbound","Outbound"],"correct":"Inbound"},{"label":"Cache-lookup-value","choices":["Inbound","Outbound"],"correct":"Inbound"},{"label":"Cache-store-value","choices":["Inbound","Outbound"],"correct":"Outbound"},{"label":"Find-and-replace","choices":["Inbound","Outbound"],"correct":"Outbound"}]},{"id":106,"question":"You are developing an application to retrieve user profile information. The application will use the Microsoft Graph SDK. The app must retrieve user profile information by using a Microsoft Graph API call. You need to call the Microsoft Graph API from the application. In which order should you perform the actions?","options":["Box 1: Register the application with the Microsoft identity platform. Box 2: Build a client by using the client app ID. Box 3: Create an authentication provider. Box 4: Create a new instance of the GraphServiceClient. Box 5: Invoke the request to the Microsoft Graph API.","Box 1: Invoke the request to the Microsoft Graph API. Box 2: Create an authentication provider. Box 3: Register the application with the Microsoft identity platform. Box 4: Build a client by using the client app ID. Box 5: Create a new instance of the GraphServiceClient.","Box 1: Build a client by using the client app ID. Box 2: Register the application with the Microsoft identity platform. Box 3: Create an authentication provider. Box 4: Create a new instance of the GraphServiceClient. Box 5: Invoke the request to the Microsoft Graph API.","Box 1: Register the application with the Microsoft identity platform. Box 2: Build a client by using the client app ID. Box 3: Invoke the request to the Microsoft Graph API. Box 4: Create a new instance of the GraphServiceClient. Box 5: Create an authentication provider. Graph API."],"answer":"Box 1: Register the application with the Microsoft identity platform. Box 2: Build a client by using the client app ID. Box 3: Create an authentication provider. Box 4: Create a new instance of the GraphServiceClient. Box 5: Invoke the request to the Microsoft Graph API.","explanation":"To call Microsoft Graph, first register the app in Microsoft Entra ID to obtain a client ID. Build a client app (MSAL) with that ID, then create an authentication provider using the client to acquire tokens. Instantiate a GraphServiceClient with the provider, and finally invoke Graph API requests via that client.","images":["images/question106.jpg"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["Build a client by using the client app ID","Create a new instance of the GraphServiceClient","Create an authentication provider","Create an authentication provider. Graph API","Invoke the request to the Microsoft Graph API","Register the application with the Microsoft identity platform"],"correct":"Register the application with the Microsoft identity platform"},{"label":"Box 2","choices":["Build a client by using the client app ID","Create a new instance of the GraphServiceClient","Create an authentication provider","Create an authentication provider. Graph API","Invoke the request to the Microsoft Graph API","Register the application with the Microsoft identity platform"],"correct":"Build a client by using the client app ID"},{"label":"Box 3","choices":["Build a client by using the client app ID","Create a new instance of the GraphServiceClient","Create an authentication provider","Create an authentication provider. Graph API","Invoke the request to the Microsoft Graph API","Register the application with the Microsoft identity platform"],"correct":"Create an authentication provider"},{"label":"Box 4","choices":["Build a client by using the client app ID","Create a new instance of the GraphServiceClient","Create an authentication provider","Create an authentication provider. Graph API","Invoke the request to the Microsoft Graph API","Register the application with the Microsoft identity platform"],"correct":"Create a new instance of the GraphServiceClient"},{"label":"Box 5","choices":["Build a client by using the client app ID","Create a new instance of the GraphServiceClient","Create an authentication provider","Create an authentication provider. Graph API","Invoke the request to the Microsoft Graph API","Register the application with the Microsoft identity platform"],"correct":"Invoke the request to the Microsoft Graph API"}],"orderMode":true},{"id":107,"question":"You develop and deploy an Azure Logic App that calls an Azure Function app. The Azure Function App includes an OpenAPI (Swagger) definition and uses an Azure Blob storage account. All resources are secured by using Microsoft Entra ID. The Logic App must use Azure Monitor logs to record and store information about runtime data and events. The logs must be stored in the Azure Blob storage account. You need to set up Azure Monitor logs and collect diagnostics data for the Azure Logic App. Which three actions should you perform in sequence?","options":["Box 1: Create a Log Analytics workspace. Box 2: Install the Logic Apps Management solution. Box 3: Add a diagnostic setting to the Azure Logic App.","Box 1: Install the Logic Apps Management solution. Box 2: Add a diagnostic setting to the Azure Function App. Box 3: Create action groups and alert rules.","Box 1: Add a diagnostic setting to the Azure Function App. Box 2: Create a Log Analytics workspace. Box 3: Create action groups and alert rules.","Box 1: Create a Log Analytics workspace. Box 2: Create action groups and alert rules. Box 3: Add a diagnostic setting to the Azure Function App."],"answer":"Box 1: Create a Log Analytics workspace. Box 2: Install the Logic Apps Management solution. Box 3: Add a diagnostic setting to the Azure Logic App.","explanation":"First, create a Log Analytics workspace to receive telemetry. Install the Logic Apps Management solution onto the workspace for Logic App-specific monitoring views. Finally, add a diagnostic setting on the Logic App to forward runtime data and events to the workspace.","images":["images/question107.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Add a diagnostic setting to the Azure Function App","Add a diagnostic setting to the Azure Logic App","Create a Log Analytics workspace","Create action groups and alert rules","Install the Logic Apps Management solution"],"correct":"Create a Log Analytics workspace"},{"label":"Box 2","choices":["Add a diagnostic setting to the Azure Function App","Add a diagnostic setting to the Azure Logic App","Create a Log Analytics workspace","Create action groups and alert rules","Install the Logic Apps Management solution"],"correct":"Install the Logic Apps Management solution"},{"label":"Box 3","choices":["Add a diagnostic setting to the Azure Function App","Add a diagnostic setting to the Azure Logic App","Create a Log Analytics workspace","Create action groups and alert rules","Install the Logic Apps Management solution"],"correct":"Add a diagnostic setting to the Azure Logic App"}],"orderMode":true},{"id":108,"question":"You develop an application. You plan to host the application on a set of virtual machines (VMs) in Azure. You need to configure Azure Monitor to collect logs from the application. Which four actions should you perform in sequence?","options":["Box 1: Create a Log Analytics workspace. Box 2: Add a VMInsights solution. Box 3: Install agents on the VM and VM scale set to be monitored. Box 4: Create an Application Insights resource.","Box 1: Add a VMInsights solution. Box 2: Create a Log Analytics workspace. Box 3: AInstall agents on the VM and VM scale set to be monitored. Box 4: Create an Application Insights resource.","Box 1: Create an Application Insights resource. Box 2: Add a VMInsights solution. Box 3: AInstall agents on the VM and VM scale set to be monitored. Box 4: Create a Log Analytics workspace.","Box 1: Create a Log Analytics workspace. Box 2: Add a VMInsights solution. Box 3: Create an Application Insights resource. Box 4: Install agents on the VM and VM scale set to be monitored."],"answer":"Box 1: Create a Log Analytics workspace. Box 2: Add a VMInsights solution. Box 3: Install agents on the VM and VM scale set to be monitored. Box 4: Create an Application Insights resource.","explanation":"Create a Log Analytics workspace, add the VMInsights solution for VM health and performance monitoring, install the agents (Log Analytics/Dependency) on VMs, and finally create an Application Insights resource for application-level telemetry.","images":["images/question108.png"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["AInstall agents on the VM and VM scale set to be monitored","Add a VMInsights solution","Create a Log Analytics workspace","Create an Application Insights resource","Install agents on the VM and VM scale set to be monitored"],"correct":"Create a Log Analytics workspace"},{"label":"Box 2","choices":["AInstall agents on the VM and VM scale set to be monitored","Add a VMInsights solution","Create a Log Analytics workspace","Create an Application Insights resource","Install agents on the VM and VM scale set to be monitored"],"correct":"Add a VMInsights solution"},{"label":"Box 3","choices":["AInstall agents on the VM and VM scale set to be monitored","Add a VMInsights solution","Create a Log Analytics workspace","Create an Application Insights resource","Install agents on the VM and VM scale set to be monitored"],"correct":"Install agents on the VM and VM scale set to be monitored"},{"label":"Box 4","choices":["AInstall agents on the VM and VM scale set to be monitored","Add a VMInsights solution","Create a Log Analytics workspace","Create an Application Insights resource","Install agents on the VM and VM scale set to be monitored"],"correct":"Create an Application Insights resource"}],"orderMode":true},{"id":109,"question":"You have an application that provides weather forecasting data to external partners. You use Azure API Management to publish APIs. You must change the behavior of the API to meet the following requirements: Support alternative input parameters. Remove formatting text from responses. Provide additional context to back-end services. Which types of policies should you implement?","options":["Rewrite the request URL to match to the format expected by the web service: Inbound. Remove formatting text from responses: Outbound. Forward the user ID that is associated with the subscription key for the original request to the back-end service: Inbound.","Rewrite the request URL to match to the format expected by the web service: Inbound. Remove formatting text from responses: Outbound. Forward the user ID that is associated with the subscription key for the original request to the back-end service: Backend.","Rewrite the request URL to match to the format expected by the web service: Inbound. Remove formatting text from responses: Backend. Forward the user ID that is associated with the subscription key for the original request to the back-end service: Inbound.","Rewrite the request URL to match to the format expected by the web service: Backend. Remove formatting text from responses: Backend. Forward the user ID that is associated with the subscription key for the original request to the back-end service: Inbound."],"answer":"Rewrite the request URL to match to the format expected by the web service: Inbound. Remove formatting text from responses: Outbound. Forward the user ID that is associated with the subscription key for the original request to the back-end service: Inbound.","explanation":"URL rewrites happen Inbound before forwarding to the backend. Response transformations (removing formatting) happen Outbound after the backend responds. Adding context like a user ID header to the backend request is done Inbound so it arrives with the forwarded request.","images":["images/question109.png"],"source":"README","boxMode":true,"boxes":[{"label":"Rewrite the request URL to match to the format expected by the web service","choices":["Inbound","Backend","Outbound"],"correct":"Inbound"},{"label":"Remove formatting text from responses","choices":["Inbound","Backend","Outbound"],"correct":"Outbound"},{"label":"Forward the user ID that is associated with the subscription key for the original request to the back-end service","choices":["Inbound","Backend","Outbound"],"correct":"Inbound"}]},{"id":110,"question":"Your company is developing an Azure API. You need to implement authentication for the Azure API. You have the following requirements: All API calls must be secure. Callers to the API must not send credentials to the API. Which authentication mechanism should you use?","options":["Basic.","Anonymous.","Managed identity.","Client certificate."],"answer":"Managed identity.","explanation":"Managed identities allow Azure services to authenticate without callers sending credentials. Tokens are acquired automatically from Microsoft Entra ID using the identity. Basic and client certificate authentication require credentials, and Anonymous provides no security.","images":[],"source":"README"},{"id":111,"question":"You are a developer for a SaaS company that offers many web services. All web services for the company must meet the following requirements: Use API Management to access the services Use OpenID Connect for authentication Prevent anonymous usage A recent security audit found that several web services can be called without any authentication. Which API Management policy should you implement?","options":["`jsonp`.","`authentication-certificate`.","`check-header`.","`validate-jwt`."],"answer":"`validate-jwt`.","explanation":"The `validate-jwt` policy enforces the presence and validity of a JWT bearer token in API Management, including OpenID Connect-issued tokens. This blocks anonymous access. `check-header` only checks header presence, `jsonp` is for cross-domain calls, and `authentication-certificate` is for backend authentication.","images":[],"source":"README"},{"id":112,"question":"You are developing an Azure App Service REST API. The API must be called by an Azure App Service web app. The API must retrieve and update user profile information stored in Microsoft Entra ID. You need to configure the API to make the updates. Which two tools should you use?","options":["Microsoft Graph API.","Microsoft Authentication Library (MSAL).","Azure API Management.","Microsoft Defender for Cloud.","Microsoft Azure Key Vault SDK."],"answer":"Microsoft Graph API.|Microsoft Authentication Library (MSAL).","explanation":"Microsoft Graph API is the API surface used to read/update Entra ID user profile data. MSAL is required to acquire an OAuth 2.0 access token from Microsoft Entra ID, which is then presented to Graph. Azure API Management is not required for this scenario; it is a gateway product, not an auth or Graph access tool.","images":[],"source":"README"},{"id":113,"question":"You develop a REST API. You implement a user delegation SAS token to communicate with Azure Blob storage. The token is compromised. You need to revoke the token. What are two possible ways to achieve this goal?","options":["Revoke the delegation key.","Delete the stored access policy.","Regenerate the account key.","Remove the role assignment for the security principle."],"answer":"Revoke the delegation key.|Remove the role assignment for the security principle.","explanation":"A user delegation SAS is signed by a user delegation key tied to an Entra ID principal with RBAC. Revoking the delegation key (via `revoke-user-delegation-keys`) invalidates all SAS tokens signed by it. Removing the RBAC role assignment also revokes access. Stored access policies do not apply to user delegation SAS, and regenerating the account key does not affect delegation-key-signed SAS.","images":[],"source":"README"},{"id":114,"question":"You are developing an Azure-hosted application that must use an on-premises hardware security module (HSM) key. The key must be transferred to your existing Azure Key Vault by using the Bring Your Own Key (BYOK) process. You need to securely transfer the key to Azure Key Vault. Which four actions should you perform in sequence?","options":["Box 1: Create a custom policy definition in Azure Policy. Box 2: Generate a Key Exchange Key (KEK). Box 3: Retrieve the Key Exchange Key (KEK) public key. Box 4: Run the `az keyvault key import` command.","Box 1: Create a custom policy definition in Azure Policy. Box 2: Retrieve the Key Exchange Key (KEK) public key. Box 3: Generate a key transfer blob file by using the HSM `vendor-provided` tool. Box 4: Run the `az keyvault key import` command.","Box 1: Generate a Key Exchange Key (KEK). Box 2: Retrieve the Key Exchange Key (KEK) public key. Box 3: Generate a key transfer blob file by using the HSM `vendor-provided` tool. Box 4: Run the `az keyvault key restore` command.","Box 1: Generate a Key Exchange Key (KEK). Box 2: Retrieve the Key Exchange Key (KEK) public key. Box 3: Generate a key transfer blob file by using the HSM `vendor-provided` tool. Box 4: Run the `az keyvault key import` command."],"answer":"Box 1: Generate a Key Exchange Key (KEK). Box 2: Retrieve the Key Exchange Key (KEK) public key. Box 3: Generate a key transfer blob file by using the HSM `vendor-provided` tool. Box 4: Run the `az keyvault key import` command.","explanation":"BYOK flow: generate a Key Exchange Key (KEK) in Azure Key Vault, retrieve its public key, use the HSM vendor tool to wrap your target key into a transfer blob with that public key, then import the blob into Key Vault using `az keyvault key import`.","images":["images/question114.jpeg"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["Create a custom policy definition in Azure Policy","Generate a Key Exchange Key (KEK)","Generate a key transfer blob file by using the HSM `vendor-provided` tool","Retrieve the Key Exchange Key (KEK) public key","Run the `az keyvault key import` command","Run the `az keyvault key restore` command"],"correct":"Generate a Key Exchange Key (KEK)"},{"label":"Box 2","choices":["Create a custom policy definition in Azure Policy","Generate a Key Exchange Key (KEK)","Generate a key transfer blob file by using the HSM `vendor-provided` tool","Retrieve the Key Exchange Key (KEK) public key","Run the `az keyvault key import` command","Run the `az keyvault key restore` command"],"correct":"Retrieve the Key Exchange Key (KEK) public key"},{"label":"Box 3","choices":["Create a custom policy definition in Azure Policy","Generate a Key Exchange Key (KEK)","Generate a key transfer blob file by using the HSM `vendor-provided` tool","Retrieve the Key Exchange Key (KEK) public key","Run the `az keyvault key import` command","Run the `az keyvault key restore` command"],"correct":"Generate a key transfer blob file by using the HSM `vendor-provided` tool"},{"label":"Box 4","choices":["Create a custom policy definition in Azure Policy","Generate a Key Exchange Key (KEK)","Generate a key transfer blob file by using the HSM `vendor-provided` tool","Retrieve the Key Exchange Key (KEK) public key","Run the `az keyvault key import` command","Run the `az keyvault key restore` command"],"correct":"Run the `az keyvault key import` command"}],"orderMode":true},{"id":115,"question":"You develop and deploy an Azure Logic app that calls an Azure Function app. The Azure Function app includes an OpenAPI (Swagger) definition and uses an Azure Blob storage account. All resources are secured by using Microsoft Entra ID. The Azure Logic app must securely access the Azure Blob storage account. Microsoft Entra ID resources must remain if the Azure Logic app is deleted. You need to secure the Azure Logic app. What should you do?","options":["Create a user-assigned managed identity and assign role-based access controls.","Create an Microsoft Entra ID custom role and assign the role to the Azure Blob storage account.","Create an Azure Key Vault and issue a client certificate.","Create a system-assigned managed identity and issue a client certificate.","Create an Microsoft Entra ID custom role and assign role-based access controls."],"answer":"Create a user-assigned managed identity and assign role-based access controls.","explanation":"A user-assigned managed identity exists as its own Entra ID resource and persists independently of the Logic App. Assigning RBAC to it grants access to the storage account. A system-assigned identity would be deleted with the Logic App, violating the persistence requirement.","images":[],"source":"README"},{"id":116,"question":"You manage several existing Logic Apps. You need to change definitions, add new logic, and optimize these apps on a regular basis. What should you use?","options":["Edit B2B Workflows: Enterprise Integration Pack. Edit definitions in JSON: Code View Editor. Visually add functionality: Logic Apps Designer.","Edit B2B Workflows: Logic Apps Designer. Edit definitions in JSON: Enterprise Integration Pack. Visually add functionality: Code View Editor.","Edit B2B Workflows: Code View Editor. Edit definitions in JSON: Logic Apps Designer. Visually add functionality: Enterprise Integration Pack.","Edit B2B Workflows: Enterprise Integration Pack. Edit definitions in JSON: Code View Editor. Visually add functionality: Code View Editor."],"answer":"Edit B2B Workflows: Enterprise Integration Pack. Edit definitions in JSON: Code View Editor. Visually add functionality: Logic Apps Designer.","explanation":"The Enterprise Integration Pack supports B2B workflows (EDI, AS2, X12). The Code View Editor lets you edit the underlying JSON workflow definition directly. The Logic Apps Designer provides the visual drag-and-drop canvas for adding and configuring actions.","images":["images/question116.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"Edit B2B Workflows","choices":["Enterprise Integration Pack","Logic Apps Designer","Code View Editor"],"correct":"Enterprise Integration Pack"},{"label":"Edit definitions in JSON","choices":["Enterprise Integration Pack","Logic Apps Designer","Code View Editor"],"correct":"Code View Editor"},{"label":"Visually add functionality","choices":["Enterprise Integration Pack","Logic Apps Designer","Code View Editor"],"correct":"Logic Apps Designer"}]},{"id":117,"question":"You are developing a solution that will use a multi-partitioned Azure Cosmos DB database. You plan to use the latest Azure Cosmos DB SDK for development. The solution must meet the following requirements: Send insert and update operations to an Azure Blob storage account. Process changes to all partitions immediately. Allow parallelization of change processing. You need to process the Azure Cosmos DB operations. What are two possible ways to achieve this goal?","options":["Create an Azure App Service API and implement the change feed estimator of the SDK. Scale the API by using multiple Azure App Service instances.","Create a background job in an Azure Kubernetes Service and implement the change feed feature of the SDK.","Create an Azure Function to use a trigger for Azure Cosmos DB. Configure the trigger to connect to the container.","Create an Azure Function that uses a FeedIterator object that processes the change feed by using the pull model on the container. Use a FeedRange object to parallelize the processing of the change feed across multiple functions."],"answer":"Create an Azure Function to use a trigger for Azure Cosmos DB. Configure the trigger to connect to the container.|Create an Azure Function that uses a FeedIterator object that processes the change feed by using the pull model on the container. Use a FeedRange object to parallelize the processing of the change feed across multiple functions.","explanation":"The Cosmos DB trigger (push model) automatically parallelizes change feed processing across partitions. The pull model with FeedIterator and FeedRange also supports parallel processing across partitions and immediate change consumption. Both satisfy the requirements of immediate processing and parallelization.","images":[],"source":"README"},{"id":118,"question":"You are developing an application that uses Azure Storage Queues. You have the following code. Question 1: The code configures the lock duration for the queue.","options":["Yes.","No."],"answer":"No.","explanation":"Azure Storage Queues do not support configurable lock duration at the queue level; the visibility timeout is set per message when it is dequeued (via ReceiveMessage parameters). Configuring lock duration at the queue level is a Service Bus queue feature, not Storage Queues.","images":["images/question118_119_120.jpg"],"source":"README"},{"id":119,"question":"You are developing an application that uses Azure Storage Queues. You have the following code. Question 2: The last message read remains in the queue after the code runs.","options":["Yes.","No."],"answer":"Yes.","explanation":"[FLAGGED - lower confidence] If the code uses PeekMessage (or ReceiveMessage without deleting), the message remains in the queue. Without an explicit DeleteMessage call after processing, the last read message is not removed and will become visible again after the visibility timeout. Flagged because the exact code cannot be viewed.","images":["images/question118_119_120.jpg"],"source":"README"},{"id":120,"question":"You are developing an application that uses Azure Storage Queues. You have the following code. Question 3: The storage queue remains in the storage account after the code runs.","options":["Yes.","No."],"answer":"Yes.","explanation":"[FLAGGED - lower confidence] Reading or processing messages does not delete the queue itself. Unless the code explicitly calls DeleteQueue (or DeleteIfExists) on the queue client, the queue persists in the storage account after the code runs. Flagged because the exact code cannot be viewed.","images":["images/question118_119_120.jpg"],"source":"README"},{"id":121,"question":"You develop software solutions for a mobile delivery service. You are developing a mobile app that users can use to order from a restaurant in their area. The app uses the following workflow: 1. A driver selects the restaurants for which they will deliver orders. 2. Orders are sent to all available drivers in an area. 3. Only orders for the selected restaurants will appear for the driver. 4. The first driver to accept an order removes it from the list of available orders. You need to implement an Azure Service Bus solution. Which three actions should you perform in sequence?","options":["Box 1: Create a single Service Bus Namespace. Box 2: Create a single Service Bus topic. Box 3: Create a Service Bus subscription for each restaurant for which a driver can receive orders.","Box 1: Create a Service Bus subscription for each restaurant for which a driver can receive orders. Box 2: Create a Service Bus topic for each restaurant. Box 3: Create a Service Bus Namespace for each.","Box 1: Create a single Service Bus topic. Box 2: Create a Service Bus subscription for each restaurant for which a driver can receive orders. Box 3: Create a single Service Bus topic.","Box 1: Create a single Service Bus topic. Box 2: Create a Service Bus Namespace for each restaurant for which a driver can receive messages. Box 3: Create a Service Bus Namespace for each."],"answer":"Box 1: Create a single Service Bus Namespace. Box 2: Create a single Service Bus topic. Box 3: Create a Service Bus subscription for each restaurant for which a driver can receive orders.","explanation":"Service Bus pub/sub requires a Namespace (container), a Topic (single publish endpoint for order events), and per-restaurant Subscriptions with filters so each driver only sees orders for selected restaurants. The first driver to accept completes the message and removes it from availability.","images":["images/question121.png"],"source":"README","boxMode":true,"numBoxes":3,"boxes":[{"label":"Box 1","choices":["Create a Service Bus Namespace for each","Create a Service Bus Namespace for each restaurant for which a driver can receive messages","Create a Service Bus subscription for each restaurant for which a driver can receive orders","Create a Service Bus topic for each restaurant","Create a single Service Bus Namespace","Create a single Service Bus topic"],"correct":"Create a single Service Bus Namespace"},{"label":"Box 2","choices":["Create a Service Bus Namespace for each","Create a Service Bus Namespace for each restaurant for which a driver can receive messages","Create a Service Bus subscription for each restaurant for which a driver can receive orders","Create a Service Bus topic for each restaurant","Create a single Service Bus Namespace","Create a single Service Bus topic"],"correct":"Create a single Service Bus topic"},{"label":"Box 3","choices":["Create a Service Bus Namespace for each","Create a Service Bus Namespace for each restaurant for which a driver can receive messages","Create a Service Bus subscription for each restaurant for which a driver can receive orders","Create a Service Bus topic for each restaurant","Create a single Service Bus Namespace","Create a single Service Bus topic"],"correct":"Create a Service Bus subscription for each restaurant for which a driver can receive orders"}],"orderMode":true},{"id":122,"question":"You develop a news and blog content app for Windows devices. A notification must arrive on a user's device when there is a new article available for them to view. You need to implement push notifications. How should you complete the code segment?","options":["Box 1: `NotificationHubClient`. Box 2: `NotificationHubClient`. Box 3: `CreateClientFromConnectionString`. Box 4: `SendWindowsNativeNotificationAsync`.","Box 1: `NotificationHubJob`. Box 2: `NotificationHubJob`. Box 3: `PatchInstallation`. Box 4: `SendWindowsNativeNotificationAsync`.","Box 1: `NotificationHubClientSettings`. Box 2: `NotificationHubClientSettings`. Box 3: `CreateOrUpdatelnstallation`. Box 4: `ScheduleNotificationAsync`.","Box 1: `NotificationHubClientSettings`. Box 2: `NotificationDetails`. Box 3: `CreateOrUpdatelnstallation`. Box 4: `SendWindowsNativeNotificationAsync`."],"answer":"Box 1: `NotificationHubClient`. Box 2: `NotificationHubClient`. Box 3: `CreateClientFromConnectionString`. Box 4: `SendWindowsNativeNotificationAsync`.","explanation":"The Azure Notification Hubs SDK uses NotificationHubClient as the main type. Instances are created via the static factory CreateClientFromConnectionString. To push a native WNS toast/tile/badge to Windows devices, call SendWindowsNativeNotificationAsync with the XML payload.","images":["images/question122.png"],"source":"README","boxMode":true,"numBoxes":4,"boxes":[{"label":"Box 1","choices":["`NotificationHubClientSettings`","`NotificationHubClient`","`NotificationHubJob`","`NotificationDetails`","`CreateClientFromConnectionString`","`CreateOrUpdatelnstallation`","`PatchInstallation`","`ScheduleNotificationAsync`","`SendWindowsNativeNotificationAsync`"],"correct":"`NotificationHubClient`"},{"label":"Box 2","choices":["`NotificationHubClientSettings`","`NotificationHubClient`","`NotificationHubJob`","`NotificationDetails`","`CreateClientFromConnectionString`","`CreateOrUpdatelnstallation`","`PatchInstallation`","`ScheduleNotificationAsync`","`SendWindowsNativeNotificationAsync`"],"correct":"`NotificationHubClient`"},{"label":"Box 3","choices":["`NotificationHubClientSettings`","`NotificationHubClient`","`NotificationHubJob`","`NotificationDetails`","`CreateClientFromConnectionString`","`CreateOrUpdatelnstallation`","`PatchInstallation`","`ScheduleNotificationAsync`","`SendWindowsNativeNotificationAsync`"],"correct":"`CreateClientFromConnectionString`"},{"label":"Box 4","choices":["`NotificationHubClientSettings`","`NotificationHubClient`","`NotificationHubJob`","`NotificationDetails`","`CreateClientFromConnectionString`","`CreateOrUpdatelnstallation`","`PatchInstallation`","`ScheduleNotificationAsync`","`SendWindowsNativeNotificationAsync`"],"correct":"`SendWindowsNativeNotificationAsync`"}]},{"id":123,"question":"You are developing an Azure messaging solution. You need to ensure that the solution meets the following requirements: Provide transactional support. Provide duplicate detection. Store the messages for an unlimited period of time. Which two technologies will meet the requirements?","options":["Azure Service Bus Topic.","Azure Service Bus Queue.","Azure Storage Queue.","Azure Event Hub."],"answer":"Azure Service Bus Topic.|Azure Service Bus Queue.","explanation":"Only Azure Service Bus entities (Queues and Topics) support transactions, duplicate detection, and unlimited retention (with the right tier). Storage Queues lack transactions/dup detection; Event Hubs is for event streaming and doesn't support these features.","images":[],"source":"README"},{"id":124,"question":"You develop a gateway solution for a public facing news API. The news API back end is implemented as a RESTful service and hosted in an Azure App Service instance. You need to configure back-end authentication for the API Management service instance. Which target and gateway credential type should you use?","options":["Target: Azure Resource. Gateway credentials: Client cert.","Target: Client cert. Gateway credentials: Basic.","Target: Azure Resource. Gateway credentials: Basic.","Target: HTTP(s) endpoint. Gateway credentials: Client cert."],"answer":"Target: HTTP(s) endpoint. Gateway credentials: Client cert.","explanation":"In APIM, back-end authentication for a generic RESTful service hosted in App Service uses an HTTP(s) endpoint target, with mutual TLS (client certificate) as gateway credentials to authenticate APIM to the backend.","images":["images/question124.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"Target","choices":["Azure Resource","Client cert","HTTP(s) endpoint","Basic"],"correct":"HTTP(s) endpoint"},{"label":"Gateway credentials","choices":["Azure Resource","Client cert","HTTP(s) endpoint","Basic"],"correct":"Client cert"}]},{"id":125,"question":"You are creating an app that uses Event Grid to connect with other services. Your app's event data will be sent to a serverless function that checks compliance. This function is maintained by your company. You write a new event subscription at the scope of your resource. The event must be invalidated after a specific period of time. You need to configure Event Grid. What should you do?","options":["WebHook event delivery: SAS tokens. Topic publishing: ValidationCode handshake.","WebHook event delivery: Key authentication. Topic publishing: ValidationCode handshake.","WebHook event delivery: Management Access Control. Topic publishing: ValidationURL handshake.","WebHook event delivery: SAS tokens. Topic publishing: ValidationURL handshake."],"answer":"WebHook event delivery: SAS tokens. Topic publishing: ValidationCode handshake.","explanation":"Event Grid supports SAS tokens for WebHook delivery, which can embed an expiry so the event is invalidated after a period. For topic publishing endpoint validation, the synchronous ValidationCode handshake is performed (programmatic code echo) rather than ValidationURL.","images":["images/question125.jpg"],"source":"README","boxMode":true,"boxes":[{"label":"WebHook event delivery","choices":["SAS tokens","Key authentication","Management Access Control","ValidationCode handshake","ValidationURL handshake"],"correct":"SAS tokens"},{"label":"Topic publishing","choices":["SAS tokens","Key authentication","Management Access Control","ValidationCode handshake","ValidationURL handshake"],"correct":"ValidationCode handshake"}]},{"id":126,"question":"You are working for Contoso, Ltd. You define an API Policy object by using the following XML markup. Question 1: The XML segment belongs in the `<inbound>` section of the policy.","options":["Yes.","No."],"answer":"Yes.","explanation":"Policies that inspect or transform the incoming request (such as check-header, rate-limit, URL rewrite, or version rewriting) belong in the <inbound> section, which runs before the request is forwarded to the backend.","images":["images/question126_127_128.png"],"source":"README"},{"id":127,"question":"You are working for Contoso, Ltd. You define an API Policy object by using the following XML markup. Question 2: If the body size is >256k, an error will occur.","options":["Yes.","No."],"answer":"No.","explanation":"[Medium confidence] The check-header/validate-content type policies only trigger when the specified condition is met, and body-size checks typically return 413 or the configured status. Without an explicit size-enforcing policy matching 256k, no error is produced by the snippet shown.","images":["images/question126_127_128.png"],"source":"README"},{"id":128,"question":"You are working for Contoso, Ltd. You define an API Policy object by using the following XML markup. Question 3: If the request is `http://contoso.com/api/9.2/`, the policy will retain the higher version.","options":["Yes.","No."],"answer":"No.","explanation":"[FLAGGED - lower confidence] Standard URL rewrite examples in APIM version-routing rewrite to a specific version path; they don't dynamically retain a higher version from the URL. Without seeing the XML, the most likely intent is that the policy forwards to a fixed version, not the requested 9.2.","images":["images/question126_127_128.png"],"source":"README"},{"id":129,"question":"You develop a gateway solution for a public facing news API. The news API back end is implemented as a RESTful service and uses an OpenAPI specification. You need to ensure that you can access the news API by using an Azure API Management service instance. Which Azure PowerShell command should you run?","options":["`Import-AzureRmApiManagementApi -Context $ApiMgmtContext -SpecificationFormat 'Swagger' -SpecificationPath $SwaggerPath -Path $Path`.","`New-AzureRmApiManagementBackend -Context $ApiMgmtContext-Url $Url -Protocol http`.","`New-AzureRmApiManagement -ResourceGroupName $ResourceGroup -Name $Name 'Location $Location -Organization $Org -AdminEmail $AdminEmail`.","`New-AzureRmApiManagementBackendProxy -Url $ApiUrl`."],"answer":"`Import-AzureRmApiManagementApi -Context $ApiMgmtContext -SpecificationFormat 'Swagger' -SpecificationPath $SwaggerPath -Path $Path`.","explanation":"Import-AzureRmApiManagementApi imports an API into APIM from an OpenAPI/Swagger specification. The other cmdlets create backends or the APIM service itself, not import an existing OpenAPI definition.","images":[],"source":"README"},{"id":130,"question":"You are developing an Azure function that connects to an Azure SQL Database instance. The function is triggered by an Azure Storage queue. You receive reports of numerous System.InvalidOperationExceptions with the following message: 'Timeout expired. The timeout period elapsed prior to obtaining a connection from the pool. This may have occurred because all pooled connections were in use and max pool size was reached.' You need to prevent the exception. What should you do?","options":["In the `host.json` file, decrease the value of the `batchSize` option.","Convert the trigger to Azure Event Hub.","Convert the Azure Function to the Premium plan.","In the `function.json` file, change the value of the type option to `queueScaling`."],"answer":"In the `host.json` file, decrease the value of the `batchSize` option.","explanation":"The exception is connection pool exhaustion caused by too many concurrent function invocations each opening SQL connections. The queue trigger processes messages in batches controlled by host.json's batchSize. Decreasing batchSize reduces concurrency and prevents pool exhaustion. A Premium plan does not solve pool limits.","images":[],"source":"README"},{"id":131,"question":"You are developing a REST web service. Customers will access the service by using an Azure API Management instance. The web service does not correctly handle conflicts. Instead of returning an HTTP status code of 409, the service returns a status code of 500. The body of the status message contains only the word conflict. You need to ensure that conflicts produce the correct response. How should you complete the policy?","options":["Box 1: `on-error`. Box 2: `context`. Box 3: `context`. Box 4: `set-status`. Box 5: `on-error`.","Box 1: `when-error`. Box 2: `context`. Box 3: `server`. Box 4: `override-status`. Box 5: `on-error`.","Box 1: `when-error`. Box 2: `context`. Box 3: `context`. Box 4: `set-status`. Box 5: `on-error`.","Box 1: `on-error`. Box 2: `context`. Box 3: `server`. Box 4: `override-status`. Box 5: `on-error`."],"answer":"Box 1: `on-error`. Box 2: `context`. Box 3: `context`. Box 4: `set-status`. Box 5: `on-error`.","explanation":"APIM uses the <on-error> policy section to handle errors. Inside it, context.LastError and context.Response are inspected, and set-status overrides the HTTP status code (changing 500 to 409 when the backend returned 'conflict'). The closing tag is </on-error>.","images":["images/question131.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["`on-error`","`when-error`","`context`","`server`","`override-status`","`set-status`"],"correct":"`on-error`"},{"label":"Box 2","choices":["`on-error`","`when-error`","`context`","`server`","`override-status`","`set-status`"],"correct":"`context`"},{"label":"Box 3","choices":["`on-error`","`when-error`","`context`","`server`","`override-status`","`set-status`"],"correct":"`context`"},{"label":"Box 4","choices":["`on-error`","`when-error`","`context`","`server`","`override-status`","`set-status`"],"correct":"`set-status`"},{"label":"Box 5","choices":["`on-error`","`when-error`","`context`","`server`","`override-status`","`set-status`"],"correct":"`on-error`"}]},{"id":132,"question":"You are a developer for a Software as a Service (SaaS) company. You develop solutions that provide the ability to send notifications by using Azure Notification Hubs. You need to create sample code that customers can use as a reference for how to send raw notifications to Windows Push Notification Services (WNS) devices. The sample code must not use external packages. How should you complete the code segment?","options":["Box 1: `windows`. Box 2: `application/octet-stream`.","Box 1: `windowsphone`. Box 2: `raw`.","Box 1: `windows`. Box 2: `application/json`.","Box 1: `windowsphone`. Box 2: `application/xml`."],"answer":"Box 1: `windows`. Box 2: `application/octet-stream`.","explanation":"For raw WNS notifications via Notification Hubs REST API, the ServiceBusNotification-Format header is set to 'windows' and the Content-Type must be application/octet-stream (raw binary payload), per the WNS raw notification specification.","images":["images/question132.jpg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`windows`","`windowsphone`","`application/json`","`application/octet-stream`","`application/xml`","`raw`"],"correct":"`windows`"},{"label":"Box 2","choices":["`windows`","`windowsphone`","`application/json`","`application/octet-stream`","`application/xml`","`raw`"],"correct":"`application/octet-stream`"}]},{"id":133,"question":"You develop and deploy an ASP.NET web app to Azure App Service. You use Application Insights telemetry to monitor the app. You must test the app to ensure that the app is available and responsive from various points around the world and at regular intervals. If the app is not responding, you must send an alert to support staff. You need to configure a test for the web app. Which two test types can you use?","options":["Integration.","TrackAvailablity.","URL ping.","Unit.","Load."],"answer":"TrackAvailablity.|URL ping.","explanation":"Application Insights availability tests include URL ping (simple HTTP GET from multiple global points) and TrackAvailability (custom availability telemetry written in code). Both can raise alerts when the app is unresponsive. Load, Unit, and Integration are not availability test types.","images":[],"source":"README"},{"id":134,"question":"You are developing an Azure solution to collect inventory data from thousands of stores located around the world. Each store location will send the inventory data hourly to an Azure Blob storage account for processing. The solution must meet the following requirements: Begin processing when data is saved to Azure Blob storage. Filter data based on store location information. Trigger an Azure Logic App to process the data for output to Azure Cosmos DB. Enable high availability and geographic distribution. Allow 24-hours for retries. Implement an exponential back off data processing. You need to configure the solution. What should you implement?","options":["Event Source: Azure Event Grid. Event Receiver: Azure Logic App. Event Handler: Azure Service Bus.","Event Source: Azure Service Bus. Event Receiver: Azure App Service. Event Handler: Azure Blob Storage.","Event Source: Azure Event Grid. Event Receiver: Azure Service Bus. Event Handler: Azure Blob Storage.","Event Source: Azure Blob Storage. Event Receiver: Azure Event Grid. Event Handler: Azure Logic App."],"answer":"Event Source: Azure Blob Storage. Event Receiver: Azure Event Grid. Event Handler: Azure Logic App.","explanation":"Blob Storage emits BlobCreated events; Event Grid receives and filters them (by store location metadata) and supports 24-hour retry with exponential backoff plus high availability; a Logic App handler processes the data and writes to Cosmos DB.","images":["images/question134.png"],"source":"README","boxMode":true,"boxes":[{"label":"Event Source","choices":["Azure Event Grid","Azure Service Bus","Azure Blob Storage","Azure Logic App","Azure App Service"],"correct":"Azure Blob Storage"},{"label":"Event Receiver","choices":["Azure Event Grid","Azure Service Bus","Azure Blob Storage","Azure Logic App","Azure App Service"],"correct":"Azure Event Grid"},{"label":"Event Handler","choices":["Azure Event Grid","Azure Service Bus","Azure Blob Storage","Azure Logic App","Azure App Service"],"correct":"Azure Logic App"}]},{"id":135,"question":"Determine whether the solution meets the stated goals. You are developing and deploying several ASP.NET web applications to Azure App Service. You plan to save session state information and HTML output. You must use a storage mechanism with the following requirements: Share session state across all ASP.NET web applications. Support controlled, concurrent access to the same session state data for multiple readers and a single writer. Save full HTTP responses for concurrent requests. You need to store the information. Proposed Solution: Enable Application Request Routing (ARR). Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Application Request Routing (ARR) provides affinity/routing but is not a shared session state store. It cannot share session state across apps, support reader/writer semantics, or cache HTTP responses concurrently.","images":[],"source":"README"},{"id":136,"question":"Determine whether the solution meets the stated goals. You are developing and deploying several ASP.NET web applications to Azure App Service. You plan to save session state information and HTML output. You must use a storage mechanism with the following requirements: Share session state across all ASP.NET web applications. Support controlled, concurrent access to the same session state data for multiple readers and a single writer. Save full HTTP responses for concurrent requests. You need to store the information. Proposed Solution: Deploy and configure an Azure Database for PostgreSQL. Update the web applications. Does the solution meet the goal?","options":["Yes.","No."],"answer":"No.","explanation":"Azure Database for PostgreSQL can store data but is not the recommended ASP.NET session state provider and doesn't natively cache HTTP output. It also doesn't meet the multiple-reader/single-writer concurrency pattern efficiently needed here.","images":[],"source":"README"},{"id":137,"question":"Determine whether the solution meets the stated goals. You are developing and deploying several ASP.NET web applications to Azure App Service. You plan to save session state information and HTML output. You must use a storage mechanism with the following requirements: Share session state across all ASP.NET web applications. Support controlled, concurrent access to the same session state data for multiple readers and a single writer. Save full HTTP responses for concurrent requests. You need to store the information. Proposed Solution: Deploy and configure Azure Cache for Redis. Update the web applications. Does the solution meet the goal?","options":["Yes.","No."],"answer":"Yes.","explanation":"Azure Cache for Redis is the recommended store: it supports distributed ASP.NET session state across apps, output caching for full HTTP responses, and concurrent access with multiple readers and single-writer semantics via its data structures and locking.","images":[],"source":"README"},{"id":138,"question":"A company is developing a gaming platform. Users can join teams to play online and see leaderboards that include player statistics. The solution includes an entity named `Team`. You plan to implement an Azure Redis Cache instance to improve the efficiency of data operations for entities that rarely change. You need to invalidate the cache when team data is changed. How should you complete the code?","options":["Box 1: `IDatabase cache = Connection.GetDatabase();`. Box 2: `cache.StringSet('Team', '');`.","Box 1: `IDatabase cache = Connection.GetDatabase();`. Box 2: `cache KeyDelete('Team');`.","Box 1: `ICache cache = Connection.GetDatabase();`. Box 2: `cache KeyDelete('Team');`.","Box 1: `ICache cache = Connection.GetDatabase();`. Box 2: `cache StringGet('Team', '');`."],"answer":"Box 1: `IDatabase cache = Connection.GetDatabase();`. Box 2: `cache KeyDelete('Team');`.","explanation":"StackExchange.Redis exposes IDatabase via ConnectionMultiplexer.GetDatabase(). To invalidate a cached entry, call KeyDelete which removes the key so the next read repopulates from the source of truth.","images":["images/question138.jpg"],"source":"README","boxMode":true,"numBoxes":2,"boxes":[{"label":"Box 1","choices":["`ICache cache = Connection.GetDatabase();`","`IDatabase cache = Connection.GetDatabase();`","`cache KeyDelete('Team');`","`cache StringGet('Team', '');`","`cache.StringSet('Team', '');`"],"correct":"`IDatabase cache = Connection.GetDatabase();`"},{"label":"Box 2","choices":["`ICache cache = Connection.GetDatabase();`","`IDatabase cache = Connection.GetDatabase();`","`cache KeyDelete('Team');`","`cache StringGet('Team', '');`","`cache.StringSet('Team', '');`"],"correct":"`cache KeyDelete('Team');`"}]},{"id":139,"question":"A company has multiple warehouses. Each warehouse contains IoT temperature devices which deliver temperature data to an Azure Service Bus queue. You need to send email alerts to facility supervisors immediately if the temperature at a warehouse goes above or below specified threshold temperatures. Which five actions should you perform in sequence?","options":["Box 1: Create a blank Logic app. Box 2: Add a logic app trigger that fires when one or more messages arrive in the queue. Box 3: Add an action that reads IoT temperature data from the Service Bus queue. Box 4: Add a condition that compares the temperature against the upper and lower thresholds. Box 5: Add an action that sends an email to","Box 1: Add a trigger that reads IoT temperature data from a Service Bus queue. Box 2: Add a condition that compares the temperature against the upper and lower thresholds. Box 3: Add a logic app action that fires when one or more messages arrive in the queue. Box 4: Create a blank Logic app. Box 5: Add an action that sends an email to specified personnel if the temperature is outside of those thresholds.","Box 1: Add a condition that compares the temperature against the upper and lower thresholds. Box 2: Outbound. Box 3: Add a Recurence rigge that schedules the app to run every 15 minutes. Box 4: Add a trigger that reads IoT temperature data from a Service Bus queue. Box 5: Create a blank Logic app.","Box 1: Create a blank Logic app. Box 2: Add a logic app action that fires when one or more messages arrive in the queue. Box 3: Add a condition that compares the temperature against the upper and lower thresholds. Box 4: Add an action that reads IoT temperature data from the Service Bus queue. Box 5: Add a condition that compares the temperature against the upper and lower thresholds."],"answer":"Box 1: Create a blank Logic app. Box 2: Add a logic app trigger that fires when one or more messages arrive in the queue. Box 3: Add an action that reads IoT temperature data from the Service Bus queue. Box 4: Add a condition that compares the temperature against the upper and lower thresholds. Box 5: Add an action that sends an email to","explanation":"Logic App workflows begin with creating a blank app, then adding a Service Bus trigger that fires on queue messages, followed by an action to read/parse the temperature data, a condition comparing thresholds, and finally an email action when thresholds are breached.","images":["images/question139.png"],"source":"README","boxMode":true,"numBoxes":5,"boxes":[{"label":"Box 1","choices":["Add a Recurence rigge that schedules the app to run every 15 minutes","Add a condition that compares the temperature against the upper and lower thresholds","Add a logic app action that fires when one or more messages arrive in the queue","Add a logic app trigger that fires when one or more messages arrive in the queue","Add a trigger that reads IoT temperature data from a Service Bus queue","Add an action that reads IoT temperature data from the Service Bus queue","Add an action that sends an email to","Add an action that sends an email to specified personnel if the temperature is outside of those thresholds","Create a blank Logic app","Outbound"],"correct":"Create a blank Logic app"},{"label":"Box 2","choices":["Add a Recurence rigge that schedules the app to run every 15 minutes","Add a condition that compares the temperature against the upper and lower thresholds","Add a logic app action that fires when one or more messages arrive in the queue","Add a logic app trigger that fires when one or more messages arrive in the queue","Add a trigger that reads IoT temperature data from a Service Bus queue","Add an action that reads IoT temperature data from the Service Bus queue","Add an action that sends an email to","Add an action that sends an email to specified personnel if the temperature is outside of those thresholds","Create a blank Logic app","Outbound"],"correct":"Add a logic app trigger that fires when one or more messages arrive in the queue"},{"label":"Box 3","choices":["Add a Recurence rigge that schedules the app to run every 15 minutes","Add a condition that compares the temperature against the upper and lower thresholds","Add a logic app action that fires when one or more messages arrive in the queue","Add a logic app trigger that fires when one or more messages arrive in the queue","Add a trigger that reads IoT temperature data from a Service Bus queue","Add an action that reads IoT temperature data from the Service Bus queue","Add an action that sends an email to","Add an action that sends an email to specified personnel if the temperature is outside of those thresholds","Create a blank Logic app","Outbound"],"correct":"Add an action that reads IoT temperature data from the Service Bus queue"},{"label":"Box 4","choices":["Add a Recurence rigge that schedules the app to run every 15 minutes","Add a condition that compares the temperature against the upper and lower thresholds","Add a logic app action that fires when one or more messages arrive in the queue","Add a logic app trigger that fires when one or more messages arrive in the queue","Add a trigger that reads IoT temperature data from a Service Bus queue","Add an action that reads IoT temperature data from the Service Bus queue","Add an action that sends an email to","Add an action that sends an email to specified personnel if the temperature is outside of those thresholds","Create a blank Logic app","Outbound"],"correct":"Add a condition that compares the temperature against the upper and lower thresholds"},{"label":"Box 5","choices":["Add a Recurence rigge that schedules the app to run every 15 minutes","Add a condition that compares the temperature against the upper and lower thresholds","Add a logic app action that fires when one or more messages arrive in the queue","Add a logic app trigger that fires when one or more messages arrive in the queue","Add a trigger that reads IoT temperature data from a Service Bus queue","Add an action that reads IoT temperature data from the
